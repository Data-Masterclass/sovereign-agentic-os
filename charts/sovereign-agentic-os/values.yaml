# =============================================================================
# Sovereign Agentic OS — default values (secure, opinionated)
# =============================================================================
# These are the PRODUCT defaults. Overlays (values.local.yaml for kind,
# values.stackit.yaml for STACKIT) trim sizes and point at environment storage.
#
# RULES (packaging.md / security.md):
#   - No real secrets here, ever. Secrets are external (k8s Secret / External
#     Secrets references). The chart ships sane secure defaults only.
#   - Pin upstream chart versions (Chart.yaml) and image digests (below).
#   - Components carry an `enabled` flag so the slice can come up incrementally.
# =============================================================================

# =============================================================================
# Orchestrated, memory-safe startup (anti-OOM)
# =============================================================================
# Steady-state the bundled stack fits ~14 GB, but booting all ~30 pods at once on
# a single 32 GB node spiked transient memory > 32 GB and OOMKilled litellm /
# errored openmetadata. Three coordinated levers tame the rollout:
#
#   1. Right-sized memory requests + limits on EVERY component (below). Requests
#      are honest steady-state values (the scheduler accounts memory accurately
#      and excess pods sit Pending under pressure — natural backpressure); limits
#      cap each pod so one can't run away. This is the foundation and works even
#      with plain `helm install` (no Argo CD).
#   2. Argo CD sync-waves (`startup.syncWaves`) stage the rollout: wave 0 infra,
#      wave 1 middleware, wave 2 apps — each wave waits for the prior to be
#      healthy, so memory ramps gradually instead of all at once.
#   3. PriorityClasses (`priorityClasses`) protect the data layer: infra (Postgres
#      + wave-0 backends) is high priority; apps are low — under pressure the
#      kubelet evicts app pods first, never the database.
#
# -----------------------------------------------------------------------------
# MEMORY REQUEST BUDGET (default-enabled components, profile=local).
# Sum of `requests.memory` paces scheduler admission; must fit a 32 GB node with
# headroom for kube-system + boot transients. Keep this table in sync when you
# change a request below.
#
#   WAVE 0 — infra            request
#     postgres (CNPG)          384Mi
#     opensearch              1024Mi
#     clickhouse              1024Mi
#     valkey                    64Mi
#     minio (object-storage)   256Mi
#                            --------
#     subtotal                2752Mi  (~2.7 GiB)
#
#   WAVE 1 — middleware       request
#     litellm                 1024Mi   (was OOMKilled — real request + 2Gi limit)
#     langfuse-web             768Mi
#     langfuse-worker          768Mi
#     mock-model                64Mi
#     egress-proxy              32Mi
#     web-fetch                 32Mi
#                            --------
#     subtotal                2688Mi  (~2.6 GiB)
#
#   WAVE 2 — apps             request
#     openmetadata            2048Mi   (JVM -Xmx2g)
#     dagster (web+daemon+uc)  896Mi
#     superset                 768Mi
#     argo-cd (4 pods)         576Mi
#     docling                  512Mi
#     osdashboards             512Mi
#     polaris                  512Mi
#     ci-runner (dind+runner)  384Mi
#     cube                     256Mi
#     haystack                 256Mi
#     forgejo                  256Mi
#     query-tool               256Mi
#     sample-agent             128Mi
#     poet-agent               128Mi
#     os-ui                    128Mi
#     opa                       32Mi
#                            --------
#     subtotal                7648Mi  (~7.5 GiB)
#
#   TOTAL default requests   13088Mi  (~12.8 GiB)  << 26–28 GiB target,
#   leaving ~19 GiB headroom on a 32 GB node for kube-system + boot spikes.
#   (Verified via `helm template` of the Mode A self-hosted overlay; sum of all
#   rendered container request.memory. Short-lived hook Jobs — dbt, migrations,
#   bucket/seed init — are transient and not counted; Layer-4 Science is off by
#   default.)
# -----------------------------------------------------------------------------
startup:
  # Argo CD sync-wave numbers per tier (string values — Argo reads them as ints).
  # Lower = applied earlier; each wave waits for the prior to be Healthy. Wired
  # onto every long-running workload via subchart annotation values + the bespoke
  # templates' `soa.syncWaveAnno` helper. PriorityClasses use wave "-1" so they
  # exist before any referencing pod.
  syncWaves:
    infra: "0"        # Postgres/CNPG, OpenSearch, ClickHouse, Valkey, MinIO
    middleware: "1"   # LiteLLM, Langfuse, mock-model, egress proxy + web-fetch
    apps: "2"         # Superset, Dagster, OpenMetadata, Forgejo, Argo, OS UI, agents

# PriorityClasses — protect the data layer under memory pressure. Cluster-scoped
# objects, gated so local-kind still works (kind supports PriorityClass). Values
# sit far below the reserved system-critical band (2e9) so they never preempt
# kube-system. infra > app, so the kubelet evicts/OOMs app pods before any DB.
#
# WIRING: bespoke pods (postgres/CNPG, clickhouse, valkey, minio = infra; all
# bespoke app pods = app) reference the classes through the gated
# `soa.priorityClassName` helper, so setting `enabled: false` drops every one of
# those references automatically. The bundled SUBCHARTS mostly expose no
# priorityClassName knob, so their pods run at the cluster-default priority (0) —
# already below the infra tier, which preserves the "apps evicted before the DB"
# guarantee. The ONE exception is OpenSearch (a wave-0 backend that DOES expose
# the knob): its `opensearch.priorityClassName` is hardcoded to the infra class,
# so if you disable this gate, also clear that one line (noted there).
priorityClasses:
  enabled: true
  infra:
    name: sovereign-os-infra
    value: 100000
  app:
    name: sovereign-os-app
    value: 1000

global:
  # Logical namespace the workloads live in (created via --create-namespace).
  namespace: agentic-os
  # Profile: "local" (kind) or "stackit". Templates may branch on this.
  profile: local
  # Empty => use the cluster's default StorageClass (kind: "standard").
  storageClass: ""
  imagePullPolicy: IfNotPresent
  # Registry pull secret(s) for the bespoke images. Empty by default (Mode A pulls
  # locally-built images loaded into kind — no auth). Mode B (STACKIT) sets this to
  # the registry-pull-secret materialised by External Secrets so the bespoke
  # workloads can pull from the STACKIT Container Registry. List of {name: <secret>}.
  imagePullSecrets: []
  # Secure-by-default pod hardening applied to bespoke workloads.
  podSecurity:
    runAsNonRoot: true
    seccompProfile: RuntimeDefault

# -----------------------------------------------------------------------------
# Secure-by-default network baseline (security.md).
# Default-deny egress ships ON (secure by default). Agents reach the internet
# only via the egress proxy + governed web_fetch tool. NOTE: kind's kindnet CNI
# does not enforce NetworkPolicies; on STACKIT, Cilium enforces and adds
# FQDN-aware allowlists + DLP. See templates/network/egress-policies.yaml.
# -----------------------------------------------------------------------------
networkPolicies:
  defaultDeny: true

# -----------------------------------------------------------------------------
# Ingress + TLS — OFF by default (Mode A is port-forward only). When enabled
# (Mode B / STACKIT, see values.stackit-managed.yaml) the chart emits one Ingress
# per public tool whose `hosts.<key>` is set (templates/ingress.yaml): a
# cert-manager-issued TLS cert + a rule routing `/` to the tool's Service.
# Nothing renders while `enabled: false`, so the bundled path is untouched.
# -----------------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx            # ingress controller class (Mode B: ingress-nginx)
  tlsIssuer: letsencrypt-prod # cert-manager ClusterIssuer (cert-manager.io/cluster-issuer)
  annotations: {}             # extra annotations merged onto every tool Ingress
  # Per-tool public hostnames. Empty => that tool gets NO Ingress. Filled by the
  # Mode-B overlay (render-values.sh substitutes the DNS zone). Keys map to
  # Services in templates/ingress.yaml: osUI->os-ui:3000, litellm->litellm:4000,
  # langfuse->langfuse-web:3000, superset->superset:8088, forgejo->forgejo-http:3000,
  # argocd->argocd-server:80, openmetadata->openmetadata:8585.
  # osUIApex (opt-in) -> a SECOND os-ui:3000 Ingress on the bare zone apex
  # (e.g. agentic.datamasterclass.com) so the apex serves the OS UI instead of 404ing.
  hosts: {}

# -----------------------------------------------------------------------------
# Object storage — local stand-in for STACKIT Object Storage (MinIO, S3).
# Local-kind uses MinIO for reliable S3 (Iceberg multipart + Langfuse). SeaweedFS
# remains the air-gap/sovereign-bundled option but is unreliable for Iceberg on
# kind. On STACKIT this is disabled and the real Object Storage endpoint + an
# externally-managed Secret are used instead (values.stackit.yaml).
# -----------------------------------------------------------------------------
objectStorage:
  enabled: true
  # Backend mode. "bundled" (default) runs MinIO in-cluster; "external" (or
  # enabled:false) points the S3 consumers (Polaris, MLflow, query-tool, Langfuse,
  # KServe) at a managed endpoint via soa.s3Endpoint. The per-app AWS creds come
  # from `secretName` (same name in both modes; External Secrets supplies it on STACKIT).
  mode: bundled
  external:
    # Managed S3 endpoint used when objectStorage is external (e.g. STACKIT Object Storage).
    endpoint: ""
  # Name of the Secret holding S3 credentials. For profile=local the chart creates
  # it with the dev-only creds below; on STACKIT it must pre-exist (External Secrets).
  secretName: object-storage-credentials
  region: us-east-1            # clients just need a value
  buckets:
    - langfuse                 # Langfuse v3 blob store (events/media)
    - lakehouse                # Iceberg warehouse (Polaris / Layer 3)
    - mlflow                   # MLflow artifact store (Layer 4 Science; only used when mlflow.enabled)
  # MinIO is the local-kind S3 stand-in (reliable for Iceberg + Langfuse).
  # SeaweedFS is the air-gap/sovereign alternative but proved unreliable for
  # Iceberg writes on kind. MinIO is AGPL — local dev stand-in only, never bundled.
  image:
    repository: minio/minio
    digest: sha256:8834ae47a2de3509b83e0e70da9369c24bbbc22de42f2a2eddc530eee88acd1b
  awsCli:
    repository: amazon/aws-cli
    digest: sha256:e14216fb361cce909ce199616711ad103182d5937f851cda9bebf25867d7180a   # 2.31.13
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 768Mi }
  # Dev-only credentials, used ONLY when global.profile == local. Not a real secret:
  # the local stand-in has no production value. Overridable via values.local.yaml.
  local:
    accessKey: agentic-os-local
    secretKey: agentic-os-local-secret

# -----------------------------------------------------------------------------
# Postgres (infra tier) — CloudNativePG-managed.
# stack-decisions.md: infra DBs (Langfuse/Cube/OpenMetadata) run on plain Postgres
# via the CloudNativePG operator (continuous WAL backup + PITR in production).
# The operator itself is a cluster-scoped prerequisite (scripts/bootstrap-local.sh);
# this chart ships only the Cluster CR + the app database/credentials.
# -----------------------------------------------------------------------------
postgres:
  enabled: true
  # In-cluster engine (only applies when enabled:true):
  #   plain — a self-contained Postgres StatefulSet (official postgres image). It
  #           NEVER calls the Kubernetes API, so it works on STACKIT SKE-in-an-SNA
  #           where the internal SKE API hostname is unresolvable and CNPG's initdb
  #           pod (which calls that API) hangs. DEFAULT — like ClickHouse/Valkey/
  #           MinIO/OpenSearch, it just runs in-cluster.
  #   cnpg  — the CloudNativePG operator Cluster (requires the operator from
  #           scripts/bootstrap-local.sh). Adds HA + continuous WAL archiving/PITR
  #           to object storage, at the cost of the K8s-API dependency above.
  # Both engines share the SAME credential Secrets, the SAME `pg-rw:5432` Service,
  # and the SAME databases/users — consumers connect identically either way.
  engine: plain
  # When enabled:false (Mode B), no in-cluster Postgres is created and the PG
  # consumers (Langfuse, LiteLLM, Dagster, warehouse, Polaris, Superset, MLflow)
  # resolve their host via soa.pgHost -> external.host instead of `pg-rw`. The
  # per-app credential Secrets keep the SAME names (External Secrets supplies them).
  external:
    host: ""                   # managed PostgreSQL host (e.g. STACKIT PostgreSQL Flex)
    port: "5432"
  clusterName: pg              # creates services pg-rw / pg-ro / pg-r
  instances: 1                 # local: single instance (3 in production for HA)
  database: langfuse
  username: langfuse
  # Secret (kubernetes.io/basic-auth) for the app owner. For profile=local the chart
  # creates it from the dev password below; on STACKIT it must pre-exist (External Secrets).
  secretName: postgres-langfuse-credentials
  storageSize: 2Gi
  # Image for engine:cnpg — CloudNativePG's PostgreSQL build (operator needs a tag
  # for upgrade detection; tag@digest pins the exact image too).
  image:
    repository: ghcr.io/cloudnative-pg/postgresql
    tag: "17.5"
    digest: sha256:b1deeed2aa998b2f381e39c5cadb9ec06127708c8bd62965743af19abf21628f
  # Image for engine:plain — the official upstream Postgres (PostgreSQL license).
  # No Kubernetes-API dependency; bootstraps DBs/users purely from env + initdb.
  plainImage:
    repository: postgres
    tag: "17"
    digest: sha256:5c855ad7b85e68e48a62f34662853f38b57c1c1d80f3a927ab58034fd6d31c5e
  # Infra tier — wave 0, high-priority. BOTH engines carry the sync-wave
  # annotation + infra priorityClassName + memory requests/limits: the CNPG
  # Cluster in templates/postgres/cluster.yaml and the plain StatefulSet in
  # templates/postgres/statefulset.yaml. `resources` below applies to both.
  resources:
    # Request bumped so concurrent boot-time schema migrations (Langfuse, LiteLLM,
    # Dagster, Superset, OpenMetadata all migrate at once) have real headroom.
    requests: { cpu: 100m, memory: 384Mi }
    limits: { cpu: "1", memory: 1Gi }
  # Dev-only password, used ONLY when global.profile == local. Not a production secret.
  local:
    password: langfuse-local-dev
  # Additional databases on the SAME CNPG cluster, each as a managed role +
  # Database CR. Other services (LiteLLM, Dagster, …) own their own database.
  extraDatabases:
    - name: litellm           # LiteLLM admin UI + virtual keys + cost caps
      username: litellm
      secretName: postgres-litellm-credentials
      createdb: true          # Prisma's migration resolver needs a shadow DB
      localPassword: litellm-local-dev
    - name: dagster           # Dagster run/event/schedule storage
      username: dagster
      secretName: postgres-dagster-credentials
      createdb: false
      localPassword: dagster-local-dev
    - name: warehouse         # dbt-built analytics warehouse (read by Cube)
      username: warehouse
      secretName: postgres-warehouse-credentials
      createdb: false
      localPassword: warehouse-local-dev
    - name: openmetadata      # OpenMetadata catalog metadata
      username: openmetadata
      secretName: postgres-openmetadata-credentials
      createdb: false
      localPassword: openmetadata-local-dev
    - name: polaris           # Iceberg catalog metadata (CloudNativePG)
      username: polaris
      secretName: postgres-polaris-credentials
      createdb: false
      localPassword: polaris-local-dev
    - name: superset          # Superset metadata DB
      username: superset
      secretName: postgres-superset-credentials
      createdb: false
      localPassword: superset-local-dev
    - name: mlflow            # MLflow tracking + model registry backend (Layer 4 Science)
      username: mlflow
      secretName: postgres-mlflow-credentials
      createdb: false
      localPassword: mlflow-local-dev

# -----------------------------------------------------------------------------
# Valkey (BSD-3) — Langfuse queue/cache. NOT Redis (SSPL) — stack-decisions.md.
# Cache only; not backed up. Local: single ephemeral pod with auth.
# -----------------------------------------------------------------------------
valkey:
  enabled: true
  secretName: valkey-credentials   # local: chart-created; STACKIT: external
  image:
    repository: valkey/valkey
    tag: "8.1-alpine"
    digest: sha256:77643d152547b446fc15cbafaff22004545663fcd40c6b28038ad283837baa75
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 500m, memory: 256Mi }
  local:
    password: valkey-local-dev

# -----------------------------------------------------------------------------
# ClickHouse (Apache 2.0) — Langfuse v3 analytics backend.
# Local: single ephemeral node (cgroup-aware memory cap via the resource limit).
# Production uses native ClickHouse backup (stack-decisions.md).
# -----------------------------------------------------------------------------
clickhouse:
  enabled: true
  secretName: clickhouse-credentials   # local: chart-created; STACKIT: external
  database: langfuse
  user: langfuse
  image:
    repository: clickhouse/clickhouse-server
    tag: "24.8"
    digest: sha256:1ffa82edee000a42c09313bd9f1293d94c570aee74babc1b3ca9983a35fa597b
  # Infra tier — wave 0, high-priority (wired in templates/clickhouse/clickhouse.yaml).
  resources:
    # ClickHouse keeps mark/uncompressed caches resident; request reflects real
    # steady-state (~0.8–1Gi). The limit is cgroup-aware (CH caps max_server_memory_usage
    # to ~90% of it). A 2Gi limit OOMKilled (exit 137) on boot/migrations — ClickHouse's
    # resident caches + Langfuse schema migrations exceed 2Gi; 3Gi gives headroom.
    requests: { cpu: 200m, memory: 1Gi }
    limits: { cpu: "2", memory: 3Gi }
  local:
    password: clickhouse-local-dev

# -----------------------------------------------------------------------------
# Langfuse project keys (consumed by the sample agent + LiteLLM to send traces).
# For profile=local these provision a deterministic project via LANGFUSE_INIT_*
# (templates/langfuse/init.yaml). The secretKey is a dev throwaway; on STACKIT,
# real project keys are managed externally.
# -----------------------------------------------------------------------------
langfuseInit:
  publicKey: "pk-lf-localdev0000public"
  secretKey: "sk-lf-localdev0000secret"
  host: "http://agentic-os-langfuse-web:3000"

# -----------------------------------------------------------------------------
# Langfuse v3 (MIT core) — wrapped upstream subchart, wired to OUR backends.
# NOTE: this is the `langfuse` SUBCHART's value tree; the chart's own core
# config section is itself called `langfuse`, hence `langfuse.langfuse.*`.
# Secrets are referenced (never inlined): core secrets come from the local-only
# Secret created by templates/langfuse/core-secrets.yaml; backend passwords reuse
# the per-backend Secrets created earlier.
# -----------------------------------------------------------------------------
langfuse:
  enabled: true

  # ---- Langfuse application core ----
  langfuse:
    salt:
      secretKeyRef: { name: langfuse-core-secrets, key: salt }
    encryptionKey:
      secretKeyRef: { name: langfuse-core-secrets, key: encryptionKey }
    nextauth:
      url: http://localhost:3000        # local port-forward target
      secret:
        secretKeyRef: { name: langfuse-core-secrets, key: nextauthSecret }
    features:
      telemetryEnabled: false           # sovereign/offline — no phone-home
    # Headless org/project/key provisioning (Secret from templates/langfuse/init.yaml).
    additionalEnvFrom:
      - secretRef:
          name: langfuse-init

    # Middleware tier — wave 1. Applies to BOTH langfuse deployments (web + worker)
    # via the subchart's shared deployment annotations. NOTE: langfuse-k8s exposes
    # NO priorityClassName value, so these pods run at the cluster-default priority
    # (0) — below the infra tier (DB protected), which is the guarantee we need.
    deployment:
      annotations:
        argocd.argoproj.io/sync-wave: "1"   # startup.syncWaves.middleware
    # Right-sized so the previously-unbounded langfuse pods can't balloon during
    # the boot spike. web = Next.js UI; worker = event/ingestion processing.
    web:
      resources:
        requests: { cpu: 100m, memory: 768Mi }
        limits: { cpu: "1", memory: 1280Mi }
    worker:
      resources:
        requests: { cpu: 100m, memory: 768Mi }
        limits: { cpu: "1", memory: 1280Mi }

  # ---- Postgres: external (CloudNativePG `pg-rw`) ----
  postgresql:
    deploy: false
    host: pg-rw
    port: 5432
    auth:
      username: langfuse
      database: langfuse
      existingSecret: postgres-langfuse-credentials
      secretKeys:
        userPasswordKey: password
        adminPasswordKey: password

  # ---- Redis protocol: external Valkey ----
  redis:
    deploy: false
    host: valkey
    port: 6379
    auth:
      username: default
      existingSecret: valkey-credentials
      existingSecretPasswordKey: password

  # ---- ClickHouse: external single node (NOT a cluster) ----
  clickhouse:
    deploy: false
    host: clickhouse
    httpPort: 8123
    nativePort: 9000
    database: langfuse
    clusterEnabled: false               # single node — no ON CLUSTER DDL
    auth:
      username: langfuse
      existingSecret: clickhouse-credentials
      existingSecretKey: password

  # ---- Blob storage: external SeaweedFS (S3) ----
  s3:
    deploy: false
    storageProvider: s3
    bucket: langfuse
    region: us-east-1
    endpoint: http://minio:9000
    forcePathStyle: true                # required for non-AWS S3
    accessKeyId:
      secretKeyRef: { name: object-storage-credentials, key: AWS_ACCESS_KEY_ID }
    secretAccessKey:
      secretKeyRef: { name: object-storage-credentials, key: AWS_SECRET_ACCESS_KEY }

# -----------------------------------------------------------------------------
# Mock model — local OpenAI-compatible stub. Since the self-hosted model-server
# (Gemma E4B) became the DEFAULT CHAT backend, this is retained as the offline
# EMBEDDINGS provider (`sovereign-embed`): deterministic 384-dim hash vectors that
# match opensearch.knnDimension with zero download and no key. (Changing the embed
# model would change the vector dimension and reindex the whole retrieval store —
# out of scope here.) It still serves chat too, but LiteLLM no longer routes chat
# to it. Disabled on STACKIT (managed embeddings there).
# -----------------------------------------------------------------------------
mockModel:
  enabled: true
  image:
    repository: sovereign-os/mock-model   # built locally, loaded into kind
    tag: "0.1.1"                           # 0.1.1 adds poem mode
  embedDim: 384                            # must match opensearch.knnDimension
  resources:
    requests: { cpu: 25m, memory: 64Mi }
    limits: { cpu: 250m, memory: 128Mi }

# -----------------------------------------------------------------------------
# Model server — the DEFAULT self-hosted, OpenAI-compatible LLM (replaces the mock
# LLM for chat). A CPU llama.cpp/Ollama runtime serving a small permissively-
# licensed model (Gemma E4B, Q4) FULLY OFFLINE — no provider key, nothing leaves
# the sovereign boundary. LiteLLM routes `sovereign-default` (+ back-compat
# `sovereign-mock`) here and load-balances across `replicas` pods.
#
# SCALE (model-benchmark.md): a Gemma E4B Q4 CPU replica needs ~3-4 GB RAM; for
# ~30 concurrent users run ~3-5 replicas, OR a single small GPU. See
# docs/components/model-server.md. The first request per pod triggers a one-time
# model pull (needs egress to the model registry once; air-gap by baking weights
# into an image) — steady state is offline.
# -----------------------------------------------------------------------------
modelServer:
  enabled: true
  image:
    # Ollama (MIT) — OpenAI-compatible at /v1. Pinned for reproducibility.
    repository: ollama/ollama
    tag: "0.6.8"
  # Default model tag pulled on first boot (Ollama library tag). This is the real
  # Gemma 3n E4B Q4_K_M tag — verify with `ollama pull gemma3n:e4b-it-q4_K_M`.
  # ⚠ LICENSE: Gemma weights ship under the GEMMA TERMS OF USE (NOT Apache-2.0 —
  #   https://ai.google.dev/gemma/terms). They are redistributable & self-hostable
  #   but are NOT an OSI-permissive license; see NOTICE / THIRD-PARTY-LICENSES.md.
  #   To stay fully Apache-2.0-only, override to a permissive ALTERNATIVE such as
  #   Ministral 3 (e.g. model: "ministral-3:q4") or a Qwen Apache-2.0 tag.
  model: "gemma3n:e4b-it-q4_K_M"
  port: 11434
  # N replicas behind LiteLLM load-balancing (the Service round-robins). Bump for
  # more concurrent users (~3-5 for ~30 users on CPU).
  replicas: 2
  resources:
    # The gemma3n:e4b-it-q4_K_M tag is ~7.5 GB on disk; CPU resident set ~5-6 GB.
    # Give headroom so it doesn't OOMKill on load (cf. the ClickHouse 2->3Gi fix).
    requests: { cpu: "1", memory: 5Gi }
    limits: { cpu: "4", memory: 8Gi }
  persistence:
    # OFF locally (emptyDir per pod — re-pulls on restart). For a shared, no-re-pull
    # model cache set enabled + an RWX storageClass (or RWO with replicas:1).
    enabled: false
    size: 10Gi
    accessMode: ReadWriteOnce
    storageClass: ""
  # Optional BIGGER self-hosted model (toggle, OFF by default) — a GPU vLLM serving
  # a larger Apache-2.0 model (Qwen 3.6 / Mistral) for harder escalations, sitting
  # BELOW STACKIT in the fallback chain. Registered with LiteLLM as `sovereign-big`.
  # Enabling it needs a GPU node pool AND adding `sovereign-big` to the fallback
  # chain (see litellm.proxy_config.router_settings below). Not for a kind box.
  big:
    enabled: false
    image:
      repository: vllm/vllm-openai
      tag: "v0.6.6"
    # vLLM CLI args — point at a permissively-licensed model id.
    args:
      - "--model"
      - "Qwen/Qwen3.6-27B"
      - "--port"
      - "8000"
    port: 8000
    replicas: 1
    resources:
      requests: { cpu: "2", memory: 16Gi, nvidia.com/gpu: "1" }
      limits: { cpu: "8", memory: 32Gi, nvidia.com/gpu: "1" }

# -----------------------------------------------------------------------------
# STACKIT AI Model Serving — PREMIUM, managed, pay-per-token. NOT the default.
# Used ONLY as (a) the LAST-RESORT fallback when every self-hosted route is
# unreachable/overloaded, and (b) the route for VISION inputs (`sovereign-vision`).
# Confirmed catalog id (STACKIT docs, available-shared-models):
#   Qwen/Qwen3-VL-235B-A22B-Instruct-FP8  (multimodal, OpenAI-compatible)
# The PUBLIC default is fully self-hosted/offline: leave `enabled: false` and no
# STACKIT account/key is needed. The model_list entries below still exist so the
# fallback/vision routes are DEFINED; with no key they simply error if reached.
# HARD COST GUARDRAIL: a dedicated per-key/per-model spend cap on the agent key
# (litellmAgentKey.modelMaxBudget) — surfaced in Monitoring (Langfuse cost per
# call) and the LiteLLM admin UI spend-per-key.
# -----------------------------------------------------------------------------
stackitPremium:
  enabled: false                 # opt-in; public default is self-hosted only
  # OpenAI-compatible base URL for STACKIT AI Model Serving (eu01).
  apiBaseUrl: "https://api.openai-compat.model-serving.eu01.onstackit.cloud/v1"
  # Confirmed STACKIT catalog model ids.
  visionModelId: "Qwen/Qwen3-VL-235B-A22B-Instruct-FP8"   # vision + last-resort chat
  chatModelId: "Qwen/Qwen3-VL-235B-A22B-Instruct-FP8"     # reuse the VLM for text fallback
  secretName: stackit-ai-model-serving-key
  # Local dev: key stays EMPTY (route defined but unauthenticated; only errors if
  # actually reached). On STACKIT the real key arrives via External Secrets below.
  local:
    apiKey: ""
  externalSecrets:
    enabled: false               # turn on with ESO + a STACKIT Secrets Manager store
    secretStoreRef:
      name: stackit-secrets-manager
      kind: ClusterSecretStore
    remoteKey: stackit-ai-model-serving-key
    property: apiKey

# -----------------------------------------------------------------------------
# LiteLLM master key (consumed by the sample agent to call the gateway).
# Local dev throwaway; external on STACKIT.
# -----------------------------------------------------------------------------
litellmMasterKey: "sk-litellm-local-dev-master"

# LiteLLM admin UI login (DB-backed UI at /ui). Local dev throwaway.
litellmUI:
  username: "admin"
  password: "litellm-admin-local-dev"

# -----------------------------------------------------------------------------
# Scoped virtual key for the agents (least privilege — security.md). Provisioned
# in LiteLLM by a post-install hook; the agents use THIS instead of the master
# key. Limited to the two models, with a cost cap.
# -----------------------------------------------------------------------------
litellmAgentKey:
  enabled: true
  secretName: agent-litellm-key
  alias: "sovereign-agents"
  maxBudget: 5            # overall USD spend cap on this key
  models:                 # only these models are callable with this key
    - sovereign-default   # Gemma E4B (self-hosted default chat)
    - sovereign-mock      # back-compat alias -> same self-hosted default
    - sovereign-embed     # offline embeddings (mock-model)
    - sovereign-vision    # vision route -> STACKIT Qwen3-VL
    - sovereign-premium   # last-resort fallback -> STACKIT Qwen3-VL
  # HARD COST GUARDRAIL: a dedicated per-model USD cap for the pay-per-token
  # STACKIT routes (self-hosted models are free, so no cap needed there). LiteLLM
  # blocks calls to a model once its cap is hit — independent of the overall cap.
  modelMaxBudget:
    sovereign-premium: 2
    sovereign-vision: 2
  # Per-key rate limits with graceful queueing (security.md). rpm/tpm soft-limit
  # the key; max_parallel_requests caps in-flight calls; the router's num_retries
  # back-pressures bursts instead of hard-failing.
  rpmLimit: 120
  tpmLimit: 200000
  maxParallelRequests: 8
  local:
    value: "sk-agents-local-dev"

# -----------------------------------------------------------------------------
# LiteLLM — model/MCP gateway (wrapped upstream subchart, alias `litellm`).
# DB-less thin slice: master key + static config routing to the mock model.
# Also ships gateway traces to Langfuse via the success_callback.
# -----------------------------------------------------------------------------
litellm:
  enabled: true
  # Use the existing CloudNativePG database (enables the admin UI + virtual keys
  # + cost caps). No bundled Bitnami Postgres.
  db:
    deployStandalone: false
    useExisting: true
    endpoint: pg-rw
    database: litellm
    secret:
      name: postgres-litellm-credentials
      usernameKey: username
      passwordKey: password
  migrationJob:
    # Keep enabled: the subchart sets DISABLE_SCHEMA_UPDATE=true on the proxy
    # container when this is on, so the running proxy never races the DB on a
    # `prisma db push` at startup. The ACTUAL schema migration is owned by the
    # initContainer below (extraInitContainers), NOT this Job — see why there.
    enabled: true
  # ---------------------------------------------------------------------------
  # Schema migration as an initContainer on the proxy pod (NOT a Helm/Argo hook).
  #
  # ROOT-CAUSE FIX: the subchart owns the migration only via its `migrations` Job,
  # which is hook-gated — an ArgoCD `PreSync` hook by default (migrationJob.hooks),
  # and a Helm pre-install/pre-upgrade hook if hooks.helm.enabled. On this cluster
  # the deploy is forced to run `helm ... --no-hooks` (the argo-cd
  # `argocd-redis-secret-init` pre-upgrade hook fails here), and any hook-gated
  # migration is unreliable under that constraint (a Helm-hook migration is
  # skipped outright; a PreSync/Job migration can be skipped or fail without
  # blocking the proxy) — so the LiteLLM Prisma schema ended up missing and agents
  # hit 401s. An initContainer is part of the Deployment, so it runs on EVERY pod
  # start regardless of `--no-hooks` / hooks-disabled / ArgoCD sync — making the
  # schema unconditional rather than hook-dependent.
  #
  # `prisma migrate deploy` (via the proxy's prisma_migration.py) is idempotent
  # and independent of DISABLE_SCHEMA_UPDATE, and gates the proxy: the proxy
  # container will not start until the schema exists in pg-rw/litellm — so agents
  # can never reach LiteLLM before the schema is present. Reuses the subchart
  # migration Job's image + command, with the DB-connection env it needs. (Where
  # the subchart Job does still run it is a redundant idempotent no-op — kept
  # enabled only for the DISABLE_SCHEMA_UPDATE=true it sets on the proxy, above.)
  extraInitContainers:
    - name: db-migrate
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
      imagePullPolicy: "{{ .Values.image.pullPolicy }}"
      command: ["python", "litellm/proxy/prisma_migration.py"]
      workingDir: "/app"
      env:
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef: { name: postgres-litellm-credentials, key: username }
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef: { name: postgres-litellm-credentials, key: password }
        - name: DATABASE_HOST
          value: pg-rw
        - name: DATABASE_NAME
          value: litellm
        # $(VAR) refers to the env vars defined above (k8s dependent-env expansion).
        - name: DATABASE_URL
          value: postgresql://$(DATABASE_USERNAME):$(DATABASE_PASSWORD)@$(DATABASE_HOST)/$(DATABASE_NAME)
        # Force the migration to run here even though the proxy container has it
        # disabled (schema ownership lives in this initContainer).
        - name: DISABLE_SCHEMA_UPDATE
          value: "false"
      resources:
        # Prisma client-generate + `migrate deploy` spikes RAM; 1Gi OOMKills
        # (exit 137) on a cold DB. 2Gi limit matches the proxy container and
        # migrates a fresh schema reliably. Short-lived (runs once per pod start).
        requests: { cpu: 100m, memory: 512Mi }
        limits: { cpu: "1", memory: 2Gi }
  # Master key + Langfuse env come from our local Secret.
  masterkeySecretName: litellm-credentials
  masterkeySecretKey: masterkey
  environmentSecrets:
    - litellm-credentials
  # Middleware tier — wave 1. deploymentAnnotations lands on the Deployment
  # metadata (Argo ordering). NOTE: litellm-helm exposes NO priorityClassName
  # value, so this pod runs at the cluster-default priority (0) — already below
  # the infra tier, which is what matters (DB protected). Documented gap.
  deploymentAnnotations:
    argocd.argoproj.io/sync-wave: "1"      # startup.syncWaves.middleware
  resources:
    # This proxy was OOMKilled during the all-at-once boot. Honest steady-state
    # request (~1Gi; the import-heavy proxy needs >1Gi or it OOMs) + a 2Gi limit
    # so a transient spike no longer kills it.
    requests: { cpu: 100m, memory: 1Gi }
    limits: { cpu: "1", memory: 2Gi }
  proxy_config:
    model_list:
      # --- Self-hosted DEFAULT (Gemma E4B, fully offline, no key) --------------
      # `sovereign-default` is the cheap-first light tier. The k8s Service in front
      # of the model-server Deployment round-robins across its `replicas` pods, so
      # this single entry already load-balances; LiteLLM adds retries/fallbacks on
      # top. `sovereign-mock` is a back-compat ALIAS (existing agents/UI default to
      # that name) pointing at the SAME self-hosted default — despite the name it is
      # now real Gemma, not the stub.
      # NOTE: proxy_config is static config (the LiteLLM subchart consumes it as-is,
      # in its OWN value context), so these are LITERALS — keep `model` and the
      # api_base port in sync with modelServer.model / modelServer.port above.
      - model_name: sovereign-default
        litellm_params:
          model: openai/gemma3n:e4b-it-q4_K_M          # == modelServer.model
          api_base: http://model-server:11434/v1   # == modelServer.port
          api_key: "sk-local-unused"          # self-hosted; ignored, not a secret
      - model_name: sovereign-mock            # back-compat alias -> Gemma default
        litellm_params:
          model: openai/gemma3n:e4b-it-q4_K_M
          api_base: http://model-server:11434/v1
          api_key: "sk-local-unused"
      # --- Offline embeddings (mock-model, deterministic 384-dim) -------------
      - model_name: sovereign-embed
        litellm_params:
          model: openai/mock-embed
          api_base: http://mock-model:8080/v1
          api_key: "sk-mock-unused"
      # --- STACKIT premium: VISION route + LAST-RESORT fallback (pay-per-token) -
      # Not the default. Key is empty unless stackitPremium is configured, so these
      # only succeed when STACKIT is wired; otherwise they error (acceptable — they
      # are the final fallback). Spend is capped on the virtual key (modelMaxBudget).
      - model_name: sovereign-vision          # vision inputs route here
        litellm_params:
          model: openai/Qwen/Qwen3-VL-235B-A22B-Instruct-FP8   # == stackitPremium.visionModelId
          api_base: os.environ/STACKIT_API_BASE
          api_key: os.environ/STACKIT_API_KEY
      - model_name: sovereign-premium         # last-resort text fallback
        litellm_params:
          model: openai/Qwen/Qwen3-VL-235B-A22B-Instruct-FP8   # == stackitPremium.chatModelId
          api_base: os.environ/STACKIT_API_BASE
          api_key: os.environ/STACKIT_API_KEY
    # ------------------------------------------------------------------------
    # Router — fallback chain, retries, timeouts, circuit-breaking, load-balancing.
    # Chain: self-hosted Gemma replicas -> STACKIT (last resort). To insert the
    # OPTIONAL bigger self-host (modelServer.big.enabled) BEFORE STACKIT, add a
    # `sovereign-big` model_list entry (api_base http://model-server-big:8000/v1)
    # and change the fallbacks below to ["sovereign-big","sovereign-premium"].
    # STACKIT fires ONLY if all self-hosted fail, OR when the caller selects the
    # vision route. Escalation (failed verifier / low confidence / high-stakes) is
    # the agent choosing a heavier model_name; LiteLLM logs model + cost per call
    # to Langfuse so the tier and spend are visible in Monitoring.
    # ------------------------------------------------------------------------
    router_settings:
      routing_strategy: simple-shuffle        # load-balance across healthy deployments
      num_retries: 3                          # retry transient failures before failover
      timeout: 120                            # per-request timeout (s)
      allowed_fails: 3                        # circuit-breaking: trip after N fails...
      cooldown_time: 60                       # ...then cool the deployment down (s)
      fallbacks:
        - sovereign-default: ["sovereign-premium"]
        - sovereign-mock: ["sovereign-premium"]
    litellm_settings:
      success_callback: ["langfuse"]          # gateway-level tracing to Langfuse
      drop_params: true
    general_settings:
      master_key: os.environ/PROXY_MASTER_KEY
    # MCP gateway — register tool servers; agents call them via LiteLLM
    # (per-key access). The DuckDB lakehouse query tool; Superset/OpenMetadata/
    # dbt MCP servers get added as they come online.
    mcp_servers:
      sovereign_query:
        url: "http://query-tool:8000/mcp"
        transport: "http"
        description: "DuckDB query over the lakehouse (Iceberg) — default query engine"

# -----------------------------------------------------------------------------
# OpenSearch — retrieval backbone (vector + lexical). Single node for local.
# Security plugin disabled here for a simple local slice; the secure-by-default
# network baseline (default-deny + egress) is a later expansion step. Service
# is named `opensearch` (clusterName/masterService) for a clean client URL.
# -----------------------------------------------------------------------------
opensearch:
  enabled: true
  # When enabled:false (Mode B), the bundled OpenSearch subchart is NOT deployed and
  # consumers (sample agent, Haystack) resolve their endpoint via soa.opensearchUrl
  # -> external.{protocol,host,port}. NOTE: managed OpenSearch requires auth; the
  # bespoke agent/Haystack images do not yet consume an OpenSearch credential Secret
  # (see external.secretName) — wiring those auth envs is a follow-up (documented gap).
  external:
    protocol: https            # managed endpoints terminate TLS
    host: ""                   # managed OpenSearch host
    port: "9200"
    secretName: opensearch-credentials
  clusterName: opensearch
  masterService: opensearch
  singleNode: true
  replicas: 1
  protocol: http                          # security plugin disabled -> plain HTTP
  opensearchJavaOpts: "-Xmx512M -Xms512M"
  securityConfig:
    enabled: false
  persistence:
    enabled: false                        # ephemeral local stand-in
  sysctlInit:
    enabled: true                         # set vm.max_map_count=262144
  extraEnvs:
    - name: DISABLE_INSTALL_DEMO_CONFIG
      value: "true"
    - name: DISABLE_SECURITY_PLUGIN
      value: "true"
  # Infra tier — wave 0. openSearchAnnotations lands on the StatefulSet metadata
  # (Argo reads it for ordering); priorityClassName protects it from eviction.
  # COUPLING: this is the one subchart whose priorityClassName references the infra
  # PriorityClass directly (subchart values can't read the `priorityClasses.enabled`
  # gate). If you set priorityClasses.enabled=false, ALSO clear this line, or this
  # StatefulSet will reference a non-existent PriorityClass. Default (enabled) ships.
  openSearchAnnotations:
    argocd.argoproj.io/sync-wave: "0"     # startup.syncWaves.infra
  priorityClassName: sovereign-os-infra   # priorityClasses.infra.name
  resources:
    # Heap is -Xmx512M; request covers heap + Lucene off-heap/page cache.
    requests: { cpu: 250m, memory: 1Gi }
    limits: { cpu: "2", memory: 1536Mi }

# OpenSearch Dashboards — UI over OpenSearch. Security disabled to match the
# (local) security-disabled OpenSearch node. (Aliased `osdashboards` so k8s
# resource names stay RFC-1123 valid.)
osdashboards:
  enabled: true
  fullnameOverride: opensearch-dashboards
  opensearchHosts: "http://opensearch:9200"
  replicaCount: 1
  extraEnvs:
    - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
      value: "true"
  # App tier — wave 2 (UI, not critical path). dashboardAnnotations -> Deployment.
  # No priorityClassName set: app subcharts run at the cluster-default priority (0),
  # already below the infra tier — so disabling priorityClasses leaves no dangling
  # class reference here (only the gated bespoke pods + opensearch carry one).
  dashboardAnnotations:
    argocd.argoproj.io/sync-wave: "2"     # startup.syncWaves.apps
  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits: { cpu: "1", memory: 1Gi }

# Shared retrieval settings (consumed by the sample agent's index bootstrap).
# Dimension MUST match mockModel.embedDim.
retrieval:
  indexName: knowledge
  knnDimension: 384

# -----------------------------------------------------------------------------
# Sample LangGraph agent — the agent-core slice's proof of life.
# retrieve (OpenSearch) -> generate (LiteLLM) -> traced (Langfuse).
# -----------------------------------------------------------------------------
sampleAgent:
  enabled: true
  image:
    repository: sovereign-os/sample-agent   # built locally, loaded into kind
    tag: "0.1.0"
  chatModel: sovereign-mock
  embedModel: sovereign-embed
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }
  # Seed knowledge ingested into OpenSearch on startup (editable, no rebuild).
  knowledge:
    - title: "Retrieval backbone"
      text: >-
        OpenSearch is the retrieval backbone of the Sovereign Agentic OS,
        providing hybrid vector and lexical search for RAG. There is no pgvector.
    - title: "Model gateway"
      text: >-
        LiteLLM is the model and MCP gateway. Agents call one governed endpoint
        with per-key access control, cost caps, and logging.
    - title: "Observability"
      text: >-
        Langfuse v3 provides observability and tracing for every agent action,
        backed by Postgres, ClickHouse, and Valkey.
    - title: "Sovereignty"
      text: >-
        The platform is self-hosted on STACKIT in the EU for data residency,
        assembled only from permissively licensed open source.

# -----------------------------------------------------------------------------
# Poet agent — a second LangGraph agent that writes a poem file each run
# (compose via LiteLLM -> save to a PVC), traced in Langfuse. Pull poems with
# scripts/get-poems.sh.
# -----------------------------------------------------------------------------
poetAgent:
  enabled: true
  image:
    repository: sovereign-os/poet-agent     # built locally, loaded into kind
    tag: "0.1.0"
  chatModel: sovereign-mock
  defaultTopic: "the sovereign cloud"
  storageSize: 1Gi
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

# =============================================================================
# Layer 2 (Context / Foundations) — added incrementally, validated one at a time.
# =============================================================================

# -----------------------------------------------------------------------------
# OPA — policy-as-code at the MCP/tool boundary. Default-deny tool authorization.
# `grants` maps a principal (LiteLLM key / agent identity) to its allowed tools;
# internet tools (web_fetch) are intentionally omitted -> denied until granted.
# -----------------------------------------------------------------------------
opa:
  enabled: true
  image:
    repository: openpolicyagent/opa
    tag: "1.4.2-static"
    digest: sha256:3c995dc8a59f6ddfd92eb7404d2f7ff9fe71cd025d9251199957a8a6afbfd76e
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 250m, memory: 128Mi }
  grants:
    sovereign-agents:           # the default agent key — no internet
      - rag_search
      - llm_generate
      - query                    # DuckDB lakehouse query MCP tool
    sovereign-agents-web:        # explicitly granted the governed web tool
      - rag_search
      - llm_generate
      - query
      - web_fetch
    sales-assistant:            # Agent golden-path slice — scoped LiteLLM key
      - metrics                  # Cube semantic layer (same metric as the BI)
      - retrieve                 # governed RAG over contract + discount policy
      - connection_crm_read      # read the CRM account (low-stakes)
      - connection_crm_write     # write the CRM — high-stakes (see requiresApproval)
      - write_file               # agent-output sandbox (drafts/exports)
      - knowledge_certify        # propose certify — high-stakes (approval-gated)
      - predict                  # consume the deployed churn model (Science golden path §7)
    churn-model:                # Layer-4 model-as-tool — the deployed churn model's identity
      - predict                  # KServe InferenceService exposed as a governed MCP tool
    # Connections golden-path slice — each manually-credentialed Connection
    # compiles its capability profile into per-connection OPA policy data. These
    # two are the worked examples (Notion MCP + Salesforce API). Only ENABLED,
    # in-scope tools are granted; Off/Blocked tools are absent (default-deny). The
    # OS UI ALSO mirrors this offline (lib/agent-governed.ts) so the gate is
    # demonstrable with no live OPA. Principal = conn-<slug> of the connection.
    conn-notion-workspace:      # MCP connection — reads on, create held for approval
      - notion_search
      - notion_get_page
      - notion_create_page       # Write-approval (see requiresApproval); delete is Blocked (absent)
    conn-salesforce-sales-org:  # API connection — reads scoped to Sales, bounded write
      - read_account
      - read_opportunity
      - update_opportunity_amount # Write-bounded (≤ €X enforced in policy); delete/mass_update absent
  # High-stakes tools held for human approval even when granted (golden path §7):
  # external connection writes + knowledge certify/publish. The grant lets the
  # agent ATTEMPT it; the approval gate (Governance tab) decides.
  requiresApproval:
    - connection_crm_write
    - knowledge_certify
    - notion_create_page         # Connections slice: Write-approval (Notion create page)

# -----------------------------------------------------------------------------
# Sales Assistant — the Agent golden-path vertical slice. Ships AGENT.md +
# MEMORY.md as a versioned ConfigMap (templates/sales-assistant/). The supervisor
# runs inside the OS UI (lib/sales-assistant.ts) over the governed LiteLLM + OPA +
# Langfuse spine; its scoped key is opa.grants `sales-assistant` above. ConfigMap
# only — no extra workload, so it's effectively free to keep on.
# -----------------------------------------------------------------------------
salesAssistant:
  enabled: true

# -----------------------------------------------------------------------------
# Docling — document parsing (docling-serve). Parses uploaded docs into
# text/markdown for the knowledge index.
# -----------------------------------------------------------------------------
docling:
  enabled: true
  image:
    repository: quay.io/docling-project/docling-serve-cpu
    tag: "latest"
    digest: sha256:7b7448d333e0e444adcc3818c65f87bc3e5861bea4f72100e4ac49048d73eae3
  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits: { cpu: "2", memory: 2Gi }

# -----------------------------------------------------------------------------
# Haystack — RAG retrieval pipeline over OpenSearch (embeds via LiteLLM).
# Uses its own index so it doesn't collide with the sample agent's index.
# -----------------------------------------------------------------------------
haystack:
  enabled: true
  image:
    repository: sovereign-os/haystack-retriever   # built locally, loaded into kind
    tag: "0.1.0"
  embedModel: sovereign-embed
  indexName: haystack_knowledge
  topK: 3
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 768Mi }

# -----------------------------------------------------------------------------
# Dagster — data orchestrator (subchart). External CloudNativePG `dagster` DB;
# a minimal example user-code deployment for now (dbt assets land in the dbt step).
# -----------------------------------------------------------------------------
dagster:
  enabled: true
  postgresPasswordLocal: dagster-local-dev    # must match postgres.extraDatabases dagster
  # External Postgres (our CNPG), password from the Secret above.
  generatePostgresqlPasswordSecret: false
  global:
    postgresqlSecretName: dagster-postgresql
  postgresql:
    enabled: false
    postgresqlHost: pg-rw
    postgresqlUsername: dagster
    postgresqlDatabase: dagster
  # Official dagster/* images are amd64-only; we use an arm64-native image we
  # build (sovereign-os/dagster) for webserver, daemon, and user-code.
  dagster-user-deployments:
    enabled: true
    deployments:
      - name: example-user-code
        # App tier — wave 2 (lands on the user-code Deployment metadata).
        annotations:
          argocd.argoproj.io/sync-wave: "2"   # startup.syncWaves.apps
        image:
          repository: sovereign-os/dagster
          tag: "0.2.0"
          pullPolicy: IfNotPresent
        dagsterApiGrpcArgs:
          - "--python-file"
          - "/opt/dagster/app/repo.py"
        port: 3030
        # Warehouse creds for dbt runs (env propagates to launched run pods via
        # includeConfigInLaunchedRuns). username/password come from the Secret.
        env:
          - { name: PGHOST, value: pg-rw }
          - { name: PGDATABASE, value: warehouse }
          - { name: PGSCHEMA, value: analytics }
        envSecrets:
          - name: postgres-warehouse-credentials
        resources:
          requests: { cpu: 50m, memory: 384Mi }
          limits: { cpu: "1", memory: 1Gi }   # headroom for dbt materializations
  # App tier — wave 2. NOTE: the dagster subchart exposes NO priorityClassName for
  # webserver/daemon/user-code, so these run at the cluster-default priority (0),
  # already below the infra tier (DB protected). Documented gap.
  dagsterWebserver:
    annotations:
      argocd.argoproj.io/sync-wave: "2"     # startup.syncWaves.apps
    image:
      repository: sovereign-os/dagster
      tag: "0.2.0"
      pullPolicy: IfNotPresent
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 500m, memory: 512Mi }
  dagsterDaemon:
    annotations:
      argocd.argoproj.io/sync-wave: "2"     # startup.syncWaves.apps
    image:
      repository: sovereign-os/dagster
      tag: "0.2.0"
      pullPolicy: IfNotPresent
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 500m, memory: 512Mi }

# -----------------------------------------------------------------------------
# dbt — transforms the seed data into the analytics warehouse (CNPG `warehouse`).
# Runs as a post-install hook Job; Cube reads the resulting models.
# -----------------------------------------------------------------------------
dbt:
  enabled: true
  image:
    repository: sovereign-os/dbt     # built locally, loaded into kind
    tag: "0.1.0"
  warehouse:
    database: warehouse
    schema: analytics
    secretName: postgres-warehouse-credentials

# -----------------------------------------------------------------------------
# Cube — semantic/metrics layer over the dbt warehouse (CNPG `warehouse`).
# Dev mode enables the Cube Playground. Metrics defined on analytics.daily_revenue.
# -----------------------------------------------------------------------------
cube:
  enabled: true
  image:
    repository: cubejs/cube
    digest: sha256:42418fc85830763178abd45ca93e60fefec27effb92418f9d977699bc38483f5
  warehouse:
    database: warehouse
    secretName: postgres-warehouse-credentials
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 768Mi }
  local:
    apiSecret: cube-local-dev-secret

# -----------------------------------------------------------------------------
# OpenMetadata — catalog/lineage (subchart). External CNPG `openmetadata` DB +
# our OpenSearch as the search backend; Airflow ingestion disabled (no Airflow
# locally — metadata crawls run as K8s Jobs in production). basic auth; the
# server image ships dev JWT keys. Heavy (JVM) — toggled with build-and-toggle.
# -----------------------------------------------------------------------------
openmetadata:
  enabled: true
  replicaCount: 1
  openmetadata:
    config:
      database:
        host: pg-rw
        port: 5432
        driverClass: org.postgresql.Driver
        dbScheme: postgresql
        databaseName: openmetadata
        auth:
          username: openmetadata
          password:
            secretRef: postgres-openmetadata-credentials
            secretKey: password
        dbParams: "sslmode=prefer"
      elasticsearch:                 # our OpenSearch (security disabled, http)
        enabled: true
        host: opensearch
        searchType: opensearch
        port: 9200
        scheme: http
        auth:
          enabled: false
      pipelineServiceClientConfig:
        enabled: false               # no Airflow ingestion locally
  extraEnvs:
    - name: OPENMETADATA_HEAP_OPTS
      value: "-Xmx2g -Xms1g"
  # App tier — wave 2. Booting OM after the infra wave is healthy fixes the
  # Init:Error it hit when it raced OpenSearch/Postgres during the all-at-once
  # boot. deploymentAnnotations -> Deployment metadata (Argo ordering). NOTE: the
  # openmetadata subchart has no priorityClassName value (cluster-default 0).
  deploymentAnnotations:
    argocd.argoproj.io/sync-wave: "2"       # startup.syncWaves.apps
  resources:
    # JVM heap is -Xmx2g; request reflects that (the process WILL use ~2g) and the
    # 3Gi limit covers heap + metaspace + threads + direct buffers without OOM.
    requests: { cpu: 200m, memory: 2Gi }
    limits: { cpu: "2", memory: 3Gi }

# =============================================================================
# Secure-by-default egress baseline (security.md) — default-deny + proxy +
# governed web tool. Agents get no raw internet; outbound is granted, proxied,
# allowlisted, audited.
# =============================================================================

# Egress proxy (tinyproxy) — the single outbound chokepoint. Allowlist-only.
egressProxy:
  enabled: true
  image:
    repository: sovereign-os/egress-proxy    # built locally, loaded into kind
    tag: "0.1.0"
  # Approved external domains (matched against host; subdomains included).
  # Default-deny otherwise. example.com proves the allow path locally. The
  # Connections golden path checks every external endpoint against this list
  # (Admin guardrail) before a Connection may be created; the slice's Notion +
  # Salesforce endpoints are allowlisted here (and mirrored in lib/secrets.ts).
  allowlist:
    - example.com
    - github.com
    - salesforce.com           # Connections slice — Salesforce API endpoints
    - my.salesforce.com
    - login.salesforce.com
    - notion.com               # Connections slice — Notion MCP endpoints
    - mcp.notion.com
    - api.notion.com
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 250m, memory: 96Mi }

# Governed web_fetch tool — OPA-authorized, proxy-routed, sanitized. The only
# sanctioned path to the web; present-but-restricted.
webFetch:
  enabled: true
  image:
    repository: sovereign-os/web-fetch     # built locally, loaded into kind
    tag: "0.1.0"
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 250m, memory: 128Mi }

# -----------------------------------------------------------------------------
# Connections golden path — manually-credentialed Connections (API/MCP/Database/
# SaaS) a Builder/Admin creates. The connection RECORD holds metadata + a Secrets
# Manager reference; the credential lives ONLY in Secrets Manager, synced via the
# External Secrets Operator. `externalSecrets.enabled` renders example
# ExternalSecret CRs for the slice (default OFF — ESO CRDs aren't installed
# locally; helm template/lint stay valid). The capability profile, egress
# guardrail and approval gate run in the OS UI over the same LiteLLM+OPA+Langfuse
# spine; `opa.grants` (conn-*) above is the compiled, in-cluster policy data.
# -----------------------------------------------------------------------------
connections:
  enabled: true
  externalSecrets:
    enabled: false             # turn on once the External Secrets Operator + a
                               # STACKIT Secrets Manager SecretStore are installed
    secretStoreRef:
      name: stackit-secrets-manager
      kind: ClusterSecretStore
    # The slice's two worked-example connections. Each maps a Secrets Manager
    # entry to a K8s Secret the connection proxy mounts — the value never touches
    # git or a connection record; only this reference does.
    items:
      - name: connection-notion-workspace
        remoteKey: connection-notion-workspace
        property: mcp-token
      - name: connection-salesforce-sales-org
        remoteKey: connection-salesforce-sales-org
        property: oauth-token

# =============================================================================
# Layer 3 (Self-service) — lakehouse, query MCP tools, dashboards, delivery.
# =============================================================================

# -----------------------------------------------------------------------------
# Polaris — Iceberg REST catalog. Local persistence is in-memory (stand-in);
# production uses relational-jdbc against a CNPG `polaris` DB. Warehouse storage
# is SeaweedFS (S3) locally.
# -----------------------------------------------------------------------------
polaris:
  enabled: true
  image:
    repository: apache/polaris
    tag: "1.0.1-incubating"
    digest: sha256:91d94987a2641220091c612900db30dbb596b45c3379115dbe08c4dd3b0855f9
  persistenceType: in-memory      # local; relational-jdbc (CNPG) for STACKIT
  realm: default-realm
  secretName: polaris-credentials  # local: chart-created; STACKIT: external
  s3:
    endpoint: http://minio:9000
    region: us-east-1
  catalog:
    name: lakehouse
    baseLocation: s3://lakehouse/wh
  local:
    rootClientId: root
    rootClientSecret: polaris-local-dev-secret
  # Quarkus/JVM catalog — request reflects steady JVM footprint (heap + metaspace).
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits: { cpu: "2", memory: 1Gi }

# -----------------------------------------------------------------------------
# DuckDB query tool — the default query engine over the lakehouse (Iceberg).
# Trino/Spark are optional scale modules (off by default — see below).
# -----------------------------------------------------------------------------
queryTool:
  enabled: true
  image:
    repository: sovereign-os/query-tool     # built locally, loaded into kind
    tag: "0.2.0"                             # 0.2.0 adds the MCP server
  namespace: analytics                       # Iceberg namespace for the sample
  baseLocation: s3://lakehouse/wh
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 768Mi }

# Trino — optional scale/federation engine (off by default; DuckDB is the default).
trino:
  enabled: false

# Apache Spark — optional distributed batch/ETL engine (off by default).
spark:
  enabled: false

# -----------------------------------------------------------------------------
# Superset — dashboards/BI (subchart). External CNPG `superset` DB; web-only with
# SimpleCache (no Redis/workers) locally to keep it light. Connect it to the dbt
# warehouse / Cube for charts.
# -----------------------------------------------------------------------------
superset:
  enabled: true
  # Custom image = apache/superset:6.1.0 + psycopg2 (the stock 6.1.0 image lacks
  # the Postgres driver in its venv). Built locally, loaded into kind.
  image:
    repository: sovereign-os/superset
    tag: "6.1.0"
    pullPolicy: IfNotPresent
  postgresql:
    enabled: false              # external CNPG
  redis:
    enabled: false              # web-only, SimpleCache
  # The chart always deploys the worker/beat; scale to 0 (no Celery/Redis locally).
  supersetWorker:
    replicas:
      enabled: true
      replicaCount: 0
  supersetCeleryBeat:
    enabled: false
  init:
    loadExamples: false
    adminUser:
      username: admin
      firstname: Admin
      lastname: User
      email: admin@datamasterclass.com
      password: superset-admin-local-dev
  supersetNode:
    # App tier — wave 2. deploymentAnnotations -> supersetNode Deployment metadata.
    # NOTE: the superset chart has no supersetNode priorityClassName value (it does
    # for worker/beat, which we scale to 0), so the web pod runs at cluster-default
    # priority (0) — below the infra tier (DB protected). Documented gap.
    deploymentAnnotations:
      argocd.argoproj.io/sync-wave: "2"     # startup.syncWaves.apps
    connections:
      db_host: pg-rw
      db_port: "5432"
      db_user: superset
      db_pass: superset-local-dev    # local dev throwaway (CNPG superset role)
      db_name: superset
    resources:
      # gunicorn web workers; request raised to honest steady-state.
      requests: { cpu: 100m, memory: 768Mi }
      limits: { cpu: "1", memory: 1536Mi }
  extraSecretEnv:
    SUPERSET_SECRET_KEY: "sovereign-os-superset-local-dev-secret-key"
  configOverrides:
    simplecache: |
      CACHE_CONFIG = {"CACHE_TYPE": "SimpleCache"}
      DATA_CACHE_CONFIG = {"CACHE_TYPE": "SimpleCache"}
      FILTER_STATE_CACHE_CONFIG = {"CACHE_TYPE": "SimpleCache"}
      EXPLORE_FORM_DATA_CACHE_CONFIG = {"CACHE_TYPE": "SimpleCache"}

# -----------------------------------------------------------------------------
# Forgejo — self-hosted git (Layer 3 software delivery). Lean local: sqlite,
# single replica, no bundled DB/Redis. Service name pinned to `forgejo`.
# -----------------------------------------------------------------------------
forgejo:
  enabled: true
  fullnameOverride: forgejo
  replicaCount: 1
  # App tier — wave 2. deployment.annotations -> the forgejo Deployment metadata.
  # No priorityClassName (cluster-default 0, below infra) — keeps the disable path
  # clean (see osdashboards note).
  deployment:
    annotations:
      argocd.argoproj.io/sync-wave: "2"     # startup.syncWaves.apps
  image:
    tag: "11"
    rootless: true            # chart default registry/repo -> code.forgejo.org/forgejo/forgejo:11-rootless
  persistence:
    enabled: true
    size: 2Gi
  redis-cluster:
    enabled: false
  redis:
    enabled: false
  postgresql:
    enabled: false
  postgresql-ha:
    enabled: false
  test:
    enabled: false
  gitea:
    admin:
      username: gitea_admin
      password: forgejo-admin-local-dev
      email: admin@datamasterclass.com
    config:
      database:
        DB_TYPE: sqlite3
      server:
        # Use the actual Service name so the container-registry token realm
        # (ROOT_URL + /v2/token) resolves from DinD + the node's containerd.
        DOMAIN: forgejo-http
        ROOT_URL: http://forgejo-http:3000/
        HTTP_PORT: 3000
        OFFLINE_MODE: true
      service:
        DISABLE_REGISTRATION: true
      cron:
        ENABLED: false
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 640Mi }

# -----------------------------------------------------------------------------
# Argo CD — GitOps deploy (Layer 3). Minimal local: no dex/appset/notifications.
# Deploys apps from Forgejo repos into per-domain namespaces.
# -----------------------------------------------------------------------------
argo-cd:
  enabled: true
  fullnameOverride: argocd
  global:
    domain: argocd.local
    # App tier — wave 2. These globals apply the sync-wave to ALL argo-cd workloads
    # (server, repo-server, controller statefulset, redis). No priorityClassName
    # (cluster-default 0, below infra) — keeps the disable path clean.
    deploymentAnnotations:
      argocd.argoproj.io/sync-wave: "2"     # startup.syncWaves.apps
    statefulsetAnnotations:
      argocd.argoproj.io/sync-wave: "2"     # startup.syncWaves.apps
  dex:
    enabled: false
  notifications:
    enabled: false
  applicationSet:
    enabled: false
  configs:
    params:
      server.insecure: true        # local: no TLS termination in front
  server:
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits: { cpu: 500m, memory: 256Mi }
  repoServer:
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits: { cpu: 500m, memory: 384Mi }
  controller:
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: "1", memory: 512Mi }
  redis:
    resources:
      requests: { cpu: 25m, memory: 64Mi }
      limits: { cpu: 250m, memory: 128Mi }

# Demo app the software-delivery golden path deploys (Forgejo -> Argo -> namespace).
softwareDelivery:
  demoApp:
    enabled: true
    repo: demo-app
    image: traefik/whoami:v1.10.3
    namespace: demo
  # Software golden path (per-app builds in the Software tab): the live-subdomain
  # suffix surfaced on each app page (set OS_APPS_DOMAIN on the OS UI to match).
  appsDomain: apps.local

# -----------------------------------------------------------------------------
# Harbor — production image registry for the Software golden path (per-app
# builds: Forgejo Actions -> Harbor -> Argo CD -> subdomain). DEFAULT-OFF heavy
# workload: locally CI uses Forgejo's built-in OCI registry, so the bundle is
# untouched unless harbor.enabled=true. A minimal OCI registry stands in for the
# full Harbor stack on a laptop; on STACKIT swap in the upstream Harbor chart.
# When on, set the OS UI's HARBOR_ENABLED=true + HARBOR_REGISTRY accordingly.
# -----------------------------------------------------------------------------
harbor:
  enabled: false
  image:
    repository: registry
    tag: "2.8.3"
    digest: sha256:cc6393207bf9d3e032c4d9277834c1695117532c9f7e8c64e7b7adcdc7993365
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

# Forgejo Actions CI runner — completes the golden path (push -> CI build ->
# registry). Uses Forgejo's built-in OCI registry locally; Harbor is the
# production registry (documented in docs/components, off on local arm64 kind).
ciRunner:
  enabled: true
  image: code.forgejo.org/forgejo/runner:6
  dindImage: docker:27-dind
  builderTag: "0.1.0"          # tag for the ci-builder job image (docker CLI + buildx)

# -----------------------------------------------------------------------------
# Admin Console — DEPRECATED / OFF BY DEFAULT.
#
# The Admin Console's functionality (live status, on/off toggling, addresses,
# logins, per-component docs) is now built NATIVELY into the OS UI's
# Platform -> Components tab: the OS UI server reads the in-cluster Kubernetes
# API + the baked-in docs/components/*.md directly, so there is no separate
# service and no cross-pod fetch (the old fragile "fetch failed" path).
#
# This block + templates/admin-console/* remain only so an operator can still
# stand up the legacy standalone service for debugging by setting enabled=true.
# Nothing in the stack depends on it. Leave it off.
# -----------------------------------------------------------------------------
adminConsole:
  enabled: false
  image:
    repository: sovereign-os/admin-console   # built locally, loaded into kind
    tag: "0.1.0"
  resources:
    requests: { cpu: 25m, memory: 48Mi }
    limits: { cpu: 250m, memory: 128Mi }

# -----------------------------------------------------------------------------
# OS UI — the Next.js front door. App shell + live surfaces:
#   Home (with a live stack-status strip), Agents/Chat, Knowledge (OpenSearch
#   search), Structured Data (query-tool + Iceberg table browser), Software
#   (Forgejo repos + CI runs), Monitoring (Langfuse), Governance (OPA grants
#   matrix), Dashboards (Superset link), and a Platform group: Gateway (LiteLLM
#   models + MCP tools), Orchestration (Dagster assets/runs), Consoles (launchpad
#   for the full external tool UIs).
# Server-side API routes call the in-cluster backends; all secret keys/passwords
# are read from existing Secrets so they never sit in plaintext. Non-root,
# port 3000, probes /api/health.
osUI:
  enabled: true
  image:
    repository: sovereign-os/os-ui    # built locally, loaded into kind
    tag: "0.1.0"
  # In-cluster backend Service URLs (base URLs; the app appends the paths).
  sampleAgentUrl: "http://sample-agent:8000"
  queryToolUrl:   "http://query-tool:8000"
  langfuseUrl:    "http://agentic-os-langfuse-web:3000"
  opensearchUrl:  "http://opensearch:9200"
  knowledgeIndex: "knowledge"
  forgejoUrl:     "http://forgejo-http:3000"
  forgejoUser:    "gitea_admin"
  litellmUrl:     "http://agentic-os-litellm:4000"
  opaUrl:         "http://opa:8181"
  dagsterUrl:     "http://agentic-os-dagster-webserver:80"
  # Browser-reachable consoles (linked/opened from the browser, never proxied;
  # each tool keeps its own auth). These are the LOCAL-KIND port-forward defaults
  # (docs/components/*.md). When `ingress.enabled` (Mode A self-hosted / Mode B
  # managed) the os-ui template DERIVES each console URL from the matching
  # `ingress.hosts.<key>` as `https://<tool>.<domain>` (soa.consoleUrl), so the
  # DEPLOYED UI never links to localhost. Tools with no public ingress host (e.g.
  # dagster) resolve to "" and the UI hides their "Open" link.
  supersetUrl:        "http://localhost:8088"
  langfuseConsoleUrl: "http://localhost:3000"
  forgejoConsoleUrl:  "http://localhost:3001"
  argocdUrl:          "http://localhost:8082"
  openmetadataUrl:    "http://localhost:8585"
  dagsterConsoleUrl:  "http://localhost:3070"  # internal on ingress (no public host)
  # Secret-backed credentials — reuse the stack's existing Secrets so nothing
  # sensitive sits in plaintext (names/keys verified against the running cluster).
  langfuseSecret:
    name: langfuse-init
    key: LANGFUSE_INIT_PROJECT_SECRET_KEY
  forgejoSecret:
    name: forgejo-admin           # keys: username, password
    key: password
  litellmSecret:
    name: litellm-credentials     # keys incl. masterkey
    key: masterkey
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# -----------------------------------------------------------------------------
# In-UI Terminal — the sandboxed shell behind the OS UI "Terminal" tab.
# HIGHEST-RISK SURFACE → OFF BY DEFAULT (opt-in, pending sign-off). When enabled,
# the chart deploys: a terminal-broker (the only k8s-credentialed component; it
# may only manage Pods + exec in the sandbox namespace), a dedicated sandbox
# namespace with a no-rights ServiceAccount, and deny-egress NetworkPolicies.
# Each session gets an ephemeral, locked-down Pod (non-root, read-only rootfs,
# drop-ALL caps, seccomp RuntimeDefault, no API token, tight limits) destroyed on
# disconnect/idle/max-TTL. See templates/terminal/terminal.yaml + os-ui Terminal
# tab. Authorization is tied to OS roles via `allowedRoles`.
terminal:
  enabled: false
  # Roles permitted to open a terminal (maps to lib/session.ts Role union).
  allowedRoles: ["builder", "admin"]
  # Shared HMAC secret: the OS UI mints a short-lived single-use token, the broker
  # verifies it. OVERRIDE per environment (or wire an ExternalSecret). The OS UI
  # reads the same value via TERMINAL_BROKER_SECRET. Never commit a real value.
  brokerSecret: "dev-only-insecure-terminal-secret-change-me"
  # Dedicated sandbox namespace (default: <release-namespace>-sandbox).
  sandboxNamespace: ""
  sandboxServiceAccount: "sandbox-nobody"
  wsPath: "/terminal"
  # Browser-reachable broker WebSocket URL. Local-kind default = a
  # `kubectl port-forward svc/terminal-broker 8090:8080` address; on a deploy,
  # set ingress.hosts.terminal so the os-ui derives wss://terminal.<domain>.
  brokerWsUrl: "ws://localhost:8090/terminal"
  # Session lifecycle (seconds).
  idleTimeoutSeconds: 600     # reap after 10m of no input
  maxSessionSeconds: 3600     # hard cap: 60m
  maxConcurrentSessions: 30   # broker-wide ceiling (≈ cohort size)
  # Allow the sandbox egress to the governed query-tool ONLY (single data path).
  # Everything else (API server, internet, other pods) stays denied.
  allowGovernedQueryTool: true
  broker:
    image:
      repository: sovereign-os/terminal-broker   # built locally, loaded into kind
      tag: "0.1.0"
    resources:
      requests: { cpu: 50m, memory: 96Mi }
      limits:   { cpu: 300m, memory: 256Mi }
  sandbox:
    image:
      repository: sovereign-os/sandbox-shell      # built locally, loaded into kind
      tag: "0.1.0"
    shell: "/bin/bash"
    resources:
      cpuRequest: "50m"
      cpuLimit: "500m"
      memRequest: "128Mi"
      memLimit: "512Mi"
      ephemeralLimit: "512Mi"

# =============================================================================
# Domain-Builder Workbench — a PERSISTENT, DOMAIN-SCOPED code-server (VS Code in
# the browser) per builder. EXTENDS the terminal sandbox model from an ephemeral
# PTY to a long-lived editor (git + python + duckdb + the governed `dq` CLI) where
# a `builder` builds/edits/administers ALL of THEIR domain's artifacts — software,
# agents, data, knowledge — in one place. Default OFF (more access than the
# terminal: persistence + domain creds + git, so it is opt-in, pending sign-off).
# See docs/workbench-tab-design.md.
# =============================================================================
workbench:
  enabled: false
  # Roles permitted to open a workbench (maps to lib/session.ts Role union).
  allowedRoles: ["builder", "admin"]
  # Shared HMAC secret: the OS UI mints a short-lived single-use token, the broker
  # verifies it. OVERRIDE per environment (or wire an ExternalSecret). The OS UI
  # reads the same value via WORKBENCH_BROKER_SECRET. Never commit a real value.
  brokerSecret: "dev-only-insecure-workbench-secret-change-me"
  # Dedicated workbench namespace (default: <release-namespace>-workbench).
  namespace: ""
  serviceAccount: "workbench-nobody"
  # Browser-reachable broker URL. Local-kind default = a
  # `kubectl port-forward svc/workbench-broker 8091:8080` address; on a deploy,
  # set ingress.hosts.workbench so the os-ui derives https://workbench.<domain>.
  brokerUrl: "http://localhost:8091"
  # In-cluster bases the broker injects into each workbench (domain scope enforced
  # server-side by the query-tool/OPA; git uses the domain-scoped token).
  forgejoBase: ""     # default http://forgejo-http.<ns>.svc:3000
  queryToolBase: ""   # default http://query-tool.<ns>.svc:8000
  # Lifecycle / capacity.
  idleTimeoutSeconds: 1800     # scale a workbench to 0 after 30m idle (PVC persists)
  maxActiveWorkbenches: 12     # broker-wide ceiling of CONCURRENTLY-RUNNING editors
  # Per-domain credentials. Each entry seeds a `workbench-domain-creds-<name>`
  # Secret in the workbench namespace holding a DOMAIN-SCOPED Forgejo token (NOT
  # the global admin). The broker copies ONLY the requesting builder's domain creds
  # into their pod. Seed real tokens via an ExternalSecret — placeholders here are
  # for the local prototype (empty token => unscoped local Forgejo for the demo).
  domains:
    - { name: "sales",   forgejoUser: "sales-builder",   forgejoToken: "" }
    - { name: "finance", forgejoUser: "finance-builder", forgejoToken: "" }
  broker:
    image:
      repository: sovereign-os/workbench-broker   # built locally, loaded into kind
      tag: "0.1.0"
    resources:
      requests: { cpu: 50m, memory: 96Mi }
      limits:   { cpu: 300m, memory: 256Mi }
  workspace:
    image:
      repository: sovereign-os/code-server-workbench  # built locally, loaded into kind
      tag: "0.1.0"
    port: 8080
    # Per-builder persistence: a ReadWriteOnce PVC holding the editor workspace
    # (edits, settings, extensions, git checkouts). Survives across sessions.
    pvcSize: "2Gi"
    storageClass: ""   # "" => cluster default (kind: standard / STACKIT: managed)
    resources:
      cpuRequest: "100m"
      cpuLimit: "1"
      memRequest: "512Mi"
      memLimit: "2Gi"      # code-server ~1–2 GB each => maxActiveWorkbenches × 2Gi
      ephemeralLimit: "1Gi"

# =============================================================================
# Layer 4 (Science / ML) — traditional data science, NOT LLM serving.
# =============================================================================
# JupyterHub (notebooks) + MLflow (tracking + model registry) + Featureform
# (feature store, MPL-2.0) + KServe (model serving) + an ML agent that drives the
# flow. A GPU-cost, opt-in capability — OFF BY DEFAULT EVERYWHERE (not in the
# cohort-1 path; stack-decisions.md / build-layer4.md). Enable per component
# (and/or scale the node) when a domain needs classic ML. On a 14 GB kind VM,
# enable AT MOST MLflow (+ a single small notebook) at once — see
# CI-LAYER4-INTEGRATION.md for the RAM budget.
#
# Backing services reuse the stack: Postgres via CNPG `mlflow` extraDatabase,
# object storage via the `mlflow` bucket (MinIO/objectStorage), Valkey as the
# Featureform online store, LiteLLM (scoped key) for the ML agent.

# -----------------------------------------------------------------------------
# Layer 4 MASTER SWITCH. OFF by default. `ml.enabled` is the single gate for the
# entire Science layer: every `templates/science/*` object AND the `jupyterhub`
# subchart are gated behind it, composed (logical AND) with their own
# per-component flag below (`mlflow.enabled`, `featureform.enabled`,
# `kserve.enabled`, `mlAgent.enabled`, `jupyterhub.enabled`). This lets the whole
# layer be turned off (or on) with one value while still allowing fine-grained
# per-component control underneath. Nothing in Layer 4 renders unless
# `ml.enabled=true`.
# -----------------------------------------------------------------------------
ml:
  enabled: false

# -----------------------------------------------------------------------------
# JupyterHub (Apache 2.0 / BSD-3) — Zero-to-JupyterHub subchart. Per-domain
# multi-user notebooks; GPU-capable. Local: DummyAuthenticator + ephemeral
# storage. Production: federate auth to Ory (OAuthenticator) + persistent home
# dirs + a GPU profile. Singleuser image is the multi-arch Jupyter scipy stack.
# -----------------------------------------------------------------------------
jupyterhub:
  enabled: false
  # Minimal, lint-light config; the full Z2JH value tree applies when enabled.
  hub:
    config:
      JupyterHub:
        authenticator_class: dummy
      # Local dev only — DO NOT use in production (federate to Ory instead).
      DummyAuthenticator:
        password: jupyter-local-dev
    resources:
      requests: { cpu: 100m, memory: 384Mi }
      limits: { cpu: "1", memory: 768Mi }
  proxy:
    # Local dev throwaway; on STACKIT this is an externally-managed secret.
    secretToken: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    chp:
      resources:
        requests: { cpu: 50m, memory: 64Mi }
        limits: { cpu: 250m, memory: 192Mi }
  singleuser:
    image:
      name: quay.io/jupyter/scipy-notebook   # multi-arch (amd64 + arm64)
      tag: "2024-10-14"
    storage:
      type: none                             # ephemeral locally; PVC in production
    memory:
      guarantee: 512M
      limit: 2G
    cpu:
      guarantee: 0.2
      limit: 2
  # Pre-pull hooks slow + bloat local installs; keep them off (singleuser image
  # is pulled on first spawn instead).
  prePuller:
    hook:
      enabled: false
    continuous:
      enabled: false
  scheduling:
    userScheduler:
      enabled: false
  cull:
    enabled: true
    timeout: 3600

# -----------------------------------------------------------------------------
# MLflow (Apache 2.0) — experiment tracking + model registry (bespoke). Backend
# store = CNPG `mlflow` DB; artifact store = object-storage `mlflow` bucket,
# served via `--serve-artifacts`. Custom image (mlflow + psycopg2 + boto3),
# built locally + loaded into kind (images/mlflow/).
# -----------------------------------------------------------------------------
mlflow:
  enabled: false
  image:
    repository: sovereign-os/mlflow      # built locally, loaded into kind
    tag: "2.19.0"
  backendDatabase: mlflow
  backendSecretName: postgres-mlflow-credentials   # CNPG `mlflow` role (extraDatabases)
  artifactBucket: mlflow                            # objectStorage.buckets entry
  s3:
    endpoint: "http://minio:9000"        # MinIO locally; STACKIT Object Storage in prod
  resources:
    requests: { cpu: 100m, memory: 384Mi }
    limits: { cpu: "1", memory: 1Gi }

# -----------------------------------------------------------------------------
# Featureform (MPL-2.0) — virtual feature store (bespoke, optional). Offline =
# Iceberg via the query engine; online = Valkey. Providers are registered from a
# notebook / the ML agent. Image is multi-arch (amd64 + arm64) — verified.
# -----------------------------------------------------------------------------
featureform:
  enabled: false
  image:
    repository: featureformcom/featureform
    tag: "0.15.10"
  valkeySecretName: valkey-credentials   # reuse the stack's Valkey secret (online store)
  resources:
    requests: { cpu: 100m, memory: 384Mi }
    limits: { cpu: "1", memory: 1Gi }

# -----------------------------------------------------------------------------
# KServe (Apache 2.0) — model serving / inference (bespoke CR). The KServe
# controller + cert-manager are a BOOTSTRAP prerequisite (RawDeployment mode, no
# Knative) — see CI-LAYER4-INTEGRATION.md. The chart ships a sample
# InferenceService pulling a model from the MLflow artifact bucket. CPU default;
# GPU node pool opt-in.
# -----------------------------------------------------------------------------
kserve:
  enabled: false
  serviceAccountName: kserve-sa
  s3SecretName: kserve-s3-credentials    # local: chart-created; STACKIT: external
  s3:
    endpoint: "minio:9000"               # host:port (no scheme; usehttps=0 annotation)
  sampleModel:
    name: sample-sklearn
    format: sklearn
    # A trained model artifact in the MLflow object-storage bucket (replace with a
    # real registry path). Demo path under the `mlflow` bucket.
    storageUri: "s3://mlflow/models/sample-sklearn"
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 1Gi }

# -----------------------------------------------------------------------------
# ML agent (LangGraph) — drives features -> train+track -> deploy from plain
# language (bespoke, custom image sovereign-os/ml-agent). Calls the LLM via
# LiteLLM (scoped key), traced in Langfuse. Expose its tools via the LiteLLM MCP
# gateway + OPA grant as an integration step (CI-LAYER4-INTEGRATION.md).
# -----------------------------------------------------------------------------
mlAgent:
  enabled: false
  image:
    repository: sovereign-os/ml-agent    # built locally, loaded into kind
    tag: "0.1.0"
  chatModel: sovereign-mock
  kserveEndpoint: "http://sample-sklearn-predictor:80"   # KServe RawDeployment svc
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

# -----------------------------------------------------------------------------
# Dagster churn-retrain pipeline (Layer 4 Science, step 8). Ships the churn
# retrain definition as a ConfigMap a Dagster user-code deployment loads; Dagster
# (Layer 3) owns the cron. Re-enters the path at step 3 (train+track in MLflow) →
# new version (Staging) → Builder re-certifies. CPU-only; GPU opt-in + approved.
# Gated behind ml.enabled AND this flag; off by default.
# -----------------------------------------------------------------------------
dagsterRetrain:
  enabled: false
  modelName: churn_model               # MLflow registry model name
  featureSet: customer_rfm             # Featureform feature set (RFM + tenure)
  schedule: "0 3 1 * *"                # monthly (03:00 on the 1st); or on drift

# Components are added to this file as each is wired into the chart
# (thinnest runnable slice first). See README.md for the build order.
