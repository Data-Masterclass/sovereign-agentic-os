{{- if and .Values.litellm.enabled (eq .Values.global.profile "local") }}
{{- /*
  Local-only LiteLLM credentials: the proxy master key plus the Langfuse keys
  used for gateway-level success-callback tracing. NOT production secrets — on
  STACKIT the master key and provider keys come from the secrets store.
  Key name `masterkey` matches the chart's masterkeySecretKey default.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: litellm-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "litellm") | nindent 4 }}
type: Opaque
stringData:
  masterkey: {{ .Values.litellmMasterKey | quote }}
  # Loaded as env (envFrom) so litellm_settings success_callback "langfuse" can
  # ship gateway traces to our Langfuse project.
  LANGFUSE_PUBLIC_KEY: {{ .Values.langfuseInit.publicKey | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.langfuseInit.secretKey | quote }}
  LANGFUSE_HOST: {{ .Values.langfuseInit.host | quote }}
  # Admin UI login (DB-backed). Username/password for http://<litellm>/ui.
  UI_USERNAME: {{ .Values.litellmUI.username | quote }}
  UI_PASSWORD: {{ .Values.litellmUI.password | quote }}
{{- end }}
