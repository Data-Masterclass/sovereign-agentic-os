{{- if and .Values.litellm.enabled .Values.litellmAgentKey.enabled }}
{{- /*
  Provision a scoped LiteLLM virtual key for the agents (least privilege).
  The key value lives in a Secret (the agents read it); a Job calls /key/generate
  with the master key to register it in LiteLLM, limited to the allowed models
  with a budget cap. Idempotent (re-checks /key/info and exits 0 if present).

  ROOT-CAUSE FIX: this Job used to be a Helm post-install/post-upgrade *hook*.
  The live deploy is forced to run `helm ... --no-hooks` (the argo-cd
  `argocd-redis-secret-init` pre-upgrade hook fails on this cluster), which
  silently skips ALL hooks — so the agent key was never registered and the
  agents hit 401s. It is now a NORMAL (non-hook) resource so a plain
  `helm install` (hooks on OR off) and ArgoCD sync both always run it. It polls
  LiteLLM readiness (the proxy only serves after its migration initContainer has
  created the schema), then registers the key. `ttlSecondsAfterFinished` lets it
  self-clean and be recreated/re-run idempotently on a later upgrade/sync.
*/}}
{{- $k := .Values.litellmAgentKey }}
{{- if eq .Values.global.profile "local" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $k.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "litellm") | nindent 4 }}
type: Opaque
stringData:
  apiKey: {{ $k.local.value | quote }}
---
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: litellm-agent-key-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "litellm-key-init") | nindent 4 }}
  annotations:
    # NOT a Helm hook (see header): normal resource so `--no-hooks` deploys and
    # ArgoCD syncs always run it. App tier so it lands after LiteLLM (wave 1).
    {{- include "soa.syncWaveAnno" (dict "ctx" . "tier" "apps") | nindent 4 }}
    # A Job spec is immutable. When ArgoCD manages this chart, Replace lets a
    # spec change (image/models/budget) recreate the Job instead of failing a
    # patch; with ttlSecondsAfterFinished it re-runs idempotently. Inert under
    # plain `helm install/upgrade` (helm ignores this annotation).
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "litellm-key-init") | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
      containers:
        - name: key-init
          image: curlimages/curl:8.11.1
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
            readOnlyRootFilesystem: true
          env:
            - name: MASTER_KEY
              valueFrom: { secretKeyRef: { name: litellm-credentials, key: masterkey } }
            - name: VIRTUAL_KEY
              valueFrom: { secretKeyRef: { name: {{ $k.secretName }}, key: apiKey } }
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              B=http://agentic-os-litellm:4000
              echo "waiting for LiteLLM readiness..."
              for i in $(seq 1 60); do
                code=$(curl -s -o /dev/null -w "%{http_code}" "$B/health/readiness" || true)
                [ "$code" = "200" ] && { echo "litellm ready"; break; }
                sleep 3
              done
              info=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer $MASTER_KEY" \
                "$B/key/info?key=$VIRTUAL_KEY" || true)
              if [ "$info" = "200" ]; then
                echo "virtual key already provisioned"; exit 0
              fi
              echo "provisioning scoped virtual key (alias={{ $k.alias }}, budget={{ $k.maxBudget }}, rpm={{ $k.rpmLimit }}, tpm={{ $k.tpmLimit }})..."
              # Scoped virtual key (least privilege): allowed models + an overall
              # spend cap, PLUS a dedicated per-model spend cap for the pay-per-token
              # STACKIT premium/vision routes (model_max_budget — the hard cost
              # guardrail), and per-key rate limits with graceful queueing
              # (rpm_limit/tpm_limit + max_parallel_requests; LiteLLM soft-limits and
              # the router's num_retries back-pressures rather than hard-failing).
              PAYLOAD='{"key":"'"$VIRTUAL_KEY"'","key_alias":"{{ $k.alias }}","models":{{ $k.models | toJson }},"max_budget":{{ $k.maxBudget }},"model_max_budget":{{ $k.modelMaxBudget | toJson }},"rpm_limit":{{ $k.rpmLimit }},"tpm_limit":{{ $k.tpmLimit }},"max_parallel_requests":{{ $k.maxParallelRequests }}}'
              curl -fsS -X POST "$B/key/generate" \
                -H "Authorization: Bearer $MASTER_KEY" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD" >/dev/null && echo "virtual key created"
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 200m, memory: 64Mi }
{{- end }}
