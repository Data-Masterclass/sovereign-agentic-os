{{- if and .Values.ml.enabled .Values.featureform.enabled }}
{{- /*
  Featureform (MPL-2.0) — the *virtual* feature store (Layer 4 Science). It sits
  atop our existing infra rather than copying data: offline store = Iceberg via
  the central Trino engine (over Polaris), online store = Valkey (BSD-3, the
  stack's cache — NOT Redis). Providers (Valkey online, Iceberg offline) are
  registered through the Featureform client from a notebook or the ML agent; this
  template runs the single-container server + dashboard.

  IMAGE / ARM64: featureformcom/featureform:0.15.10 is multi-arch (amd64 + arm64,
  verified) — runs natively on Apple-Silicon kind. Off by default everywhere;
  opt-in only.
*/}}
{{- $f := .Values.featureform }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: featureform
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "featureform") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "soa.selectorLabels" (dict "ctx" . "component" "featureform") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "soa.labels" . | nindent 8 }}
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "featureform") | nindent 8 }}
    spec:
      # The upstream featureformcom/featureform image runs as root with a
      # non-numeric USER (root), so the cluster-default runAsNonRoot:true makes the
      # kubelet refuse it ("CreateContainerConfigError: image has non-numeric user
      # (root)"). Pin to numeric uid 0 and disable the non-root guard for THIS
      # component only — every other bespoke workload keeps the hardened helper
      # default. seccomp baseline is retained. (Override only what the image needs.)
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        seccompProfile:
          type: {{ .Values.global.podSecurity.seccompProfile }}
      containers:
        - name: featureform
          image: "{{ $f.image.repository }}:{{ $f.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
          env:
            # Online store = Valkey (host/port; auth from the stack's valkey secret).
            - name: FEATUREFORM_ONLINE_VALKEY_HOST
              value: valkey
            - name: FEATUREFORM_ONLINE_VALKEY_PORT
              value: "6379"
            - name: FEATUREFORM_ONLINE_VALKEY_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ $f.valkeySecretName }}, key: password } }
            # Metadata + coordinator state = Postgres (FF_STATE_PROVIDER=psql is the
            # image default). Without these the server retries localhost:5432 forever
            # and never binds its API (7878) or dashboard (80) ports — the pod shows
            # Running but is non-functional. `featureform` role/db comes from
            # postgres.extraDatabases (pg-init creates it; secret per that entry).
            - name: PSQL_HOST
              value: {{ include "soa.pgHost" . | quote }}
            - name: PSQL_PORT
              value: "5432"
            - name: PSQL_DB
              value: featureform
            - name: PSQL_USER
              valueFrom: { secretKeyRef: { name: postgres-featureform-credentials, key: username } }
            - name: PSQL_PASSWORD
              valueFrom: { secretKeyRef: { name: postgres-featureform-credentials, key: password } }
            - name: PSQL_SSLMODE
              value: disable
          ports:
            - { name: api, containerPort: 7878 }
            - { name: dashboard, containerPort: 80 }
          resources:
            {{- toYaml $f.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: featureform
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "featureform") | nindent 4 }}
spec:
  selector:
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "featureform") | nindent 4 }}
  ports:
    - { name: api, port: 7878, targetPort: api }
    - { name: dashboard, port: 80, targetPort: dashboard }
{{- end }}
