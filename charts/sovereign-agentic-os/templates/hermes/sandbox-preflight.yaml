{{- if and .Values.hermes.enabled .Values.hermes.sandbox.preflight.enabled }}
{{- /*
  SKE nested-KVM preflight (hermes plan §9). A one-shot Job that checks whether
  the node exposes /dev/kvm — the decision input for Kata-vs-gVisor. It writes the
  verdict to its logs; `lib/hermes/sandbox.ts` (nestedKvmPreflight) interprets the
  same finding. It runs UNPRIVILEGED and read-only — it only STATS /dev/kvm, never
  uses it — so it is safe to render everywhere. On kind (no nested KVM) it will
  report absent → gVisor; on an SKE pool with nested virt it reports present →
  Kata is viable. Documented as a render-time template on kind.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: hermes-nested-kvm-preflight
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- include "soa.syncWaveAnno" (dict "ctx" . "tier" "apps") | nindent 4 }}
    "helm.sh/hook-weight": "0"
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "hermes-preflight") | nindent 4 }}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "hermes-preflight") | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- include "soa.priorityClassName" (dict "ctx" . "tier" "app") | nindent 6 }}
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
      containers:
        - name: preflight
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
            readOnlyRootFilesystem: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -e /dev/kvm ]; then
                echo "PREFLIGHT: /dev/kvm present — Kata microVM available (nestedKvm=true)"
              else
                echo "PREFLIGHT: /dev/kvm absent — use gVisor fallback (nestedKvm=false)"
              fi
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 100m, memory: 64Mi }
{{- end }}
