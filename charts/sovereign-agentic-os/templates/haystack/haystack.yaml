{{- if .Values.haystack.enabled }}
{{- /*
  Haystack retrieval service (Apache 2.0) — RAG retrieval pipeline over
  OpenSearch, embedding via the LiteLLM gateway (scoped agent key). Agents call
  /retrieve for grounded context; LangGraph keeps the agent control flow.
*/}}
{{- $h := .Values.haystack }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: haystack
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- include "soa.syncWaveAnno" (dict "ctx" . "tier" "apps") | nindent 4 }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "haystack") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "soa.selectorLabels" (dict "ctx" . "component" "haystack") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "soa.labels" . | nindent 8 }}
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "haystack") | nindent 8 }}
    spec:
      {{- include "soa.priorityClassName" (dict "ctx" . "tier" "app") | nindent 6 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
      containers:
        - name: haystack
          image: "{{ $h.image.repository }}:{{ $h.image.tag }}"
          imagePullPolicy: IfNotPresent      # locally-built image, loaded into kind
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
            readOnlyRootFilesystem: true
          env:
            - name: PORT
              value: "8000"
            - name: HOME
              value: /tmp
            - name: LITELLM_BASE_URL
              value: "http://agentic-os-litellm:4000/v1"
            - name: LITELLM_API_KEY     # scoped virtual key
              valueFrom: { secretKeyRef: { name: agent-litellm-key, key: apiKey } }
            - name: EMBED_MODEL
              value: {{ $h.embedModel | quote }}
            - name: OPENSEARCH_URL
              value: {{ include "soa.opensearchUrl" . | quote }}
            - name: INDEX_NAME
              value: {{ $h.indexName | quote }}
            - name: KNN_DIMENSION
              value: {{ .Values.retrieval.knnDimension | quote }}
            - name: TOP_K
              value: {{ $h.topK | quote }}
          ports:
            - { name: http, containerPort: 8000 }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml $h.resources | nindent 12 }}
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: haystack
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "haystack") | nindent 4 }}
spec:
  selector:
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "haystack") | nindent 4 }}
  ports:
    - { name: http, port: 8000, targetPort: http }
{{- end }}
