{{- if .Values.postgres.enabled }}
{{- if eq .Values.global.profile "local" }}
{{- /*
  Shared Postgres credential Secrets (kubernetes.io/basic-auth) — used by BOTH
  engines (plain + cnpg) and by every PG consumer. Local/dev only: on STACKIT
  (profile != local) these Secrets are supplied externally (External Secrets
  Operator) under the SAME names, so nothing here renders. Keeping them in one
  template (not inside the engine files) is what lets the StatefulSet and the
  CNPG Cluster share identical credentials.
*/}}
{{- $pg := .Values.postgres }}
# App-owner credentials (the bootstrap superuser/owner for engine:plain; the
# CNPG initdb owner for engine:cnpg). NOT a production secret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pg.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ $pg.username | quote }}
  password: {{ $pg.local.password | quote }}
{{- range $pg.extraDatabases }}
---
# Local-only dev credentials for the {{ .name }} Postgres role.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .secretName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "soa.labels" $ | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" $ "component" "postgres") | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .username | quote }}
  password: {{ .localPassword | quote }}
{{- end }}
{{- end }}
{{- end }}
