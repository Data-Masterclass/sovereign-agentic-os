{{- if and .Values.langfuse.enabled (eq .Values.global.profile "local") }}
{{- /*
  Local-only Langfuse core secrets (salt, encryption key, NextAuth secret).
  STABLE dev values on purpose: these must NOT rotate between `helm upgrade`s
  (rotating the encryption key would orphan already-encrypted data). NOT
  production secrets — on STACKIT this Secret is provided externally (External
  Secrets) and these template values are not rendered (profile != local).
  encryptionKey must be 32 bytes / 64 hex chars.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-core-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "langfuse") | nindent 4 }}
type: Opaque
stringData:
  salt: "sovereign-os-local-dev-salt"
  nextauthSecret: "sovereign-os-local-dev-nextauth-secret"
  encryptionKey: "a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90"
{{- end }}
