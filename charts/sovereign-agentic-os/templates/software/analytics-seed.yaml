{{- if and (.Values.forgejo).enabled ((.Values.analyticsRepo | default dict).enabled) }}
{{- /*
  Analytics monorepo seed (epic #146 Phase 1). Creates the tenant-level `analytics`
  repo in Forgejo if it does not already exist, then idempotently writes the
  OS-managed path skeleton:

    analytics/
    ├── README.md                          (OS-managed-paths notice)
    ├── dbt/                               (copy of images/dbt/project/)
    ├── cube/models/seed/                  (the 3 static demo cube YAMLs)
    ├── dagster/definitions.py             (images/dagster/repo.py)
    └── .forgejo/workflows/ci.yml          (validate-only: dbt parse + cube YAML lint)

  Phase 1 is ZERO-BEHAVIORAL-CHANGE: nothing reads the repo at runtime yet. The
  seed is additive — it never deletes existing files, and the `cube-model` ConfigMap
  demo cubes + the baked dbt/dagster images are LEFT UNTOUCHED.

  Gate: `analyticsRepo.enabled` (default false — see values.yaml). Nil-safe on the
  outer `.Values.analyticsRepo` because the key may be absent in older overlays.

  Hook weight 26 (one higher than forgejo-seed/25) so the demo-app repo lands first
  and this idempotent seed always finds Forgejo healthy.

  Runs on install AND upgrade (post-install,post-upgrade): the #146 enabler needs
  git to hold ALL cube models, and this seed is idempotent (create-or-update,
  409-tolerant on repo-exists), so re-running on every upgrade only ever converges
  the OS-managed skeleton — it never deletes or duplicates. This is WHY the live
  cluster's `--set`-only upgrade previously left the repo unseeded: the Job was
  post-install ONLY and never re-fired on upgrade.

  The manifest ConfigMap carries the SAME hook annotations (weight 25, one lower)
  so it is applied in the hook phase and is guaranteed present when the Job mounts
  it — a plain (non-hook) ConfigMap can be absent/stale during a hook Job.
*/}}
{{- $owner := .Values.forgejo.gitea.admin.username }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-seed-manifest
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "analytics-seed") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "25"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  README.md: |
    # analytics

    OS-managed paths (cube/models/metrics, dbt/models/governed) — edit via the OS.

    Human edits to other paths are welcome and are preserved in git history.
    The OS uses sha-based writes so it only commits when content actually changes.

  # ── dbt project ──────────────────────────────────────────────────────────────
  dbt_project.yml: |
    name: sovereign
    version: "1.0.0"
    config-version: 2
    profile: sovereign

    model-paths: ["models"]
    seed-paths: ["seeds"]

    models:
      sovereign:
        staging:
          +materialized: table
        marts:
          +materialized: incremental
          +incremental_strategy: merge
          +on_schema_change: append_new_columns

  profiles.yml: |
    sovereign:
      target: dev
      outputs:
        dev:
          type: trino
          method: none
          host: "{{ "{{" }} env_var('TRINO_HOST', 'trino') {{ "}}" }}"
          port: "{{ "{{" }} env_var('TRINO_PORT', '8080') | as_number {{ "}}" }}"
          user: "{{ "{{" }} env_var('TRINO_USER', 'dbt-sales') {{ "}}" }}"
          http_scheme: "{{ "{{" }} env_var('TRINO_HTTP_SCHEME', 'http') {{ "}}" }}"
          catalog: "{{ "{{" }} env_var('TRINO_CATALOG', 'iceberg') {{ "}}" }}"
          schema: "{{ "{{" }} env_var('TRINO_SCHEMA', 'sales') {{ "}}" }}"
          threads: 4

  raw_orders.csv: |
    order_id,customer,amount,order_date
    1,acme,100.00,2026-01-01
    2,acme,50.00,2026-01-01
    3,globex,200.00,2026-01-02
    4,initech,75.50,2026-01-02

  schema.yml: |
    version: 2

    models:
      - name: stg_orders
        description: "Typed, cleaned orders from the raw seed (Iceberg staging)."
        columns:
          - name: order_id
            description: "Primary key of an order."
            tests:
              - not_null
              - unique
          - name: customer
            description: "Customer name."
            tests:
              - not_null
          - name: amount
            description: "Order amount (net)."
            tests:
              - not_null
          - name: order_date
            description: "Date the order was placed."
            tests:
              - not_null

      - name: daily_revenue
        description: "Revenue + order count per day. The Sales mart Cube reads."
        columns:
          - name: order_date
            description: "Calendar day (mart grain + merge unique key)."
            tests:
              - not_null
              - unique
          - name: revenue
            description: "Sum of order amounts for the day."
            tests:
              - not_null
          - name: orders
            description: "Number of orders for the day."
            tests:
              - not_null

  stg_orders.sql: |
    -- Staging: typed, cleaned orders from the raw seed.
    -- Trino/Iceberg dialect: CAST(x AS <trino type>) — NOT Postgres x::type.
    select
        cast(order_id as integer)      as order_id,
        cast(customer as varchar)      as customer,
        cast(amount as decimal(10, 2)) as amount,
        cast(order_date as date)       as order_date
    from {{ "{{" }} ref('raw_orders') {{ "}}" }}

  daily_revenue.sql: |
    -- Mart: revenue + order count per day. Consumed by the Cube semantic layer.
    {{ "{{" }} config(materialized='incremental', incremental_strategy='merge', unique_key='order_date') {{ "}}" }}
    select
        order_date,
        sum(amount)  as revenue,
        count(*)     as orders,
        max(order_date) as updated_at
    from {{ "{{" }} ref('stg_orders') {{ "}}" }}
    group by order_date
    order by order_date

  # ── Cube seed models (the 3 static demo cubes from the cube-model ConfigMap) ─
  northpeakcommerce.yml: |
    cubes:
      - name: northpeakcommerce
        sql_table: sales.gold_northpeak_commerce
        measures:
          - name: revenue
            title: Revenue
            type: sum
            sql: net_amount
          - name: conversion
            title: Conversion
            type: avg
            sql: converted
          - name: orders
            type: sum
            sql: converted
            public: false
          - name: gross
            type: sum
            sql: order_total
            public: false
          - name: customers
            type: count_distinct
            sql: customer_id
            public: false
          - name: churned_customers
            type: count_distinct
            sql: "CASE WHEN {CUBE}.is_churned = 1 THEN {CUBE}.customer_id END"
            public: false
          - name: aov
            title: AOV
            type: number
            sql: "{gross} / NULLIF({orders}, 0)"
          - name: churnrate
            title: Churn Rate
            type: number
            sql: "{churned_customers} * 1.0 / NULLIF({customers}, 0)"
        dimensions:
          - name: order_id
            sql: order_id
            type: string
            primary_key: true
          - name: region
            sql: region
            type: string
          - name: product
            sql: product
            type: string
          - name: order_date
            sql: order_date
            type: time

  daily_revenue_cube.yml: |
    cubes:
      - name: daily_revenue
        sql_table: sales.gold_northpeak_commerce
        measures:
          - name: total_revenue
            type: sum
            sql: net_amount
          - name: total_orders
            type: sum
            sql: converted
          - name: count
            type: count
        dimensions:
          - name: order_date
            type: time
            sql: order_date

  mart_sales.yml: |
    cubes:
      - name: mart_sales
        sql_table: sales.gold_northpeak_commerce
        measures:
          - name: revenue
            title: Revenue
            type: sum
            sql: net_amount
          - name: orders
            type: count
        dimensions:
          - name: order_date
            type: time
            sql: order_date
          - name: region
            type: string
            sql: region
          - name: product
            type: string
            sql: product

  # ── Dagster definitions ───────────────────────────────────────────────────────
  definitions.py: |
    # SPDX-License-Identifier: Apache-2.0
    # Copyright 2026 Borek Data Ventures UG
    """Dagster definitions — the orchestrator's user code.

    Loads the dbt project as Dagster assets (dagster-dbt) so Dagster orchestrates
    the warehouse build, plus a tiny proof-of-life asset.
    """
    from pathlib import Path

    from dagster import Definitions, asset
    from dagster_dbt import DbtCliResource, dbt_assets

    DBT_DIR = Path("/opt/dbt/project")
    MANIFEST = DBT_DIR / "target" / "manifest.json"


    @asset(group_name="sovereign_os", description="Proof-of-life asset for the orchestrator.")
    def hello_sovereign() -> str:
        return "hello from the Sovereign Agentic OS orchestrator"


    @dbt_assets(manifest=MANIFEST)
    def sovereign_dbt(context, dbt: DbtCliResource):
        yield from dbt.cli(["build"], context=context).stream()


    defs = Definitions(
        assets=[hello_sovereign, sovereign_dbt],
        resources={
            "dbt": DbtCliResource(project_dir=str(DBT_DIR), profiles_dir=str(DBT_DIR)),
        },
    )

  # ── Conftest/OPA policy pack (epic #146 Phase 0) ─────────────────────────────
  # PRE-MERGE advisory gate. NOT the security boundary — the server re-enforces on
  # POST /api/analytics/apply. See policy/README.md. Conftest is Apache-2.0 (pinned).
  dbt.rego: |
    # SPDX-License-Identifier: Apache-2.0
    # Copyright 2026 Borek Data Ventures UG (haftungsbeschraenkt)
    #
    # PRE-MERGE ADVISORY GATE — analytics monorepo, OS-managed dbt models.
    # See policy/README.md: this Conftest gate gives fast feedback in Forgejo Actions.
    # It is NOT the security boundary. The server re-enforces every rule below on
    # POST /api/analytics/apply, as a real DLS-scoped principal, and REJECTS anything
    # the emitters could not round-trip. A green CI run is a courtesy, not a grant.
    #
    # What this asserts: the OS-managed governed dbt model files under
    # `dbt/models/governed/**` hold ONLY the exact shape that
    # `os-ui/lib/data/analytics-repo.ts:buildDbtModelSql` emits — no more, no less.
    # A hand edit into any other shape fails here (and again, hard, at apply).
    #
    # INPUT CONTRACT (--parser json). The CI job collects the CHANGED governed dbt
    # files into a JSON manifest so a text file becomes policy-inspectable:
    #
    #   { "files": [ { "path": "dbt/models/governed/sales/gold_orders.sql",
    #                  "content": "<config header>\n\nselect * from iceberg...\n" } ] }
    #
    # Only files under dbt/models/governed/ are judged; everything else is human
    # space and ignored here (the mirror never touches it — see plan §2).

    package dbt

    import rego.v1

    # ── helpers ──────────────────────────────────────────────────────────────────

    # The governed, OS-managed dbt models (the only files this policy owns).
    governed_sql contains f if {
    	some f in input.files
    	startswith(f.path, "dbt/models/governed/")
    	endswith(f.path, ".sql")
    }

    # The emitter's layer vocabulary (analytics-repo.ts promotedLayer()).
    layers := {"gold", "silver"}

    # path = dbt/models/governed/<domain>/<layer>_<slug>.sql
    path_parts(f) := parts if {
    	some f2 in governed_sql
    	f2 == f
    	parts := split(trim_prefix(f.path, "dbt/models/governed/"), "/")
    }

    filename(f) := parts[count(parts) - 1] if parts := path_parts(f)

    # ── RULES ────────────────────────────────────────────────────────────────────

    # 1. Path shape: exactly <domain>/<layer>_<slug>.sql (one domain dir, one file).
    deny contains msg if {
    	some f in governed_sql
    	count(path_parts(f)) != 2
    	msg := sprintf("governed dbt model %q must live at dbt/models/governed/<domain>/<layer>_<slug>.sql", [f.path])
    }

    # 2. Filename must start with a known medallion layer (gold_/silver_).
    deny contains msg if {
    	some f in governed_sql
    	count(path_parts(f)) == 2
    	name := filename(f)
    	not layer_prefixed(name)
    	msg := sprintf("governed dbt model %q must be named <layer>_<slug>.sql with layer in %v", [f.path, layers])
    }

    layer_prefixed(name) if {
    	some l in layers
    	startswith(name, sprintf("%s_", [l]))
    }

    # 3. Must carry a dbt config header materializing a table into a domain schema —
    #    exactly the emitter's only header (a config() call with materialized='table'
    #    and a schema='<domain>'). No view/incremental drift, no missing schema.
    #    The regex uses \x7b/\x7d for the Jinja braces so this file embeds cleanly in
    #    the seed ConfigMap (Helm-template-safe: no literal double braces).
    deny contains msg if {
    	some f in governed_sql
    	not regex.match(`\x7b\x7b\s*config\(materialized='table',\s*schema='[a-z0-9_]+'\)\s*\x7d\x7d`, f.content)
    	msg := sprintf("governed dbt model %q must carry the config(materialized='table', schema='<domain>') header the emitter writes", [f.path])
    }

    # 4. Every FROM/JOIN must target the iceberg catalog only — no raw catalogs, no
    #    other catalog. The emitter always selects `from iceberg.<schema>.<table>`.
    deny contains msg if {
    	some f in governed_sql
    	some ref in table_refs(f.content)
    	not startswith(ref, "iceberg.")
    	msg := sprintf("governed dbt model %q references %q — OS-managed models read only from the iceberg catalog", [f.path, ref])
    }

    # 4b. No cross-domain / cross-schema fan-in: the emitter selects from a SINGLE
    #     source lane (the owner's personal lane). A governed model may not read more
    #     than one distinct iceberg schema.
    deny contains msg if {
    	some f in governed_sql
    	schemas := {s | some ref in table_refs(f.content); startswith(ref, "iceberg."); s := split(ref, ".")[1]}
    	count(schemas) > 1
    	msg := sprintf("governed dbt model %q reads from multiple schemas %v — one source lane only (no cross-domain fan-in)", [f.path, schemas])
    }

    # Extract `iceberg.<schema>.<table>` references after from/join (lower-cased text).
    table_refs(content) := refs if {
    	lc := lower(content)
    	matches := regex.find_n(`(?:from|join)\s+([a-z0-9_]+\.[a-z0-9_]+\.[a-z0-9_]+)`, lc, -1)
    	refs := {trim_space(trim_prefix(trim_prefix(m, "from"), "join")) | some m in matches}
    }

    # 5. SQL-shape violations the emitter NEVER produces: statement terminators (`;`)
    #    and SQL line comments (`--`) in the governed body.
    deny contains msg if {
    	some f in governed_sql
    	contains(f.content, ";")
    	msg := sprintf("governed dbt model %q contains ';' — the emitter never terminates statements", [f.path])
    }

    deny contains msg if {
    	some f in governed_sql
    	contains(f.content, "--")
    	msg := sprintf("governed dbt model %q contains a SQL line comment '--' — not an emitter-produced shape", [f.path])
    }
  cube.rego: |
    # SPDX-License-Identifier: Apache-2.0
    # Copyright 2026 Borek Data Ventures UG (haftungsbeschraenkt)
    #
    # PRE-MERGE ADVISORY GATE — analytics monorepo, OS-managed Cube models.
    # See policy/README.md: fast feedback only. NOT the security boundary. The server
    # re-enforces on POST /api/analytics/apply and rejects anything the emitters
    # (os-ui/lib/data/cube-models.ts:buildCubeModels + metrics.ts:scaffoldCubeYaml)
    # could not produce.
    #
    # Scope: the CI job runs this ONLY over changed governed metric files
    # (`cube/models/metrics/**/*.cube.yml`) with `--parser yaml`, so `input` is one
    # parsed Cube doc: { cubes: [...], views: [...] }. The static demo cubes under
    # `cube/models/seed/**` are human-space and are NOT linted here.
    #
    # What this asserts (the #155 namespacing + emitter contract):
    #   - cube name is `<domain>__<slug>` (double-underscore namespace, metrics.ts:cubeName)
    #   - sql_table binds to `iceberg.<domain>.gold_<slug>` — no sql_table escape out of
    #     the iceberg catalog (goldMartFqn)
    #   - measures carry name + a valid Cube aggregation type (MEASURE_TYPES)
    #   - dimensions carry name/sql/type (scaffoldCubeYaml shape)

    package cube

    import rego.v1

    # metrics.ts MEASURE_TYPES — the only aggregations the emitter writes.
    measure_types := {"count", "count_distinct", "count_distinct_approx", "sum", "avg", "min", "max", "number"}
    dim_types := {"string", "number", "time", "boolean"}

    cubes contains c if some c in input.cubes

    # 1. A governed metrics cube must exist (guards an empty/garbled file that would
    #    silently deliver nothing to Cube).
    deny contains msg if {
    	not input.cubes
    	msg := "cube model has no 'cubes' block — governed metric files must define a cube"
    }

    # 2. #155 namespacing: the cube name is `<domain>__<slug>` (exactly one double
    #    underscore separating a non-empty domain from a non-empty slug).
    deny contains msg if {
    	some c in cubes
    	not regex.match(`^[a-z0-9]+(_[a-z0-9]+)*__[a-z0-9]+(_[a-z0-9]+)*$`, c.name)
    	msg := sprintf("cube %q is not #155-namespaced as <domain>__<slug>", [c.name])
    }

    # 3. No sql_table escape: the binding must be `iceberg.<domain>.gold_<slug>`.
    #    (goldMartFqn — iceberg catalog, a gold_ mart in the domain schema.)
    deny contains msg if {
    	some c in cubes
    	c.sql_table
    	not regex.match(`^iceberg\.[a-z0-9_]+\.gold_[a-z0-9_]+$`, c.sql_table)
    	msg := sprintf("cube %q sql_table %q must be iceberg.<domain>.gold_<slug> (no escape outside the iceberg catalog)", [c.name, c.sql_table])
    }

    # 3b. The sql_table's domain segment must match the cube name's domain prefix
    #     (a cube may not bind to another domain's mart).
    deny contains msg if {
    	some c in cubes
    	c.sql_table
    	regex.match(`^iceberg\.[a-z0-9_]+\.gold_[a-z0-9_]+$`, c.sql_table)
    	cube_domain := split(c.name, "__")[0]
    	table_domain := split(c.sql_table, ".")[1]
    	cube_domain != table_domain
    	msg := sprintf("cube %q binds to schema %q of another domain (name domain is %q)", [c.name, table_domain, cube_domain])
    }

    # 4. Every measure has a name and a valid aggregation type.
    deny contains msg if {
    	some c in cubes
    	some m in c.measures
    	not m.name
    	msg := sprintf("cube %q has a measure with no name", [c.name])
    }

    deny contains msg if {
    	some c in cubes
    	some m in c.measures
    	m.name
    	not measure_types[m.type]
    	msg := sprintf("cube %q measure %q has type %q not in the emitter's set %v", [c.name, m.name, m.type, measure_types])
    }

    # 5. Every dimension has a name, sql, and a valid Cube dimension type.
    deny contains msg if {
    	some c in cubes
    	some d in c.dimensions
    	not d.name
    	msg := sprintf("cube %q has a dimension with no name", [c.name])
    }

    deny contains msg if {
    	some c in cubes
    	some d in c.dimensions
    	d.name
    	not dim_types[d.type]
    	msg := sprintf("cube %q dimension %q has type %q not in %v", [c.name, d.name, d.type, dim_types])
    }
  policy_README.md: |
    <!--
    SPDX-License-Identifier: Apache-2.0
    Copyright 2026 Borek Data Ventures UG (haftungsbeschraenkt)
    -->
    # analytics/policy — the pre-merge policy pack (Conftest/OPA)

    These Rego policies are the **PRE-MERGE advisory gate** for the analytics
    monorepo. They run in Forgejo Actions (the `conftest` job in
    `.forgejo/workflows/ci.yml`) over the files a PR changed, and they block merge
    when an OS-managed file drifts from the shape the OS emitters produce.

    ## They are NOT the security boundary

    Read this twice. **CI is not the boundary.** A workflow file can be edited in the
    same PR it is meant to guard; a runner can be swapped; a check can be skipped.
    The **real** enforcement point is the server:

    > Every rule below is re-enforced on **`POST /api/analytics/apply`**, run as a
    > real DLS-scoped principal, which **rejects** anything the emitters could not
    > round-trip. A merged PR that fails policy there does **not** reach compute.

    So treat a green conftest run as **fast, honest feedback** — a courtesy that
    catches mistakes before review — never as a grant of access. The apply route is
    the door into compute; this pack just keeps the hallway tidy.

    ## What each policy asserts

    The OS owns two file families in the repo (plan §2). Human-authored paths
    (`dbt/models/staging`, `dbt/models/marts`, `dbt/tests`, `cube/models/seed`, …)
    are **not** judged here — the mirror never touches them.

    - **`dbt.rego`** (`package dbt`) — governs `dbt/models/governed/**/*.sql`, the
      files `analytics-repo.ts:buildDbtModelSql` emits. Asserts: path shape
      `governed/<domain>/<layer>_<slug>.sql` (layer ∈ gold/silver); the exact
      `{{ "{{" }} config(materialized='table', schema='<domain>') {{ "}}" }}` header; every FROM/JOIN
      targets the **iceberg** catalog only (no raw catalogs); a single source schema
      (no cross-domain fan-in); and none of the SQL-shape violations the emitter
      never produces (`;`, `--` comments).
    - **`cube.rego`** (`package cube`) — governs `cube/models/metrics/**/*.cube.yml`,
      the files `buildCubeModels` / `scaffoldCubeYaml` emit. Asserts: the cube name is
      **#155-namespaced** `<domain>__<slug>`; `sql_table` is
      `iceberg.<domain>.gold_<slug>` (no escape out of the iceberg catalog, and the
      domain segment matches the cube's namespace); measures carry a valid aggregation
      type and dimensions a valid dimension type.

    ## How the CI job runs them (input contract)

    The two families use different Conftest parsers, so the job invokes conftest
    **twice**, each scoped to its namespace:

    ```sh
    # Cube YAML is parsed natively.
    conftest test --parser yaml --namespace cube -p policy <changed cube/models/metrics/*.cube.yml>

    # dbt SQL is raw text, so the job first collects the changed governed .sql files
    # into a JSON manifest { "files": [ { "path", "content" } ] } and lints that.
    conftest test --parser json --namespace dbt -p policy governed-dbt.manifest.json
    ```

    ## Verifying the pack locally

    Fixtures live under `policy/tests/` (good + bad for each policy). Good fixtures
    pass, bad fixtures fail:

    ```sh
    conftest test --parser json  --namespace dbt  -p policy policy/tests/dbt/good_dbt_manifest.json   # PASS
    conftest test --parser json  --namespace dbt  -p policy policy/tests/dbt/bad_dbt_manifest.json    # FAIL
    conftest test --parser yaml  --namespace cube -p policy policy/tests/cube/good_orders.cube.yml    # PASS
    conftest test --parser yaml  --namespace cube -p policy policy/tests/cube/bad_orders.cube.yml     # FAIL
    ```

    Conftest is Apache-2.0; the CI binary is version-pinned (see
    `THIRD-PARTY-LICENSES.md`).
  # ── policy test fixtures (conftest-verifiable: good pass, bad fail) ─────────
  good_dbt_manifest.json: |
    {
      "files": [
        {
          "path": "dbt/models/governed/sales/gold_orders.sql",
          "content": "{{ "{{" }} config(materialized='table', schema='sales') {{ "}}" }}\n\nselect * from iceberg.personal_alex.gold_orders\n"
        },
        {
          "path": "dbt/models/governed/marketing/silver_leads.sql",
          "content": "{{ "{{" }} config(materialized='table', schema='marketing') {{ "}}" }}\n\nselect * from iceberg.personal_dana.silver_leads\n"
        }
      ]
    }
  bad_dbt_manifest.json: |
    {
      "files": [
        {
          "path": "dbt/models/governed/sales/gold_orders.sql",
          "content": "{{ "{{" }} config(materialized='view', schema='sales') {{ "}}" }}\n\nselect * from hive.raw.orders;  -- raw catalog, ';' and comment\n"
        },
        {
          "path": "dbt/models/governed/sales/orders.sql",
          "content": "{{ "{{" }} config(materialized='table', schema='sales') {{ "}}" }}\n\nselect * from iceberg.personal_alex.gold_orders\n"
        },
        {
          "path": "dbt/models/governed/sales/gold_join.sql",
          "content": "{{ "{{" }} config(materialized='table', schema='sales') {{ "}}" }}\n\nselect * from iceberg.sales.gold_a join iceberg.finance.gold_b on a.id = b.id\n"
        }
      ]
    }
  good_orders.cube.yml: |
    cubes:
      - name: sales__orders
        sql_table: iceberg.sales.gold_orders
        measures:
          - name: revenue
            type: sum
            sql: net_amount
          - name: orders
            type: count
        dimensions:
          - name: order_id
            sql: order_id
            type: number
            primary_key: true
          - name: order_date
            sql: order_date
            type: time
  bad_orders.cube.yml: |
    cubes:
      - name: orders
        sql_table: hive.raw.orders_raw
        measures:
          - name: revenue
            type: median
            sql: net_amount
        dimensions:
          - name: order_date
            type: bogustype
            sql: order_date
  # ── CI workflow (validate on every push/PR; publish dbt artifacts on push to main) ─
  ci.yml: |
    # Forgejo Actions CI for the analytics monorepo.
    #   validate (Phase 1)  — dbt parse + cube YAML lint (every push + PR).
    #   publish  (Phase 5)  — on push to main: dbt compile + docs generate, then upload
    #                         target/manifest.json + catalog.json to the S3 location the
    #                         OpenMetadata dbt ingestion already reads
    #                         (bucket `dbt`, prefix `artifacts/`, endpoint seaweedfs-s3).
    # OM's ingestion CronJob needs NO change; flipping openmetadata.ingestion.dbt.enabled
    # to true is the operator's separate step once artifacts start flowing.
    on:
      push:
        branches: [main]
      pull_request:
        branches: [main]
    jobs:
      validate:
        runs-on: docker
        steps:
          - name: Checkout (sovereign — no external actions)
            env:
              FORGEJO_PASS: "{{ "${{ secrets.FORGEJO_PASS }}" }}"
              FORGEJO_URL: "{{ "${{ vars.FORGEJO_URL }}" }}"
              FORGEJO_USER: "{{ "${{ vars.FORGEJO_USER }}" }}"
            run: |
              set -eu
              git clone --depth 1 \
                "http://${FORGEJO_USER}:${FORGEJO_PASS}@${FORGEJO_URL}/${FORGEJO_USER}/analytics.git" \
                /workspace
          - name: dbt parse (syntax check, no DB needed)
            run: |
              set -eu
              cd /workspace
              pip install dbt-core --quiet
              dbt parse --project-dir dbt --profiles-dir dbt --no-version-check 2>&1 | tail -5
          - name: cube YAML lint (valid YAML, required keys present)
            run: |
              set -eu
              python3 - <<'EOF'
              import os, yaml, sys
              errors = []
              for root, _, files in os.walk("/workspace/cube"):
                  for f in files:
                      if not f.endswith(".yml"):
                          continue
                      path = os.path.join(root, f)
                      try:
                          doc = yaml.safe_load(open(path))
                          if not isinstance(doc, dict) or "cubes" not in doc:
                              errors.append(f"{path}: missing 'cubes' key")
                      except Exception as e:
                          errors.append(f"{path}: {e}")
              if errors:
                  print("\n".join(errors)); sys.exit(1)
              print(f"cube YAML lint OK ({len([f for r,_,fs in os.walk('/workspace/cube') for f in fs if f.endswith('.yml')])} files)")
              EOF
      # ── Phase 0 (#146): conftest policy gate over the CHANGED OS-managed files ──
      #   ADVISORY GATE. It blocks merge, but it is NOT the security boundary: the
      #   server re-enforces the same rules on POST /api/analytics/apply (see
      #   policy/README.md). Pinned conftest binary, no external marketplace actions
      #   (same sovereign-checkout pattern as `validate`). Runs after validate.
      conftest:
        runs-on: docker
        needs: validate
        env:
          CONFTEST_VERSION: "0.56.0"
        steps:
          - name: Checkout (sovereign — no external actions, full history for the diff)
            env:
              FORGEJO_PASS: "{{ "${{ secrets.FORGEJO_PASS }}" }}"
              FORGEJO_URL: "{{ "${{ vars.FORGEJO_URL }}" }}"
              FORGEJO_USER: "{{ "${{ vars.FORGEJO_USER }}" }}"
            run: |
              set -eu
              # Full clone (not --depth 1): the gate diffs the PR/push against main.
              git clone \
                "http://${FORGEJO_USER}:${FORGEJO_PASS}@${FORGEJO_URL}/${FORGEJO_USER}/analytics.git" \
                /workspace
          - name: Install conftest (pinned, checksum-free mirror of the Apache-2.0 release)
            run: |
              set -eu
              cd /tmp
              ARCH="$(uname -m)"; case "$ARCH" in x86_64) ARCH=x86_64 ;; aarch64|arm64) ARCH=arm64 ;; esac
              URL="https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_${ARCH}.tar.gz"
              curl -sSfL "$URL" -o conftest.tgz
              tar -xzf conftest.tgz conftest
              install -m 0755 conftest /usr/local/bin/conftest
              conftest --version
          - name: Compute changed OS-managed files (governed dbt + cube metrics)
            run: |
              set -eu
              cd /workspace
              # Determine the merge base: PR → base branch; push → previous commit.
              BASE="{{ "${{ github.event.pull_request.base.sha || github.event.before }}" }}"
              if [ -z "$BASE" ] || ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then
                BASE="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
              fi
              git diff --name-only --diff-filter=ACMR "$BASE" HEAD > /tmp/changed.txt || git ls-files > /tmp/changed.txt
              grep -E '^dbt/models/governed/.*\.sql$'        /tmp/changed.txt > /tmp/changed-dbt.txt  || true
              grep -E '^cube/models/metrics/.*\.cube\.yml$'  /tmp/changed.txt > /tmp/changed-cube.txt || true
              echo "changed governed dbt models:";  cat /tmp/changed-dbt.txt  || true
              echo "changed governed cube models:"; cat /tmp/changed-cube.txt || true
          - name: conftest — governed dbt models (advisory; server re-enforces on apply)
            run: |
              set -eu
              cd /workspace
              if [ ! -s /tmp/changed-dbt.txt ]; then echo "no governed dbt models changed — skipping"; exit 0; fi
              # dbt SQL is raw text; collect the changed files into a JSON manifest so
              # the policy can inspect path+content (the dbt.rego input contract).
              python3 - <<'PY'
              import json
              files=[]
              for p in open("/tmp/changed-dbt.txt").read().split():
                  files.append({"path": p, "content": open(p).read()})
              json.dump({"files": files}, open("/tmp/governed-dbt.manifest.json","w"))
              PY
              conftest test --parser json --namespace dbt -p policy /tmp/governed-dbt.manifest.json
          - name: conftest — governed cube models (advisory; server re-enforces on apply)
            run: |
              set -eu
              cd /workspace
              if [ ! -s /tmp/changed-cube.txt ]; then echo "no governed cube models changed — skipping"; exit 0; fi
              # shellcheck disable=SC2046
              conftest test --parser yaml --namespace cube -p policy $(cat /tmp/changed-cube.txt)
      # ── Phase 5: publish dbt artifacts to S3 for the OpenMetadata dbt ingestion ──
      publish-dbt-artifacts:
        runs-on: docker
        needs: validate
        if: "{{ "${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}" }}"
        steps:
          - name: Checkout (sovereign — no external actions)
            env:
              FORGEJO_PASS: "{{ "${{ secrets.FORGEJO_PASS }}" }}"
              FORGEJO_URL: "{{ "${{ vars.FORGEJO_URL }}" }}"
              FORGEJO_USER: "{{ "${{ vars.FORGEJO_USER }}" }}"
            run: |
              set -eu
              git clone --depth 1 \
                "http://${FORGEJO_USER}:${FORGEJO_PASS}@${FORGEJO_URL}/${FORGEJO_USER}/analytics.git" \
                /workspace
          - name: dbt compile + docs generate (produce manifest.json + catalog.json)
            run: |
              set -eu
              cd /workspace
              pip install dbt-core dbt-trino --quiet
              # compile is enough for manifest.json; docs generate adds catalog.json.
              # Non-blocking: a warehouse-less runner may not fully introspect — upload
              # whatever artifacts get produced (OM tolerates a manifest-only source).
              dbt compile --project-dir dbt --profiles-dir dbt --no-version-check 2>&1 | tail -5 \
                || echo "WARNING: dbt compile reported errors; uploading whatever artifacts exist."
              dbt docs generate --project-dir dbt --profiles-dir dbt --no-version-check 2>&1 | tail -5 \
                || echo "WARNING: dbt docs generate failed; catalog.json may be absent."
          - name: Upload manifest.json + catalog.json to S3
            env:
              AWS_ACCESS_KEY_ID: "{{ "${{ secrets.DBT_S3_ACCESS_KEY_ID }}" }}"
              AWS_SECRET_ACCESS_KEY: "{{ "${{ secrets.DBT_S3_SECRET_ACCESS_KEY }}" }}"
              # Defaults mirror openmetadata.ingestion.dbt.s3 (the OM CronJob reads the
              # same bucket/prefix/endpoint). Override via repo vars if OM config changes.
              S3_ENDPOINT: "{{ "${{ vars.DBT_S3_ENDPOINT || 'http://seaweedfs-s3:8333' }}" }}"
              S3_BUCKET: "{{ "${{ vars.DBT_S3_BUCKET || 'dbt' }}" }}"
              S3_PREFIX: "{{ "${{ vars.DBT_S3_PREFIX || 'artifacts/' }}" }}"
              AWS_DEFAULT_REGION: "{{ "${{ vars.DBT_S3_REGION || 'us-east-1' }}" }}"
            run: |
              set -eu
              cd /workspace/dbt/target
              pip install awscli --quiet
              PREFIX="${S3_PREFIX%/}"
              for f in manifest.json catalog.json; do
                if [ -f "$f" ]; then
                  aws --endpoint-url "$S3_ENDPOINT" s3 cp "$f" "s3://${S3_BUCKET}/${PREFIX}/$f"
                  echo "uploaded $f -> s3://${S3_BUCKET}/${PREFIX}/$f"
                else
                  echo "WARNING: $f absent; skipping upload."
                fi
              done
---
apiVersion: batch/v1
kind: Job
metadata:
  name: analytics-seed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "analytics-seed") | nindent 4 }}
  annotations:
    # Install AND upgrade: idempotent convergence of the OS-managed skeleton.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "26"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 8
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "analytics-seed") | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
      containers:
        - name: seed
          image: curlimages/curl:8.11.1
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
            readOnlyRootFilesystem: true
          env:
            - name: FORGEJO
              value: "http://forgejo-http:3000"
            - name: USER
              value: {{ $owner | quote }}
            - name: PASS
              value: {{ .Values.forgejo.gitea.admin.password | quote }}
            - name: REPO
              value: "analytics"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              echo "waiting for Forgejo..."
              ready=""
              for i in $(seq 1 80); do
                curl -sf "$FORGEJO/api/v1/version" >/dev/null 2>&1 && { ready=1; break; } || sleep 3
              done
              if [ -z "$ready" ]; then
                echo "FATAL: Forgejo not reachable after wait window" >&2
                exit 1
              fi
              AUTH="-u $USER:$PASS"

              # http_code <method> <url> [json-body] — echo ONLY the HTTP status, discard body.
              http_code() {
                _m="$1"; _u="$2"; _b="${3:-}"
                if [ -n "$_b" ]; then
                  curl -s -o /dev/null -w "%{http_code}" $AUTH -X "$_m" "$_u" \
                    -H "Content-Type: application/json" -d "$_b"
                else
                  curl -s -o /dev/null -w "%{http_code}" $AUTH -X "$_m" "$_u"
                fi
              }

              # create repo if missing. 201=created, 409=already exists (both fine).
              # Any OTHER status aborts the Job (fail loudly — no `|| true` swallow).
              CODE=$(http_code POST "$FORGEJO/api/v1/user/repos" \
                "{\"name\":\"$REPO\",\"private\":true,\"auto_init\":true,\"default_branch\":\"main\",\"description\":\"OS-managed analytics monorepo (dbt/cube/dagster)\"}")
              echo "create repo -> $CODE"
              case "$CODE" in
                201|409) : ;;
                *) echo "FATAL: repo-create returned $CODE" >&2; exit 1 ;;
              esac

              # put_file <local> <repo-path> — create or update (sha-based, idempotent).
              # A non-2xx write ABORTS the Job so a real failure marks the hook failed
              # (backoffLimit retries; persistent failure surfaces to the operator).
              put_file() {
                f="$1"; path="$2"
                B64=$(base64 -w0 "$f" 2>/dev/null || base64 "$f" | tr -d '\n')
                SHA=$(curl -s $AUTH "$FORGEJO/api/v1/repos/$USER/$REPO/contents/$path?ref=main" | sed -n 's/.*"sha":"\([0-9a-f]*\)".*/\1/p' | head -1)
                if [ -n "$SHA" ]; then
                  CODE=$(http_code PUT "$FORGEJO/api/v1/repos/$USER/$REPO/contents/$path" \
                    "{\"branch\":\"main\",\"content\":\"$B64\",\"message\":\"seed: $path\",\"sha\":\"$SHA\"}")
                  echo "update $path -> $CODE"
                else
                  CODE=$(http_code POST "$FORGEJO/api/v1/repos/$USER/$REPO/contents/$path" \
                    "{\"branch\":\"main\",\"content\":\"$B64\",\"message\":\"seed: $path\"}")
                  echo "add    $path -> $CODE"
                fi
                case "$CODE" in
                  200|201) : ;;
                  *) echo "FATAL: put_file $path returned $CODE" >&2; exit 1 ;;
                esac
              }
              # README
              put_file /seed/README.md README.md
              # dbt project
              put_file /seed/dbt_project.yml dbt/dbt_project.yml
              put_file /seed/profiles.yml dbt/profiles.yml
              put_file /seed/raw_orders.csv dbt/seeds/raw_orders.csv
              put_file /seed/schema.yml dbt/models/schema.yml
              put_file /seed/stg_orders.sql dbt/models/staging/stg_orders.sql
              put_file /seed/daily_revenue.sql dbt/models/marts/daily_revenue.sql
              # Cube seed models (demo cubes — static, not OS-managed runtime path)
              put_file /seed/northpeakcommerce.yml cube/models/seed/northpeakcommerce.yml
              put_file /seed/daily_revenue_cube.yml cube/models/seed/daily_revenue.yml
              put_file /seed/mart_sales.yml cube/models/seed/mart_sales.yml
              # Dagster definitions
              put_file /seed/definitions.py dagster/definitions.py
              # Conftest/OPA policy pack (#146 Phase 0) — PRE-MERGE advisory gate.
              put_file /seed/dbt.rego policy/dbt.rego
              put_file /seed/cube.rego policy/cube.rego
              put_file /seed/policy_README.md policy/README.md
              # Policy test fixtures (conftest-verifiable: good pass, bad fail).
              put_file /seed/good_dbt_manifest.json policy/tests/dbt/good_dbt_manifest.json
              put_file /seed/bad_dbt_manifest.json policy/tests/dbt/bad_dbt_manifest.json
              put_file /seed/good_orders.cube.yml policy/tests/cube/good_orders.cube.yml
              put_file /seed/bad_orders.cube.yml policy/tests/cube/bad_orders.cube.yml
              # CI workflow LAST (triggers validation run)
              put_file /seed/ci.yml .forgejo/workflows/ci.yml
              echo "analytics repo seed done"
          volumeMounts:
            - { name: manifest, mountPath: /seed, readOnly: true }
      volumes:
        - name: manifest
          configMap:
            name: analytics-seed-manifest
{{- end }}
