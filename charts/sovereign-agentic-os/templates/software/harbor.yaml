{{- if .Values.harbor.enabled }}
{{- /*
  Harbor — production image registry for the Software golden path (per-app builds
  in the Software tab: Forgejo Actions -> Harbor -> Argo CD -> live subdomain).

  DEFAULT-OFF (harbor.enabled=false): locally CI uses Forgejo's built-in OCI
  registry, so the bundle is untouched unless this flag is on. This renders a
  MINIMAL OCI registry (registry:2) standing in for the full Harbor stack on a
  laptop; on STACKIT replace this with the upstream Harbor chart. Digest-pinned
  image, soa.* labels + securityContext helpers, additive — no existing template
  is modified.
*/}}
{{- $h := .Values.harbor }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harbor-registry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "harbor") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "soa.selectorLabels" (dict "ctx" . "component" "harbor") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "soa.labels" . | nindent 8 }}
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "harbor") | nindent 8 }}
    spec:
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
      containers:
        - name: registry
          image: "{{ $h.image.repository }}:{{ $h.image.tag }}@{{ $h.image.digest }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
          env:
            - name: REGISTRY_HTTP_ADDR
              value: "0.0.0.0:5000"
          ports:
            - { name: registry, containerPort: 5000 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/registry }
          resources:
            {{- toYaml $h.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if $h.persistence.enabled }}
          persistentVolumeClaim:
            claimName: harbor-registry-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: harbor-registry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "harbor") | nindent 4 }}
spec:
  selector:
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "harbor") | nindent 4 }}
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
{{- if $h.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: harbor-registry-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ $h.persistence.size | quote }}
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass | quote }}
  {{- end }}
{{- end }}
{{- end }}
