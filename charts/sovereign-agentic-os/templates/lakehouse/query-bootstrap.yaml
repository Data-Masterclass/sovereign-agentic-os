{{- if .Values.queryTool.enabled }}
{{- /*
  Lakehouse bootstrap — creates the sample Iceberg namespace + table with data
  on object storage (catalog in CNPG). Post-install/upgrade hook; idempotent.
*/}}
{{- $q := .Values.queryTool }}
apiVersion: batch/v1
kind: Job
metadata:
  name: lakehouse-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "query-tool") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 8
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "query-tool") | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
      containers:
        - name: bootstrap
          image: "{{ $q.image.repository }}:{{ $q.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
          env:
            - name: HOME
              value: /tmp
            {{- include "soa.queryToolEnv" . | nindent 12 }}
          # Wait for Polaris DB + MinIO, then create the namespace/table/data.
          command: ["/bin/sh", "-c"]
          args:
            - |
              for i in $(seq 1 40); do
                python -c "import common; common.catalog().list_namespaces()" >/dev/null 2>&1 && break
                echo "waiting for catalog DB / object storage..."; sleep 3
              done
              python /app/bootstrap.py
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
