{{- if .Values.polaris.enabled }}
{{- /*
  Apache Polaris — the Iceberg REST catalog (Layer 3 lakehouse). Iceberg tables
  live on object storage (MinIO locally / STACKIT Object Storage in prod).
  Local persistence is in-memory (a stand-in that re-bootstraps on restart);
  durable deploys set persistenceType: relational-jdbc against the bundled
  `polaris` Postgres DB (pg-rw) so warehouse/namespace/table registrations survive
  a pod restart. For relational-jdbc, the `bootstrap` initContainer below runs the
  admin tool once to create the schema + realm root before the server starts.
  The `lakehouse` CATALOG entity itself is registered post-start by the
  polaris-catalog-init Job (templates/lakehouse/polaris-bootstrap.yaml).
*/}}
{{- $pl := .Values.polaris }}
{{- if eq .Values.global.profile "local" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pl.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "polaris") | nindent 4 }}
type: Opaque
stringData:
  # realm,clientId,clientSecret — bootstraps the realm's root principal.
  POLARIS_BOOTSTRAP_CREDENTIALS: "{{ $pl.realm }},{{ $pl.local.rootClientId }},{{ $pl.local.rootClientSecret }}"
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polaris
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- include "soa.syncWaveAnno" (dict "ctx" . "tier" "apps") | nindent 4 }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "polaris") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "soa.selectorLabels" (dict "ctx" . "component" "polaris") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "soa.labels" . | nindent 8 }}
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "polaris") | nindent 8 }}
    spec:
      {{- include "soa.priorityClassName" (dict "ctx" . "tier" "app") | nindent 6 }}
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 10000        # image's 'polaris' user (numeric, for runAsNonRoot)
        runAsGroup: 10001
      {{- if eq $pl.persistenceType "relational-jdbc" }}
      # Bootstrap the JDBC metastore ONCE per realm: create `polaris_schema` + the
      # realm's root principal in the `polaris` Postgres DB. Polaris does NOT
      # self-create the schema for relational-jdbc, so this MUST run before the server.
      # The admin tool's `bootstrap` is NOT idempotent (1.0.1 has no --if-not-exists):
      # re-running it on an already-bootstrapped realm exits non-zero
      # ("Bootstrap encountered errors during operation"), which would CrashLoop the
      # pod on every restart/redeploy. So we GATE it: `bootstrap-check` looks for the
      # realm's root-principal row in Postgres and writes a sentinel; the `bootstrap`
      # container runs the admin tool only when that row is absent. Both initContainers
      # re-run on every pod start AND every Argo sync (Helm hooks / a post-install-only
      # trick do NOT give run-once semantics under GitOps), so gating — not hooks — is
      # what makes this safe: an already-bootstrapped realm is a no-op and the server
      # starts normally.
      initContainers:
        # 1) Detect whether the realm is already bootstrapped. `to_regclass` returns
        #    NULL (no error) on a fresh DB where `polaris_schema` does not exist yet, so
        #    the query is safe pre-bootstrap. Waits for pg-rw first (fresh-install race).
        - name: bootstrap-check
          image: "{{ .Values.postgres.plainImage.repository }}:{{ .Values.postgres.plainImage.tag }}{{ if .Values.postgres.plainImage.digest }}@{{ .Values.postgres.plainImage.digest }}{{ end }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              export PGPASSWORD="$PG_PASSWORD"
              echo "waiting for Postgres ($PG_HOST/$PG_DB) ..."
              ok=
              for i in $(seq 1 60); do
                if psql -h "$PG_HOST" -U "$PG_USER" -d "$PG_DB" -tAc 'select 1' >/dev/null 2>&1; then ok=1; break; fi
                sleep 2
              done
              if [ -z "$ok" ]; then echo "ERROR: Postgres not reachable"; exit 1; fi
              cnt=$(psql -h "$PG_HOST" -U "$PG_USER" -d "$PG_DB" -tAc \
                "select case when to_regclass('polaris_schema.principal_authentication_data') is null then 0 else (select count(*) from polaris_schema.principal_authentication_data where realm_id = '$POLARIS_REALM') end")
              cnt=$(printf '%s' "$cnt" | tr -d '[:space:]')
              if [ "${cnt:-0}" -gt 0 ]; then
                echo "realm '$POLARIS_REALM' already bootstrapped ($cnt root-principal row(s)) -- skipping bootstrap"
                # --- Polaris 1.0.x -> 1.1.0 JDBC schema migration (additive + idempotent) ---
                # 1.1.0 introduced JDBC schema versioning: on startup the server reads
                # `polaris_schema.version` and expects a `location_without_scheme` column on
                # `entities`. A metastore bootstrapped by 1.0.x has NEITHER, so 1.1.0 errors
                # loading the VERSION table. These statements add both WITHOUT touching any
                # existing catalog/namespace/table rows (CREATE TABLE / ADD COLUMN IF NOT
                # EXISTS + INSERT ... ON CONFLICT DO NOTHING -> safe to re-run on every pod
                # start / Argo sync). We stamp schema version = 1 (the 1.0.x-compatible schema
                # 1.1.0 still uses by default). NOTE: do NOT enable the OPTIMIZED_SIBLING_CHECK
                # feature after this migration — location_without_scheme is intentionally left
                # un-backfilled for pre-existing rows, which that feature would misread. This
                # runs only in the already-bootstrapped branch; a fresh 1.1.0 install gets the
                # correct v1 schema (incl. the version table) straight from the admin tool.
                echo "ensuring 1.1.0 JDBC schema (version table + location_without_scheme) ..."
                psql -h "$PG_HOST" -U "$PG_USER" -d "$PG_DB" -v ON_ERROR_STOP=1 -c \
                  "CREATE TABLE IF NOT EXISTS polaris_schema.version (version_key TEXT PRIMARY KEY, version_value INTEGER NOT NULL); INSERT INTO polaris_schema.version (version_key, version_value) VALUES ('version', 1) ON CONFLICT (version_key) DO NOTHING; ALTER TABLE polaris_schema.entities ADD COLUMN IF NOT EXISTS location_without_scheme TEXT;"
                echo "1.1.0 JDBC schema ensured"
                : > /bootstrap-state/done
              else
                echo "realm '$POLARIS_REALM' not bootstrapped -- bootstrap will run"
                : > /bootstrap-state/needed
              fi
          env:
            - name: PG_HOST
              value: {{ include "soa.pgHost" . | quote }}
            - name: PG_DB
              value: {{ $pl.jdbc.database | quote }}
            - name: PG_USER
              valueFrom: { secretKeyRef: { name: {{ $pl.jdbc.secretName }}, key: username } }
            - name: PG_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ $pl.jdbc.secretName }}, key: password } }
            - name: POLARIS_REALM
              value: {{ $pl.realm | quote }}
          volumeMounts:
            - { name: bootstrap-state, mountPath: /bootstrap-state }
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
        # 2) Bootstrap ONLY when step 1 said the realm is missing. On skip this exits 0
        #    immediately, so the server starts even after a restart/redeploy.
        - name: bootstrap
          image: "{{ $pl.adminImage.repository }}:{{ $pl.adminImage.tag }}{{ if $pl.adminImage.digest }}@{{ $pl.adminImage.digest }}{{ end }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
          # POLARIS_BOOTSTRAP_CREDENTIALS is already "realm,clientId,clientSecret" —
          # exactly the `-c` format the admin tool expects.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              if [ -f /bootstrap-state/done ]; then
                echo "realm '$POLARIS_REALM' already bootstrapped -- skipping admin-tool"
                exit 0
              fi
              echo "bootstrapping realm '$POLARIS_REALM' ..."
              exec /opt/jboss/container/java/run/run-java.sh bootstrap -r "$POLARIS_REALM" -c "$POLARIS_BOOTSTRAP_CREDENTIALS"
          env:
            - name: POLARIS_PERSISTENCE_TYPE
              value: {{ $pl.persistenceType | quote }}
            - name: POLARIS_REALM
              value: {{ $pl.realm | quote }}
            - name: POLARIS_BOOTSTRAP_CREDENTIALS
              valueFrom: { secretKeyRef: { name: {{ $pl.secretName }}, key: POLARIS_BOOTSTRAP_CREDENTIALS } }
            - name: QUARKUS_DATASOURCE_DB_KIND
              value: postgresql
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://{{ include "soa.pgHost" . }}:5432/{{ $pl.jdbc.database }}"
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: {{ $pl.jdbc.secretName }}, key: username } }
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ $pl.jdbc.secretName }}, key: password } }
          volumeMounts:
            - { name: bootstrap-state, mountPath: /bootstrap-state }
          resources:
            {{- toYaml $pl.resources | nindent 12 }}
      volumes:
        - name: bootstrap-state
          emptyDir: {}
      {{- end }}
      containers:
        - name: polaris
          image: "{{ $pl.image.repository }}:{{ $pl.image.tag }}@{{ $pl.image.digest }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
          env:
            - name: POLARIS_PERSISTENCE_TYPE
              value: {{ $pl.persistenceType | quote }}
            {{- if eq $pl.persistenceType "relational-jdbc" }}
            # Durable metastore: Quarkus datasource -> the bundled `polaris` Postgres
            # DB (pg-rw). Catalog metadata survives a Polaris restart. The schema +
            # realm root are created by the `bootstrap` initContainer below.
            - name: QUARKUS_DATASOURCE_DB_KIND
              value: postgresql
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://{{ include "soa.pgHost" . }}:5432/{{ $pl.jdbc.database }}"
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: {{ $pl.jdbc.secretName }}, key: username } }
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ $pl.jdbc.secretName }}, key: password } }
            {{- end }}
            - name: POLARIS_BOOTSTRAP_CREDENTIALS
              valueFrom: { secretKeyRef: { name: {{ $pl.secretName }}, key: POLARIS_BOOTSTRAP_CREDENTIALS } }
            - name: POLARIS_REALM_CONTEXT_REALMS    # Quarkus: polaris.realm-context.realms
              value: {{ $pl.realm | quote }}
            # S3 access to the object store (for credential vending + validation).
            - name: AWS_REGION
              value: {{ $pl.s3.region | quote }}
            - name: AWS_ENDPOINT_URL_S3
              value: {{ include "soa.s3Endpoint" . | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom: { secretKeyRef: { name: {{ .Values.objectStorage.secretName }}, key: AWS_ACCESS_KEY_ID } }
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: {{ .Values.objectStorage.secretName }}, key: AWS_SECRET_ACCESS_KEY } }
            # NOTE — do NOT reintroduce the SKIP_CREDENTIAL_SUBSCOPING_INDIRECTION feature
            # flag here (it was needed on 1.0.x, where MinIO's lack of an AWS STS endpoint
            # 403'd the sub-scoping call). On Polaris 1.1.0 credential vending calls STS at
            # the catalog's storageConfigInfo `endpointInternal` by default, and MinIO's STS
            # AssumeRole works (verified live: HTTP 200 + temp creds), so Polaris's own
            # write/commit FileIO receives a fully-populated AccessConfig — including
            # endpointInternal + pathStyleAccess — and CTAS succeeds. With the flag set,
            # 1.1.0 instead returns an EMPTY AccessConfig, so endpoint/path-style never
            # reach the write FileIO and CTAS breaks again. Removing the flag IS the fix.
          ports:
            - { name: catalog, containerPort: 8181 }
            - { name: mgmt, containerPort: 8182 }
          startupProbe:
            httpGet: { path: /q/health/ready, port: mgmt }
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /q/health/ready, port: mgmt }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /q/health/live, port: mgmt }
            periodSeconds: 20
          resources:
            {{- toYaml $pl.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: polaris
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "polaris") | nindent 4 }}
spec:
  selector:
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "polaris") | nindent 4 }}
  ports:
    - { name: catalog, port: 8181, targetPort: catalog }
    - { name: mgmt, port: 8182, targetPort: mgmt }
{{- end }}
