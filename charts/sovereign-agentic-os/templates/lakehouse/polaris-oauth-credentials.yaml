{{- if .Values.polaris.enabled }}
{{- if eq .Values.global.profile "local" }}
{{- /*
  Polaris OAuth2 client-credentials Secret (local dev root principal).

  Consumed by BOTH Trino's Iceberg/Polaris connector (templates/lakehouse/trino.yaml,
  when trino.enabled) and data-runner (templates/lakehouse/data-runner.yaml, which
  talks to Polaris directly and does not need Trino at all). Kept in its own
  template — gated only on polaris.enabled, not trino.enabled — so disabling Trino
  (the tiny-kind-node default, values.selfcontained.yaml) doesn't take data-runner's
  Polaris credential down with it.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: trino-catalog-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "polaris") | nindent 4 }}
type: Opaque
stringData:
  # Polaris OAuth2 client (clientId:clientSecret) — local dev root principal.
  POLARIS_OAUTH_CREDENTIAL: "{{ .Values.polaris.local.rootClientId }}:{{ .Values.polaris.local.rootClientSecret }}"
{{- end }}
{{- end }}
