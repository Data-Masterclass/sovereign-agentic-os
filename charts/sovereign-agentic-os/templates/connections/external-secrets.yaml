{{- if and .Values.connections.enabled .Values.connections.externalSecrets.enabled }}
{{- /*
  Connections golden path §2 — External Secrets for manually-credentialed
  Connections (security.md). THE ONE RULE: the secret never leaves Secrets
  Manager. A Connection's credential is written to STACKIT Secrets Manager; the
  External Secrets Operator syncs it into a K8s Secret the connection proxy mounts
  server-side. The connection RECORD holds only a reference (name/key) — never the
  value; nothing sensitive is in git or in the record.

  Rendered ONLY when connections.externalSecrets.enabled (default OFF), because the
  ESO CRDs are not installed on a fresh kind cluster — so `helm template`/`helm
  lint` stay valid out of the box. Turn this on once ESO + a STACKIT Secrets
  Manager SecretStore exist.
*/}}
{{- $es := .Values.connections.externalSecrets }}
{{- range $es.items }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "soa.labels" $ | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ $es.secretStoreRef.name }}
    kind: {{ $es.secretStoreRef.kind }}
  target:
    name: {{ .name }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .property }}
      remoteRef:
        key: {{ .remoteKey }}
        property: {{ .property }}
{{- end }}
{{- end }}
