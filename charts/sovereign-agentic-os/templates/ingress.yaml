{{- /*
  Copyright 2026 Borek Data Ventures UG (haftungsbeschränkt)
  SPDX-License-Identifier: Apache-2.0

  Public-tool Ingress (Mode B / STACKIT). OFF by default (`ingress.enabled=false`)
  so the bundled/local Mode A path is untouched — nothing here renders unless an
  operator opts in via the values.stackit-managed.yaml overlay.

  One Ingress per public tool, emitted ONLY when its `ingress.hosts.<key>` is set
  (non-empty). Each carries the cert-manager cluster-issuer annotation + a TLS
  block (host + a `<host>-tls` secret cert-manager fills) and routes `/` to the
  in-cluster Service. Hostnames resolve to the ingress LB (terraform DNS zone).
*/ -}}
{{- if .Values.ingress.enabled }}
{{- $ctx := . }}
{{- $ing := .Values.ingress }}
{{- /* host key -> in-cluster Service + port (release name `agentic-os`). */}}
{{- /* Long-lived WebSocket/proxy timeouts for the terminal + workbench brokers
       (idle shells / code-server keep the connection open well past the 60s
       ingress-nginx default). Merged per-route into the Ingress annotations. */}}
{{- $wsAnno := dict
  "nginx.ingress.kubernetes.io/proxy-read-timeout" "3600"
  "nginx.ingress.kubernetes.io/proxy-send-timeout" "3600"
}}
{{- /* The Workbench tab establishes its session CROSS-ORIGIN: the browser (on the
       OS UI origin) fetch-POSTs `workbench.<zone>/session?t=<token>` with
       credentials BEFORE iframing the editor, so the workbench Ingress must
       answer CORS for the OS UI origin(s) — the broker itself sets no CORS
       headers. The terminal needs none of this (WebSockets are not CORS-gated). */}}
{{- $uiOrigins := list }}
{{- range $k := list "osUI" "osUIApex" }}
{{- with index ($ing.hosts | default dict) $k }}{{- $uiOrigins = append $uiOrigins (printf "https://%s" .) }}{{- end }}
{{- end }}
{{- $wbAnno := merge (dict) $wsAnno }}
{{- if $uiOrigins }}
{{- $wbAnno = merge (dict
      "nginx.ingress.kubernetes.io/enable-cors" "true"
      "nginx.ingress.kubernetes.io/cors-allow-origin" (join ", " $uiOrigins)
      "nginx.ingress.kubernetes.io/cors-allow-credentials" "true"
      "nginx.ingress.kubernetes.io/cors-allow-methods" "GET, POST, OPTIONS"
    ) $wbAnno }}
{{- end }}
{{- /* Dagster OSS ships NO auth of its own (every other exposed console has a
       login). Its Ingress therefore demands an htpasswd Secret via nginx
       basic-auth: set `ingress.dagsterBasicAuthSecret` to a Secret name in the
       release namespace (key `auth`, htpasswd format). If the Secret is missing
       at request time ingress-nginx FAILS CLOSED (503) — never an open Dagster. */}}
{{- $dagsterAnno := dict }}
{{- with $ing.dagsterBasicAuthSecret }}
{{- $dagsterAnno = dict
      "nginx.ingress.kubernetes.io/auth-type" "basic"
      "nginx.ingress.kubernetes.io/auth-secret" .
      "nginx.ingress.kubernetes.io/auth-realm" "Dagster — operators only"
}}
{{- end }}
{{- $routes := dict
  "osUI"         (dict "service" "os-ui" "port" 3000)
  "litellm"      (dict "service" "agentic-os-litellm" "port" 4000)
  "langfuse"     (dict "service" "agentic-os-langfuse-web" "port" 3000)
  "superset"     (dict "service" "agentic-os-superset" "port" 8088)
  "forgejo"      (dict "service" "forgejo-http" "port" 3000)
  "argocd"       (dict "service" "argocd-server" "port" 80)
  "openmetadata" (dict "service" "openmetadata" "port" 8585)
  "dagster"      (dict "service" "agentic-os-dagster-webserver" "port" 80 "annotations" $dagsterAnno)
  "terminal"     (dict "service" "terminal-broker" "port" 8080 "annotations" $wsAnno)
  "workbench"    (dict "service" "workbench-broker" "port" 8080 "annotations" $wbAnno)
  "jupyterhub"   (dict "service" "proxy-public" "port" 80 "annotations" $wsAnno)
}}
{{- /* JupyterHub (Science) rides the $routes map above. Notebooks need WebSockets
       (kernels/terminals) so the tool CANNOT be served through the os-ui same-origin
       proxy (that route rejects protocol:ws with 501) — it needs its OWN public host
       fronting the Z2JH proxy (`proxy-public`), which the CHP serves at `/`. Emitted
       only when `ingress.hosts.jupyterhub` is set. $wsAnno gives it the long-timeout +
       Upgrade/Connection passthrough the kernel WebSockets require, same as the
       terminal/workbench WS consoles. */}}
{{- range $key, $route := $routes }}
{{- $host := index ($ing.hosts | default dict) $key }}
{{- if $host }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-ingress" $route.service }}
  namespace: {{ $ctx.Release.Namespace }}
  labels:
    {{- include "soa.labels" $ctx | nindent 4 }}
    app.kubernetes.io/name: {{ $route.service }}
    app.kubernetes.io/component: ingress
  annotations:
    cert-manager.io/cluster-issuer: {{ $ing.tlsIssuer | quote }}
    {{- with $ing.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with $route.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ $ing.className }}
  tls:
    - hosts:
        - {{ $host | quote }}
      secretName: {{ printf "%s-tls" $host | quote }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $route.service }}
                port:
                  number: {{ $route.port }}
{{- end }}
{{- end }}
{{- /*
  Apex route — the bare zone apex (e.g. agentic.datamasterclass.com) also serving
  the OS UI, so the apex no longer 404s alongside os.<zone>. Opt-in via
  `ingress.hosts.osUIApex`; a SECOND Ingress to the same os-ui Service (distinct
  name so it never collides with the osUI host's `os-ui-ingress`), its own TLS.
*/ -}}
{{- $apex := index ($ing.hosts | default dict) "osUIApex" }}
{{- if $apex }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: os-ui-apex-ingress
  namespace: {{ $ctx.Release.Namespace }}
  labels:
    {{- include "soa.labels" $ctx | nindent 4 }}
    app.kubernetes.io/name: os-ui
    app.kubernetes.io/component: ingress
  annotations:
    cert-manager.io/cluster-issuer: {{ $ing.tlsIssuer | quote }}
    {{- with $ing.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ $ing.className }}
  tls:
    - hosts:
        - {{ $apex | quote }}
      secretName: {{ printf "%s-tls" $apex | quote }}
  rules:
    - host: {{ $apex | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: os-ui
                port:
                  number: 3000
{{- end }}
{{- end }}
