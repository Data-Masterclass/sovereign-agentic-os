{{- if .Values.agentRuntime.enabled }}
{{- /*
  Agent runtime — the live-execution backend for the Agents tab. It holds ONLY
  its scoped LiteLLM virtual key (least privilege): no OPA, no Langfuse, no
  Forgejo, no platform creds. It reaches the model gateway (LiteLLM) and calls
  back into the OS UI's governed-tool endpoint; everything else is denied by its
  dedicated egress NetworkPolicy (templates/network/egress-policies.yaml).
  Graph semantics arrive via the OS UI /reload, not Forgejo.
*/}}
{{- $r := .Values.agentRuntime }}
{{- if eq .Values.global.profile "local" }}
# Local-profile shared token. The runtime presents this on its calls back to the
# OS UI governed-tool endpoint, and the OS UI presents the SAME token to the
# runtime — both read `agent-runtime-token`. On non-local profiles this Secret is
# delivered by External Secrets (ESO), so it is NOT rendered here.
apiVersion: v1
kind: Secret
metadata:
  name: agent-runtime-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "agent-runtime") | nindent 4 }}
type: Opaque
stringData:
  token: {{ $r.token | quote }}
---
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-runtime-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "agent-runtime") | nindent 4 }}
data:
  # Non-secret runtime config (the two secret values stay in Secrets below).
  PORT: "8000"
  LITELLM_BASE_URL: "http://agentic-os-litellm:4000/v1"
  CHAT_MODEL: {{ $r.chatModel | quote }}
  # The OS UI in-cluster Service ("os-ui", http port 3000) governed-tool endpoint.
  GOVERNED_TOOL_URL: "http://os-ui:3000/api/agents/tool"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- include "soa.syncWaveAnno" (dict "ctx" . "tier" "apps") | nindent 4 }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "agent-runtime") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "soa.selectorLabels" (dict "ctx" . "component" "agent-runtime") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "soa.labels" . | nindent 8 }}
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "agent-runtime") | nindent 8 }}
    spec:
      {{- include "soa.priorityClassName" (dict "ctx" . "tier" "app") | nindent 6 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
      containers:
        - name: agent-runtime
          image: "{{ $r.image.repository }}:{{ $r.image.tag }}"
          imagePullPolicy: IfNotPresent      # locally-built image, loaded into kind
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
            readOnlyRootFilesystem: true
          # Non-secret config (PORT, LITELLM_BASE_URL, CHAT_MODEL, GOVERNED_TOOL_URL).
          envFrom:
            - configMapRef:
                name: agent-runtime-config
          env:
            # Scoped LiteLLM virtual key (REUSED — not a freshly minted key).
            - name: LITELLM_API_KEY
              valueFrom: { secretKeyRef: { name: agent-litellm-key, key: apiKey } }
            # Shared token: validates the runtime <-> OS UI governed-tool calls.
            - name: AGENT_RUNTIME_TOKEN
              valueFrom: { secretKeyRef: { name: agent-runtime-token, key: token } }
          ports:
            - { name: http, containerPort: 8000 }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml $r.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: agent-runtime
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "agent-runtime") | nindent 4 }}
spec:
  selector:
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "agent-runtime") | nindent 4 }}
  ports:
    - { name: http, port: 8000, targetPort: http }
{{- end }}
