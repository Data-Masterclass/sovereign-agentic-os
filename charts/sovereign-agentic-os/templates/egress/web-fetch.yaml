{{- if .Values.webFetch.enabled }}
{{- /*
  Governed web_fetch tool — the only sanctioned path to the web. OPA-authorized
  per principal, routed through the egress proxy, returns sanitized data. Ships
  present-but-restricted (security.md) so nobody wires ad-hoc internet access.
*/}}
{{- $w := .Values.webFetch }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-fetch
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- include "soa.syncWaveAnno" (dict "ctx" . "tier" "middleware") | nindent 4 }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "web-fetch") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "soa.selectorLabels" (dict "ctx" . "component" "web-fetch") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "soa.labels" . | nindent 8 }}
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "web-fetch") | nindent 8 }}
    spec:
      {{- include "soa.priorityClassName" (dict "ctx" . "tier" "app") | nindent 6 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
      containers:
        - name: web-fetch
          image: "{{ $w.image.repository }}:{{ $w.image.tag }}"
          imagePullPolicy: IfNotPresent      # locally-built image, loaded into kind
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
            readOnlyRootFilesystem: true
          env:
            - name: PORT
              value: "8000"
            - name: OPA_URL
              value: "http://opa:8181"
            - name: PROXY_URL
              value: "http://egress-proxy:3128"
            - name: TOOL_NAME
              value: web_fetch
          ports:
            - { name: http, containerPort: 8000 }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml $w.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: web-fetch
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "web-fetch") | nindent 4 }}
spec:
  selector:
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "web-fetch") | nindent 4 }}
  ports:
    - { name: http, port: 8000, targetPort: http }
{{- end }}
