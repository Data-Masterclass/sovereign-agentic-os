{{- if .Values.dagster.enabled }}
{{- if eq .Values.global.profile "local" }}
{{- /*
  Adapter Secret for the Dagster subchart's Postgres connection.

  dagster.generatePostgresqlPasswordSecret is false (we don't want the subchart
  minting its own random password) and dagster.global.postgresqlSecretName points
  at this Secret. The subchart templates read key "postgresql-password" (its own
  convention), while postgres/credentials.yaml's per-database Secret
  (postgres-dagster-credentials) uses kubernetes.io/basic-auth keys
  (username/password) shared across both pg engines — so that Secret can't be
  pointed at directly. This one just republishes the same local dev password
  (dagster.postgresPasswordLocal, which must match
  postgres.extraDatabases[dagster].localPassword) under the key Dagster expects.
  Local/dev only: on STACKIT this Secret is supplied externally under the same name.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.dagster.global.postgresqlSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "dagster") | nindent 4 }}
type: Opaque
stringData:
  postgresql-password: {{ .Values.dagster.postgresPasswordLocal | quote }}
{{- end }}
{{- end }}
