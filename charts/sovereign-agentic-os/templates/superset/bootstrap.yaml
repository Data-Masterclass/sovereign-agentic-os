{{- if .Values.superset.enabled }}
{{- /*
  Superset bootstrap — registers CENTRAL TRINO as a database connection (Trino
  SQLAlchemy dialect) and creates a dataset on analytics.daily_revenue, so a
  domain can build charts on the governed mart THROUGH Trino (OPA row/column
  enforced). Trino is the only registered datasource. Post-install/upgrade hook;
  idempotent. Uses the query-tool image (requests).
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: superset-bootstrap-script
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "superset-bootstrap") | nindent 4 }}
data:
  bootstrap.py: |
    import os, time, requests
    B = os.environ["SUPERSET_URL"]; S = requests.Session()
    for _ in range(80):
        try:
            if S.get(B + "/health", timeout=5).status_code == 200: break
        except Exception: pass
        time.sleep(3)
    t = S.post(B + "/api/v1/security/login", json={
        "username": os.environ["SUPERSET_USER"], "password": os.environ["SUPERSET_PASS"],
        "provider": "db", "refresh": True}, timeout=15).json()["access_token"]
    H = {"Authorization": "Bearer " + t, "Referer": B}
    H["X-CSRFToken"] = S.get(B + "/api/v1/security/csrf_token/", headers=H).json()["result"]
    # Central Trino (no password on kind; the user identifies the domain to OPA).
    uri = f'trino://{os.environ["TRINO_USER"]}@{os.environ["TRINO_HOST"]}:{os.environ["TRINO_PORT"]}/{os.environ["TRINO_CATALOG"]}'
    ex = S.get(B + "/api/v1/database/?q=(filters:!((col:database_name,opr:eq,value:trino)))", headers=H).json()["result"]
    if ex:
        dbid = ex[0]["id"]; print("trino db exists", dbid)
    else:
        dbid = S.post(B + "/api/v1/database/", headers=H, json={"database_name": "trino", "sqlalchemy_uri": uri}).json()["id"]
        print("created trino db", dbid)
    ds = S.get(B + "/api/v1/dataset/?q=(filters:!((col:table_name,opr:eq,value:daily_revenue)))", headers=H).json()["result"]
    if ds:
        print("dataset exists", ds[0]["id"])
    else:
        r = S.post(B + "/api/v1/dataset/", headers=H, json={"database": dbid, "schema": "analytics", "table_name": "daily_revenue"})
        print("created dataset", r.status_code, r.json().get("id"))
---
apiVersion: batch/v1
kind: Job
metadata:
  name: superset-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "superset-bootstrap") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "superset-bootstrap") | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
      containers:
        - name: bootstrap
          image: "{{ .Values.queryTool.image.repository }}:{{ .Values.queryTool.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
          env:
            - name: HOME
              value: /tmp
            - name: SUPERSET_URL
              value: "http://agentic-os-superset:8088"
            - name: SUPERSET_USER
              value: {{ .Values.superset.init.adminUser.username | quote }}
            - name: SUPERSET_PASS
              value: {{ .Values.superset.init.adminUser.password | quote }}
            - name: TRINO_HOST
              value: "trino"
            - name: TRINO_PORT
              value: "8080"
            - name: TRINO_USER
              value: "superset-sales"
            - name: TRINO_CATALOG
              value: "iceberg"
          # Non-blocking data hook (like dbt-build): a bootstrap error (Superset or
          # Trino not ready yet, transient API failure) must NOT fail the platform
          # upgrade — it only means the Superset↔Trino datasource is stale until the
          # next run. Wrap so the container always exits 0; the WARNING stays in the log.
          command: ["/bin/sh", "-c"]
          args:
            - |
              python /script/bootstrap.py || echo "WARNING: superset bootstrap reported errors — the Trino datasource/dataset may be missing; NOT failing the platform upgrade (data hook is non-blocking)."
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { cpu: 250m, memory: 192Mi }
          volumeMounts:
            - { name: script, mountPath: /script, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: script
          configMap:
            name: superset-bootstrap-script
        - name: tmp
          emptyDir: {}
{{- end }}
