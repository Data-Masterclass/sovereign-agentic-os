{{- if .Values.osUI.enabled }}
{{- /*
  OS UI — the Next.js front door (the unified app shell + the live tabs:
  Home, Agents/Chat, Structured Data, Monitoring, Dashboards).
  Server-side API routes call the in-cluster backends (sample-agent, query-tool,
  Langfuse); the Langfuse keys come from a Secret so they never sit in plaintext.
  Non-root, readiness + liveness probes, port 3000.

  NOTE: this template is gated on `.Values.osUI.enabled`. The other engineer must
  add the `osUI:` block to values.yaml + the image to scripts/build-images.sh —
  see os-ui/INTEGRATION.md. Without that block this file renders to nothing.
*/}}
{{- $u := .Values.osUI }}
{{- /*
  Scoped RBAC for the native Components surface. The OS UI server reads workload
  status + scales Deployments/StatefulSets 0<->1 and reads CNPG Clusters
  directly via the in-cluster API (lib/platform.ts) — this is what the standalone
  admin-console used to do. Same least-privilege Role, now bound to os-ui.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: os-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "os-ui") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: os-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "deployments/scale", "statefulsets/scale"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: os-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: os-ui
subjects:
  - kind: ServiceAccount
    name: os-ui
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: os-ui
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- include "soa.syncWaveAnno" (dict "ctx" . "tier" "apps") | nindent 4 }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "os-ui") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "soa.selectorLabels" (dict "ctx" . "component" "os-ui") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "soa.labels" . | nindent 8 }}
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "os-ui") | nindent 8 }}
    spec:
      {{- include "soa.priorityClassName" (dict "ctx" . "tier" "app") | nindent 6 }}
      serviceAccountName: os-ui
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
      containers:
        - name: os-ui
          image: "{{ $u.image.repository }}:{{ $u.image.tag }}"
          imagePullPolicy: IfNotPresent      # locally-built image, loaded into kind
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
            readOnlyRootFilesystem: true
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            # Namespace the stack workloads live in — the native Components
            # surface reads their status + scales them 0<->1 here via the k8s API.
            - name: NAMESPACE
              value: {{ .Release.Namespace | quote }}
            # Session-signing secret (HMAC-SHA256 for the auth cookie). Sourced
            # from the generated `os-ui-session` Secret — NEVER the in-code
            # dev fallback, which would let anyone forge an admin session.
            - name: OS_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: os-ui-session
                  key: OS_SESSION_SECRET
            # Signs the per-user bearer token for the remote MCP endpoint
            # (/api/mcp). Sourced from the same os-ui-session Secret so it works
            # out of the box; repoint to its own Secret/key later to rotate MCP
            # tokens independently of session cookies.
            - name: OS_MCP_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: os-ui-session
                  key: OS_SESSION_SECRET
            {{- with .Values.osUI.usersSeed }}
            # Optional operator pre-seed of REAL users (JSON array). Not shipped;
            # plaintext passwords here are hashed on ingest. Empty = first-run
            # bootstrap admin only (admin/admin, forced-change on first login).
            - name: OS_USERS
              value: {{ . | quote }}
            {{- end }}
            # ---- Outbound email (OPTIONAL — os-ui/lib/mailer.ts pluggable mailer,
            # transports selected Graph > SMTP > none). With NEITHER block enabled
            # the platform works fully without email (the first-run admin
            # auto-verifies, later accounts are active at once). Secrets come from
            # k8s Secrets — never plaintext here.
            {{- if .Values.osUI.graph.enabled }}
            # Transport 1 — Microsoft Graph sendMail (recommended for M365).
            # GRAPH_CLIENT_SECRET comes from the os-ui-graph Secret.
            - name: GRAPH_TENANT_ID
              value: {{ .Values.osUI.graph.tenantId | quote }}
            - name: GRAPH_CLIENT_ID
              value: {{ .Values.osUI.graph.clientId | quote }}
            - name: GRAPH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: os-ui-graph
                  key: GRAPH_CLIENT_SECRET
                  optional: true
            - name: MAIL_FROM
              value: {{ .Values.osUI.graph.mailFrom | default "support@datamasterclass.com" | quote }}
            {{- end }}
            {{- if .Values.osUI.smtp.enabled }}
            # Transport 2 — generic SMTP relay (fallback). SMTP_PASS comes from the
            # os-ui-smtp Secret.
            - name: SMTP_HOST
              value: {{ .Values.osUI.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.osUI.smtp.port | quote }}
            - name: SMTP_SECURE
              value: {{ .Values.osUI.smtp.secure | quote }}
            {{- with .Values.osUI.smtp.user }}
            - name: SMTP_USER
              value: {{ . | quote }}
            {{- end }}
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: os-ui-smtp
                  key: SMTP_PASS
                  optional: true
            - name: SMTP_FROM
              value: {{ .Values.osUI.smtp.from | default "support@datamasterclass.com" | quote }}
            {{- if and .Values.mail.enabled .Values.mail.tls.osUITrust }}
            # In-cluster maddy presents a self-signed submission cert (SAN=`mail`),
            # which is not in the system trust store. Point Node at the mounted
            # cert so the SMTP client's STARTTLS handshake to `mail` validates
            # (rather than failing closed on an untrusted certificate).
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/os-ui/mail-ca/tls.crt
            {{- end }}
            {{- end }}
            {{- with (toString .Values.osUI.emailVerification) }}
            # Coerced via toString so a YAML/`--set` boolean false is honoured too.
            - name: OS_EMAIL_VERIFICATION
              value: {{ . | quote }}
            {{- end }}
            {{- $publicUrl := .Values.osUI.publicUrl | default (include "soa.consoleUrl" (dict "ctx" . "key" "osUI" "fallback" "")) }}
            {{- with $publicUrl }}
            # Absolute base for emailed verification links AND the remote MCP
            # endpoint URL (/api/mcp). Defaults to the os-ui ingress host; set
            # osUI.publicUrl to override.
            - name: OS_PUBLIC_URL
              value: {{ . | quote }}
            {{- end }}
            # In-cluster backend Service URLs (overridable per environment).
            - name: SAMPLE_AGENT_URL
              value: {{ $u.sampleAgentUrl | quote }}
            # Live agent-runtime backend (Agents tab) + the shared token the UI
            # uses to call it and to validate the runtime's governed-tool calls.
            - name: AGENT_RUNTIME_URL
              value: "http://agent-runtime:8000"
            - name: AGENT_RUNTIME_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-runtime-token
                  key: token
            - name: QUERY_TOOL_URL
              value: {{ $u.queryToolUrl | quote }}
            {{- if .Values.softwareRunner.enabled }}
            # ---- Software live-app runner (Software tab). The os-ui provisions a
            # real Deployment+Service+Ingress per built app into softwareRunner.namespace
            # (RBAC in templates/os-ui/apps-runner.yaml). Per-app host is
            # <slug>.<domain>.<appsDomain>; runnerImage is the teaching default when a
            # built app has no image of its own. ----
            - name: SOFTWARE_RUNNER_NAMESPACE
              value: {{ .Values.softwareRunner.namespace | quote }}
            - name: OS_APPS_DOMAIN
              value: {{ .Values.softwareRunner.appsDomain | quote }}
            - name: SOFTWARE_RUNNER_IMAGE
              value: {{ .Values.softwareRunner.runnerImage | quote }}
            - name: OS_APPS_INGRESS_CLASS
              value: {{ .Values.softwareRunner.ingressClass | default .Values.ingress.className | quote }}
            - name: OS_APPS_TLS_ISSUER
              value: {{ .Values.softwareRunner.tlsIssuer | default .Values.ingress.tlsIssuer | quote }}
            {{- end }}
            # ---- Data-tab ingest (T3). os-ui streams an uploaded file to MinIO
            # (uploads/<uid>/) with a SigV4 PUT, then calls the data-runner /ingest —
            # which writes the physical Iceberg Bronze table. Reuses the SAME
            # object-storage endpoint + `objectStorage.secretName` Secret the lakehouse
            # uses (no new broad creds), and the SAME warehouse bucket for uploads/. ----
            - name: DATA_RUNNER_URL
              value: {{ $u.dataRunnerUrl | default "http://data-runner:8000" | quote }}
            - name: S3_ENDPOINT
              value: {{ include "soa.s3Endpoint" . | quote }}
            - name: S3_REGION
              value: {{ .Values.objectStorage.region | default "us-east-1" | quote }}
            - name: S3_PATH_STYLE
              value: "true"
            - name: UPLOADS_BUCKET
              value: {{ $u.uploadsBucket | default "lakehouse" | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.objectStorage.secretName }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.objectStorage.secretName }}
                  key: AWS_SECRET_ACCESS_KEY
            - name: LANGFUSE_URL
              value: {{ $u.langfuseUrl | quote }}
            - name: OPENSEARCH_URL
              value: {{ $u.opensearchUrl | quote }}
            - name: KNOWLEDGE_INDEX
              value: {{ $u.knowledgeIndex | quote }}
            # Knowledge k-NN dimension — sourced from the SINGLE retrieval.knnDimension
            # (same source as FILES_EMBED_DIM) so real embed vectors aren't rejected and
            # silently downgraded to the offline hash when the dim changes (384↔4096).
            - name: KNOWLEDGE_EMBED_DIM
              value: {{ .Values.retrieval.knnDimension | quote }}
            # ---- Files tab (unstructured context products). The `files` hybrid
            # index + the SHARED embedding model. FILES_EMBED_DIM is sourced from
            # the SINGLE retrieval.knnDimension so the knn_vector mapping and the
            # query vectors always match — NEVER hardcoded here.
            - name: FILES_INDEX
              value: {{ $u.filesIndex | default "files" | quote }}
            - name: FILES_EMBED_MODEL
              value: {{ $u.filesEmbedModel | default .Values.sampleAgent.embedModel | quote }}
            - name: FILES_EMBED_DIM
              value: {{ .Values.retrieval.knnDimension | quote }}
            {{- with $u.doclingUrl }}
            - name: DOCLING_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with $u.transcribeUrl }}
            - name: TRANSCRIBE_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with $u.ocrUrl }}
            - name: OCR_URL
              value: {{ . | quote }}
            {{- end }}
            - name: FORGEJO_URL
              value: {{ $u.forgejoUrl | quote }}
            - name: FORGEJO_USER
              value: {{ $u.forgejoUser | quote }}
            - name: LITELLM_URL
              value: {{ $u.litellmUrl | quote }}
            - name: OPA_URL
              value: {{ $u.opaUrl | quote }}
            - name: DAGSTER_URL
              value: {{ $u.dagsterUrl | quote }}
            # Monitoring tab — READ-ONLY artifact/ML-health lens backends (lens 5).
            # The artifact-health adapter probes these server-side and degrades to
            # offline-mock when a service is absent (Science/KServe are opt-in), so
            # these defaults are safe; override per environment. Monitoring is the
            # observe plane — it never writes to any of these.
            - name: MLFLOW_URL
              value: {{ $u.mlflowUrl | default "http://mlflow:5000" | quote }}
            - name: KSERVE_URL
              # RawDeployment KServe creates a `<isvc-name>-predictor` Service —
              # there is NO `kserve` Service. Point at the predictor directly so
              # the Science-tab probe + `/v2/models/*/infer` calls resolve.
              value: {{ $u.kserveUrl | default (printf "http://%s-predictor:80" .Values.kserve.sampleModel.name) | quote }}
            - name: OPENMETADATA_API_URL
              value: {{ $u.openmetadataApiUrl | default "http://openmetadata:8585" | quote }}
            # The OpenMetadata SERVICE the Trino/Iceberg lakehouse is ingested under.
            # Used ONLY to build browser deep links from a governed mart to its OM
            # entity page (OM FQN = <service>.<catalog>.<schema>.<table>). Must match
            # the OM ingestion pipeline's service name; defaults to `trino`.
            - name: OPENMETADATA_SERVICE
              value: {{ $u.openmetadataService | default "trino" | quote }}
            # OpenMetadata bot JWT. OM is the CORE catalog backbone: the Catalog
            # shows it CONNECTED from a live (unauthenticated) health probe with or
            # without this token, and governed marts are deep-linked into OM either
            # way. The token ENRICHES the union by pulling OM's own table list — when
            # it is absent OM stays connected and simply isn't pulled. Sourced from
            # the os-ui-openmetadata Secret (optional — the pod starts fine without
            # it), which the operator fills out-of-band with a minted ingestion-bot
            # JWT (or via the gitignored osUI.openmetadataJwt value). Server-only.
            - name: OPENMETADATA_JWT
              valueFrom:
                secretKeyRef:
                  name: os-ui-openmetadata
                  key: OPENMETADATA_JWT
                  optional: true
            # Same-origin tool proxy (/tools/<key> → in-cluster Service, served by
            # the os-ui pod; see lib/tool-proxy.ts). These two upstreams have no
            # sibling env var elsewhere, so set them explicitly + overridable. The
            # rest (MLflow/Featureform/Cube/Forgejo/Dagster/OpenMetadata) reuse the
            # backend URLs already wired above. Server-only; never sent to browsers.
            - name: SUPERSET_INTERNAL_URL
              value: {{ $u.supersetInternalUrl | default "http://agentic-os-superset:8088" | quote }}
            # Trusted-header SSO service account for Superset writes (guest-token mint,
            # dashboard import/delete). Superset's _sso_login maps X-Forwarded-Roles → the
            # user's role, so the service user MUST be provisioned as Admin — only Admin has
            # can_grant_guest_token (a Gamma default 403s the mint). Admin-overridable.
            - name: SUPERSET_SERVICE_USER
              value: {{ $u.supersetServiceUser | default "admin" | quote }}
            - name: SUPERSET_SERVICE_ROLES
              value: {{ $u.supersetServiceRoles | default "Admin" | quote }}
            - name: OPENSEARCH_DASHBOARDS_INTERNAL_URL
              value: {{ $u.opensearchDashboardsInternalUrl | default "http://opensearch-dashboards:5601" | quote }}
            - name: CUBE_URL
              value: {{ $u.cubeUrl | default "http://cube:4000" | quote }}
            - name: FEATUREFORM_URL
              # Port 80 = Featureform's HTTP dashboard (what the tool-proxy iframes
              # and the Science-tab probe GETs). 7878 is gRPC-only — plain HTTP
              # against it resets, which made the tab report Featureform "absent".
              value: {{ $u.featureformUrl | default "http://featureform:80" | quote }}
            # External-warehouse connectors (Glue/Snowflake/BigQuery/Databricks/Fabric).
            # OFF by default — surfaces the warehouse create-flow + MCP tools only when the
            # operator opts in (lib/core/config.ts reads EXTERNAL_CONNECTORS_ENABLED).
            - name: EXTERNAL_CONNECTORS_ENABLED
              value: {{ $u.externalConnectorsEnabled | default false | quote }}
            {{- if .Values.ml.enabled }}
            # Layer 4 (Science). Gates the Science/ML surfaces in the UI
            # (lib/config.ts reads ML_ENABLED). On when the Science plane
            # (MLflow/KServe/Featureform/Trino/Cube) is deployed via ml.enabled.
            - name: ML_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.terminal.enabled }}
            # In-UI Terminal. The UI mints a short-lived token (signed with the
            # SAME secret the broker verifies) for authorised roles, then the
            # browser opens a WebSocket to the broker at TERMINAL_BROKER_WS.
            - name: TERMINAL_ENABLED
              value: "true"
            - name: TERMINAL_ALLOWED_ROLES
              value: {{ join "," .Values.terminal.allowedRoles | quote }}
            # Browser opens `new WebSocket(TERMINAL_BROKER_WS?t=<token>)`, so this
            # MUST be a ws/wss URL WITH the broker's WS path — soa.terminalWsUrl
            # yields wss://<terminal-host><wsPath> on a deploy (needs the
            # `terminal` ingress host + a DNS/cert + the terminal ingress route),
            # "" when ingress is on but no host is set (UI errors clearly instead
            # of dialing localhost), or the local port-forward fallback on kind.
            - name: TERMINAL_BROKER_WS
              value: {{ include "soa.terminalWsUrl" (dict "ctx" . "fallback" (.Values.terminal.brokerWsUrl | default "ws://localhost:8090/terminal")) | quote }}
            - name: TERMINAL_BROKER_SECRET
              valueFrom:
                secretKeyRef:
                  name: terminal-broker
                  key: secret
            {{- end }}
            {{- if .Values.workbench.enabled }}
            # Domain-Builder Workbench. The UI mints a short-lived single-use token
            # (signed with the SAME secret the workbench-broker verifies) for an
            # authorised builder scoped to ONE domain, then the browser opens their
            # persistent code-server via the broker at WORKBENCH_BROKER_URL.
            - name: WORKBENCH_ENABLED
              value: "true"
            - name: WORKBENCH_ALLOWED_ROLES
              value: {{ join "," .Values.workbench.allowedRoles | quote }}
            - name: WORKBENCH_BROKER_URL
              value: {{ include "soa.consoleUrl" (dict "ctx" . "key" "workbench" "fallback" (.Values.workbench.brokerUrl | default "http://localhost:8091")) | quote }}
            - name: WORKBENCH_BROKER_SECRET
              valueFrom:
                secretKeyRef:
                  name: workbench-broker
                  key: secret
            {{- end }}
            # Browser-reachable consoles (linked/opened from the browser). When
            # ingress is enabled these resolve to the PUBLIC ingress host
            # (https://<tool>.<domain>) via soa.consoleUrl — never localhost — so
            # deployed links work; tools with no public host (e.g. dagster) get an
            # empty value and the UI hides their "Open" link. Local-kind keeps the
            # port-forward defaults from values.yaml.
            - name: SUPERSET_URL
              value: {{ include "soa.consoleUrl" (dict "ctx" . "key" "superset" "fallback" $u.supersetUrl) | quote }}
            - name: LANGFUSE_CONSOLE_URL
              value: {{ include "soa.consoleUrl" (dict "ctx" . "key" "langfuse" "fallback" $u.langfuseConsoleUrl) | quote }}
            - name: FORGEJO_CONSOLE_URL
              value: {{ include "soa.consoleUrl" (dict "ctx" . "key" "forgejo" "fallback" $u.forgejoConsoleUrl) | quote }}
            - name: ARGOCD_URL
              value: {{ include "soa.consoleUrl" (dict "ctx" . "key" "argocd" "fallback" $u.argocdUrl) | quote }}
            - name: OPENMETADATA_URL
              value: {{ include "soa.consoleUrl" (dict "ctx" . "key" "openmetadata" "fallback" $u.openmetadataUrl) | quote }}
            - name: DAGSTER_CONSOLE_URL
              value: {{ include "soa.consoleUrl" (dict "ctx" . "key" "dagster" "fallback" $u.dagsterConsoleUrl) | quote }}
            {{- if .Values.ml.enabled }}
            # Layer-4 (Science) browser-reachable consoles. The Science-tab "Open"
            # buttons for JupyterHub + KServe are NATIVE links (not the same-origin
            # tool proxy: Jupyter needs WebSocket kernels and KServe has no human UI,
            # so both are rejected by the /tools proxy). Without these env vars they
            # fall back to the localhost defaults in lib/core/config.ts — a dead link
            # on a real deploy (the Jupyter 404 / KServe localhost bug). Resolve them
            # through soa.consoleUrl exactly like every other console: the PUBLIC
            # ingress host when `ingress.hosts.<key>` is set, else "" so the UI HIDES
            # the "Open" link instead of dialing localhost. MLflow/Featureform ALSO
            # get a console value here (they open via the proxy, but this keeps the
            # env explicit and consistent). Local-kind keeps the port-forward defaults.
            - name: JUPYTERHUB_CONSOLE_URL
              value: {{ include "soa.consoleUrl" (dict "ctx" . "key" "jupyterhub" "fallback" $u.jupyterhubConsoleUrl) | quote }}
            - name: MLFLOW_CONSOLE_URL
              value: {{ include "soa.consoleUrl" (dict "ctx" . "key" "mlflow" "fallback" $u.mlflowConsoleUrl) | quote }}
            - name: FEATUREFORM_CONSOLE_URL
              value: {{ include "soa.consoleUrl" (dict "ctx" . "key" "featureform" "fallback" $u.featureformConsoleUrl) | quote }}
            - name: KSERVE_CONSOLE_URL
              value: {{ include "soa.consoleUrl" (dict "ctx" . "key" "kserve" "fallback" $u.kserveConsoleUrl) | quote }}
            {{- end }}
            # Langfuse project keys — public key is non-secret; secret key via Secret.
            - name: LANGFUSE_PUBLIC_KEY
              value: {{ .Values.langfuseInit.publicKey | quote }}
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $u.langfuseSecret.name | quote }}
                  key: {{ $u.langfuseSecret.key | quote }}
            # Forgejo admin password + LiteLLM master key — from Secrets so they
            # never sit in plaintext. Override the names/keys per environment.
            - name: FORGEJO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $u.forgejoSecret.name | quote }}
                  key: {{ $u.forgejoSecret.key | quote }}
                  # Optional so os-ui boots when Forgejo is disabled (secret absent);
                  # the Software tab's git features degrade gracefully without it.
                  optional: true
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $u.litellmSecret.name | quote }}
                  key: {{ $u.litellmSecret.key | quote }}
          ports:
            - { name: http, containerPort: 3000 }
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml $u.resources | nindent 12 }}
          {{- if and .Values.mail.enabled .Values.mail.tls.osUITrust }}
          volumeMounts:
            - name: mail-ca
              mountPath: /etc/os-ui/mail-ca
              readOnly: true
          {{- end }}
      {{- if and .Values.mail.enabled .Values.mail.tls.osUITrust }}
      volumes:
        # The in-cluster maddy submission cert, trusted via NODE_EXTRA_CA_CERTS.
        - name: mail-ca
          secret:
            secretName: {{ .Values.mail.tls.secretName }}
            items:
              - { key: tls.crt, path: tls.crt }
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: os-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "os-ui") | nindent 4 }}
spec:
  selector:
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "os-ui") | nindent 4 }}
  ports:
    - { name: http, port: 3000, targetPort: http }
{{- end }}
