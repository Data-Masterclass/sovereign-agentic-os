{{- if .Values.sampleAgent.enabled }}
{{- /*
  Sample LangGraph agent (bespoke Deployment + Service + ConfigMap).
  retrieve (OpenSearch kNN) -> generate (LiteLLM) -> traced in Langfuse.
  LangGraph is the MIT library, not the Elastic-licensed Platform.
*/}}
{{- $a := .Values.sampleAgent }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-agent-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "sample-agent") | nindent 4 }}
data:
  # Seed knowledge ingested into OpenSearch on startup. Editable without a rebuild.
  knowledge.json: |
    {{- toJson $a.knowledge | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "sample-agent") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "soa.selectorLabels" (dict "ctx" . "component" "sample-agent") | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pod when the seed knowledge changes.
        checksum/knowledge: {{ toJson $a.knowledge | sha256sum }}
      labels:
        {{- include "soa.labels" . | nindent 8 }}
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "sample-agent") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
      containers:
        - name: agent
          image: "{{ $a.image.repository }}:{{ $a.image.tag }}"
          imagePullPolicy: IfNotPresent      # locally-built image, loaded into kind
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
            readOnlyRootFilesystem: true
          env:
            - name: PORT
              value: "8000"
            - name: LITELLM_BASE_URL
              value: "http://agentic-os-litellm:4000/v1"
            - name: LITELLM_API_KEY     # scoped virtual key (not the master key)
              valueFrom: { secretKeyRef: { name: agent-litellm-key, key: apiKey } }
            - name: CHAT_MODEL
              value: {{ $a.chatModel | quote }}
            - name: EMBED_MODEL
              value: {{ $a.embedModel | quote }}
            - name: OPENSEARCH_URL
              value: {{ include "soa.opensearchUrl" . | quote }}
            - name: INDEX_NAME
              value: {{ .Values.retrieval.indexName | quote }}
            - name: KNN_DIMENSION
              value: {{ .Values.retrieval.knnDimension | quote }}
            - name: KNOWLEDGE_FILE
              value: /etc/agent/knowledge.json
            # Langfuse tracing (public key + host are not secret; secret key via Secret).
            - name: LANGFUSE_HOST
              value: {{ .Values.langfuseInit.host | quote }}
            - name: LANGFUSE_PUBLIC_KEY
              value: {{ .Values.langfuseInit.publicKey | quote }}
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_PROJECT_SECRET_KEY }
          ports:
            - { name: http, containerPort: 8000 }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30          # waits for deps + initial ingest
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml $a.resources | nindent 12 }}
          volumeMounts:
            - { name: config, mountPath: /etc/agent, readOnly: true }
      volumes:
        - name: config
          configMap:
            name: sample-agent-config
---
apiVersion: v1
kind: Service
metadata:
  name: sample-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "sample-agent") | nindent 4 }}
spec:
  selector:
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "sample-agent") | nindent 4 }}
  ports:
    - { name: http, port: 8000, targetPort: http }
{{- end }}
