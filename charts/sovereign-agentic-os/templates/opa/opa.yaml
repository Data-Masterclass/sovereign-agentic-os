{{- if .Values.opa.enabled }}
{{- /*
  OPA — policy-as-code at the MCP/tool boundary (Layer 2 / security.md).
  Default-deny tool authorization: a principal (a LiteLLM key / agent identity)
  may invoke a tool only if it's granted. Internet tools (web_fetch) are not in
  the default grants, so they're denied unless explicitly granted — exactly the
  "deny internet tools unless granted" baseline. The governed web_fetch tool and
  its wiring arrive with the egress baseline step.
*/}}
{{- $opa := .Values.opa }}
{{- /*
  epic #146 Phase 4 — dagster-analytics warehouse principal. Default OFF, so `$gov`
  is byte-identical to `$opa.governance` unless the operator flips the toggle. When
  enabled, we deep-copy the governance object and add ONE principal (Trino has no
  user store — declaring it here IS defining it; the trino.rego write-target floor +
  row-filter do the rest). deepCopy avoids mutating the shared .Values map.
*/}}
{{- $wp := (.Values.dagsterAnalytics | default dict).warehousePrincipal | default dict }}
{{- $gov := ($opa.governance | default dict) }}
{{- if $wp.enabled }}
{{-   $gov = deepCopy $gov }}
{{-   $princ := (dig "principals" dict $gov) }}
{{-   $princ = merge (dict) $princ (dict $wp.name (dict "domains" ($wp.domains | default (list "sales")) "clearances" ($wp.clearances | default list))) }}
{{-   $_ := set $gov "principals" $princ }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "opa") | nindent 4 }}
data:
  authz.rego: |
    package agentic.authz

    import rego.v1

    # Default-deny at the tool boundary (least privilege).
    default allow := false

    # A principal may use a tool only if it has been granted that tool.
    # Internet tools (e.g. web_fetch) are absent from grants -> denied.
    #
    # Grants live in TWO documents that must both authorize, deterministically:
    #  - data.seed_grants — the chart-baked defaults (data.json), keyed BARE
    #    (e.g. "agentic-leader-q3-2026"). OWNED by the chart; os-ui never PUTs it,
    #    so an OPA (re)start / file re-read always restores it (no flip-flop).
    #  - data.grants — the runtime document Platform Admin's policy compiler
    #    replaces wholesale via `PUT /v1/data/grants`, keyed PREFIXED
    #    ("domain:<id>" / "user:<id>"). A full PUT here can never clobber the
    #    seed, because the seed lives at a DISTINCT path.
    # os-ui authorizes with a BARE principal on some paths (domain query/retrieve)
    # and a PREFIXED one on others (user:<id> admin), and either document may hold
    # either key form — so we resolve the principal under ALL forms in BOTH docs
    # and allow if ANY of them grants the tool. Union of grants; still default-deny
    # for a principal absent from every form in both docs.
    granted_tools contains tool if some tool in data.grants[input.principal]
    granted_tools contains tool if some tool in data.grants[sprintf("domain:%s", [input.principal])]
    granted_tools contains tool if some tool in data.grants[sprintf("user:%s", [input.principal])]
    granted_tools contains tool if some tool in data.seed_grants[input.principal]
    granted_tools contains tool if some tool in data.seed_grants[sprintf("domain:%s", [input.principal])]
    granted_tools contains tool if some tool in data.seed_grants[sprintf("user:%s", [input.principal])]

    allow if {
        some tool in granted_tools
        tool == input.tool
    }

    # High-stakes tools (external connection writes, certify/publish) are paused
    # for human approval even when granted (Agent golden path §7). The list lives
    # in data.requires_approval (set by opa.requiresApproval in values).
    needs_approval if {
        some tool in data.requires_approval
        tool == input.tool
    }

    # Rich effect: deny (not granted) / requires_approval (granted + high-stakes)
    # / allow (granted + low-stakes). The legacy boolean `allow` above is kept so
    # the Governance grants matrix keeps working unchanged.
    effect := "deny" if not allow
    effect := "requires_approval" if {
        allow
        needs_approval
    }
    effect := "allow" if {
        allow
        not needs_approval
    }

    reason := "not granted" if not allow
    reason := "high-stakes — human approval required" if {
        allow
        needs_approval
    }
    reason := "granted" if {
        allow
        not needs_approval
    }

    decision := {
        "allow": allow,
        "effect": effect,
        "reason": reason,
        "principal": input.principal,
        "tool": input.tool,
    }
  # Chart-baked defaults. The grants seed is written under `seed_grants` — a path
  # DISTINCT from the runtime `data.grants` that os-ui's policy compiler replaces
  # wholesale (`PUT /v1/data/grants`). This makes authorization deterministic: the
  # seed is never clobbered by a runtime PUT, and an OPA restart / file re-read
  # always restores it (killing the query_data/retrieve deny flip-flop). authz.rego
  # reads BOTH `data.grants` and `data.seed_grants` (bare + domain:/user: forms).
  data.json: |
    {{ dict "seed_grants" $opa.grants "requires_approval" ($opa.requiresApproval | default list) | toJson }}
  # SECOND policy doc — Trino data governance (row filter by domain + column mask
  # by sensitivity). Same OPA, different package (`trino`); agentic.authz untouched.
  trino.rego: |
{{ .Files.Get "policies/trino.rego" | indent 4 }}
  # Governance data the Trino policy reads (data.governance). In production this is
  # populated from the artifact-registry / OpenMetadata visibility model; locally
  # we seed the Sales worked example so the governance proof runs on kind.
  governance.json: |
    {{ dict "governance" $gov | toJson }}
  # FOURTH policy doc — internal cross-domain Marketplace import authorization
  # (package `marketplace`). The default-deny gate for "import = a governed grant":
  # open products auto-grant, approval-required imports are held for Governance.
  marketplace.rego: |
{{ .Files.Get "policies/marketplace.rego" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- include "soa.syncWaveAnno" (dict "ctx" . "tier" "apps") | nindent 4 }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "opa") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "soa.selectorLabels" (dict "ctx" . "component" "opa") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/policy: {{ printf "%s-%s-%s-%s-%s" ($opa.grants | toJson) (($opa.requiresApproval | default list) | toJson) ($gov | toJson) (.Files.Get "policies/trino.rego") (.Files.Get "policies/marketplace.rego") | sha256sum }}
      labels:
        {{- include "soa.labels" . | nindent 8 }}
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "opa") | nindent 8 }}
    spec:
      {{- include "soa.priorityClassName" (dict "ctx" . "tier" "app") | nindent 6 }}
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
      containers:
        - name: opa
          image: "{{ $opa.image.repository }}:{{ $opa.image.tag }}@{{ $opa.image.digest }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
            readOnlyRootFilesystem: true
          args:
            - "run"
            - "--server"
            - "--addr=0.0.0.0:8181"
            - "--log-level=info"
            - "--watch"
            # Explicit files, not the dir: ConfigMap volumes add ..data symlinks
            # that make a recursive dir load see each file multiple times.
            - "/policies/authz.rego"
            - "/policies/data.json"
            - "/policies/trino.rego"
            - "/policies/governance.json"
            - "/policies/marketplace.rego"
          ports:
            - { name: http, containerPort: 8181 }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml $opa.resources | nindent 12 }}
          volumeMounts:
            - { name: policy, mountPath: /policies, readOnly: true }
      volumes:
        - name: policy
          configMap:
            name: opa-policy
---
apiVersion: v1
kind: Service
metadata:
  name: opa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "opa") | nindent 4 }}
spec:
  selector:
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "opa") | nindent 4 }}
  ports:
    - { name: http, port: 8181, targetPort: http }
{{- end }}
