{{- if .Values.modelServer.enabled }}
{{- /*
  Self-hosted, OpenAI-compatible LLM server — the DEFAULT inference backend of
  the Sovereign Agentic OS (replaces the offline mock LLM for chat). A CPU
  llama.cpp/Ollama runtime that serves a small, permissively-licensed model
  (default: Ministral 3 3B, Q4, Apache-2.0) fully offline — no provider key, nothing leaves the
  sovereign boundary. LiteLLM routes `sovereign-default` (and the back-compat
  `sovereign-mock` alias) here and load-balances across the `replicas` pods (the
  ClusterIP Service round-robins; size for ~3-4 GB RAM each — see
  docs/components/model-server.md for the ~30-user -> 3-5 replica guidance).

  On first start each pod pulls the model into its model volume (one-time, needs
  egress to the model registry once; air-gap by baking weights into an image —
  see the component doc). Steady state is fully offline.
*/}}
{{- $m := .Values.modelServer }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-server
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- include "soa.syncWaveAnno" (dict "ctx" . "tier" "middleware") | nindent 4 }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "model-server") | nindent 4 }}
spec:
  # N replicas behind LiteLLM load-balancing. The Service in front round-robins
  # requests across them; scale via modelServer.replicas (chart value).
  replicas: {{ $m.replicas }}
  selector:
    matchLabels:
      {{- include "soa.selectorLabels" (dict "ctx" . "component" "model-server") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "soa.labels" . | nindent 8 }}
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "model-server") | nindent 8 }}
    spec:
      {{- include "soa.priorityClassName" (dict "ctx" . "tier" "app") | nindent 6 }}
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000                       # make the model volume writable for the pull
      containers:
        - name: model-server
          image: "{{ $m.image.repository }}:{{ $m.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
            # NOT read-only: the runtime writes pulled weights to the model dir.
            readOnlyRootFilesystem: false
          env:
            - name: HOME
              value: /models
            - name: OLLAMA_MODELS
              value: /models
            - name: OLLAMA_HOST
              value: "0.0.0.0:{{ $m.port }}"
            # Keep models resident so the first request isn't a cold load.
            - name: OLLAMA_KEEP_ALIVE
              value: "-1"
            - name: OLLAMA_MODEL
              value: {{ $m.model | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              # Start the server, wait for it, pull the default model once, then
              # hand the process group to the server (so the pod stays the server).
              ollama serve &
              SRV=$!
              echo "waiting for model runtime..."
              until ollama ls >/dev/null 2>&1; do sleep 1; done
              if ! ollama ls | grep -q "$OLLAMA_MODEL"; then
                echo "pulling $OLLAMA_MODEL (one-time)..."
                ollama pull "$OLLAMA_MODEL"
              fi
              echo "model ready: $OLLAMA_MODEL"
              wait $SRV
          ports:
            - { name: http, containerPort: {{ $m.port }} }
          readinessProbe:
            # NOT just /v1/models (200 the instant `serve` starts, BEFORE the pull):
            # gate Ready on the model actually being present, so LiteLLM never
            # load-balances a chat onto a pod still pulling/loading the weights.
            exec:
              command: ["/bin/sh", "-c", "ollama ls | grep -q \"$OLLAMA_MODEL\""]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60            # allow time for the one-time model pull
          livenessProbe:
            # Liveness only checks the process is serving (don't restart mid-pull).
            httpGet: { path: /v1/models, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml $m.resources | nindent 12 }}
          volumeMounts:
            - { name: models, mountPath: /models }
      volumes:
        - name: models
          {{- if $m.persistence.enabled }}
          persistentVolumeClaim:
            claimName: model-server-models
          {{- else }}
          emptyDir:
            sizeLimit: {{ $m.persistence.size | default "10Gi" }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: model-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "model-server") | nindent 4 }}
spec:
  selector:
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "model-server") | nindent 4 }}
  ports:
    - { name: http, port: {{ $m.port }}, targetPort: http }
{{- if $m.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-server-models
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "model-server") | nindent 4 }}
spec:
  accessModes: [ {{ $m.persistence.accessMode | default "ReadWriteOnce" | quote }} ]
  {{- if $m.persistence.storageClass }}
  storageClassName: {{ $m.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ $m.persistence.size | default "10Gi" }}
{{- end }}
{{- end }}
{{- /*
  Optional bigger self-hosted model (toggle, OFF by default) — a GPU vLLM serving
  a larger Apache-2.0 model (e.g. Qwen 3.6 / Mistral) for harder escalations,
  BELOW the STACKIT last-resort in the fallback chain. LiteLLM registers it as
  `sovereign-big`; enable modelServer.big.enabled + add `sovereign-big` to the
  fallback chain (see values.yaml / values.private.example.yaml). Needs a GPU
  node pool — not for a CPU-only kind box.
*/}}
{{- if .Values.modelServer.big.enabled }}
{{- $b := .Values.modelServer.big }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-server-big
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- include "soa.syncWaveAnno" (dict "ctx" . "tier" "middleware") | nindent 4 }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "model-server-big") | nindent 4 }}
spec:
  replicas: {{ $b.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "soa.selectorLabels" (dict "ctx" . "component" "model-server-big") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "soa.labels" . | nindent 8 }}
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "model-server-big") | nindent 8 }}
    spec:
      {{- include "soa.priorityClassName" (dict "ctx" . "tier" "app") | nindent 6 }}
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
      containers:
        - name: model-server-big
          image: "{{ $b.image.repository }}:{{ $b.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
            readOnlyRootFilesystem: false
          args: {{ $b.args | toJson }}
          ports:
            - { name: http, containerPort: {{ $b.port }} }
          readinessProbe:
            httpGet: { path: /v1/models, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 40
          resources:
            {{- toYaml $b.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: model-server-big
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "model-server-big") | nindent 4 }}
spec:
  selector:
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "model-server-big") | nindent 4 }}
  ports:
    - { name: http, port: {{ $b.port }}, targetPort: http }
{{- end }}
