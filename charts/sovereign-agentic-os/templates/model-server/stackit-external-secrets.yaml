{{- if and .Values.stackitPremium.enabled .Values.stackitPremium.externalSecrets.enabled }}
{{- /*
  STACKIT AI Model Serving key — premium, LAST-RESORT + vision route only.
  THE ONE RULE (security.md): the key never touches git. It lives in STACKIT
  Secrets Manager; the External Secrets Operator syncs it into the K8s Secret
  `stackit-ai-model-serving-key`, which LiteLLM reads as STACKIT_API_KEY. The
  managed Qwen3-VL endpoint is pay-per-token, so the spend cap is enforced on the
  LiteLLM virtual key (litellmAgentKey.modelMaxBudget) — see agent-key.yaml.

  Rendered ONLY when stackitPremium.externalSecrets.enabled (default OFF): the ESO
  CRDs are not installed on a fresh kind cluster, so `helm template`/`helm lint`
  stay valid out of the box. The PUBLIC default is fully self-hosted/offline — no
  STACKIT account or key required. Turn this on once ESO + a STACKIT Secrets
  Manager SecretStore exist (Mode B / values.stackit-managed.yaml).
*/}}
{{- $es := .Values.stackitPremium.externalSecrets }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.stackitPremium.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "litellm") | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ $es.secretStoreRef.name }}
    kind: {{ $es.secretStoreRef.kind }}
  target:
    name: {{ .Values.stackitPremium.secretName }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # LiteLLM reads this env for the STACKIT-routed model entries.
        STACKIT_API_KEY: "{{ `{{ .apiKey }}` }}"
  data:
    - secretKey: apiKey
      remoteRef:
        key: {{ $es.remoteKey }}
        property: {{ $es.property }}
{{- end }}
