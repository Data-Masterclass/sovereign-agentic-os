{{- if .Values.poetAgent.enabled }}
{{- /*
  Poet agent (bespoke Deployment + Service + PVC). A second LangGraph agent
  (compose -> save): asks the model via LiteLLM for a short poem and writes it
  to a file on a persistent volume — one file per run. Traced in Langfuse.
  Pull the poems to your machine with scripts/get-poems.sh.
*/}}
{{- $p := .Values.poetAgent }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: poet-poems
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "poet-agent") | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ $p.storageSize | quote }}
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass | quote }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: poet-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "poet-agent") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate           # single RWO volume
  selector:
    matchLabels:
      {{- include "soa.selectorLabels" (dict "ctx" . "component" "poet-agent") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "soa.labels" . | nindent 8 }}
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "poet-agent") | nindent 8 }}
    spec:
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
        fsGroup: 1000          # so the non-root agent can write the PVC
      containers:
        - name: poet
          image: "{{ $p.image.repository }}:{{ $p.image.tag }}"
          imagePullPolicy: IfNotPresent     # locally-built image, loaded into kind
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
            readOnlyRootFilesystem: true
          env:
            - name: PORT
              value: "8000"
            - name: HOME
              value: /tmp
            - name: LITELLM_BASE_URL
              value: "http://agentic-os-litellm:4000/v1"
            - name: LITELLM_API_KEY     # scoped virtual key (not the master key)
              valueFrom: { secretKeyRef: { name: agent-litellm-key, key: apiKey } }
            - name: CHAT_MODEL
              value: {{ $p.chatModel | quote }}
            - name: DEFAULT_TOPIC
              value: {{ $p.defaultTopic | quote }}
            - name: POEMS_DIR
              value: /data/poems
            - name: LANGFUSE_HOST
              value: {{ .Values.langfuseInit.host | quote }}
            - name: LANGFUSE_PUBLIC_KEY
              value: {{ .Values.langfuseInit.publicKey | quote }}
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_PROJECT_SECRET_KEY }
          ports:
            - { name: http, containerPort: 8000 }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml $p.resources | nindent 12 }}
          volumeMounts:
            - { name: poems, mountPath: /data/poems }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: poems
          persistentVolumeClaim:
            claimName: poet-poems
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: poet-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "poet-agent") | nindent 4 }}
spec:
  selector:
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "poet-agent") | nindent 4 }}
  ports:
    - { name: http, port: 8000, targetPort: http }
{{- end }}
