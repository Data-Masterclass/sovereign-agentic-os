{{- if .Values.cube.enabled }}
{{- /*
  Cube (Apache 2.0) — semantic/metrics layer reading the marts THROUGH central
  Trino (CUBEJS_DB_TYPE=trino). Defines metrics on analytics.daily_revenue
  (Iceberg), served via REST / GraphQL / SQL. Dev mode enables the Cube Playground
  UI. Runs non-root with a
  writable emptyDir at /cube/conf (the image expects to write there) and the
  model ConfigMap mounted inside it.
*/}}
{{- $c := .Values.cube }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: cube-model
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "cube") | nindent 4 }}
data:
  # The Northpeak metrics cube — the Metrics tab resolves members
  # `northpeakcommerce.<measure>` here (os-ui lib/metrics/model.ts `measureMember`:
  # dataset "northpeak-commerce" → Cube view "northpeakcommerce"). Binds to the
  # physical gold mart the northpeak-marts-init Job materializes at
  # iceberg.sales.gold_northpeak_commerce (sql_table = <schema>.<table>, catalog
  # from CUBEJS_DB_PRESTO_CATALOG=iceberg). Measure/dimension names match exactly
  # what os-ui requests: revenue/aov/conversion/churnrate + region/product/order_date.
  northpeakcommerce.yml: |
    cubes:
      - name: northpeakcommerce
        sql_table: sales.gold_northpeak_commerce
        measures:
          - name: revenue
            title: Revenue
            type: sum
            sql: net_amount
          - name: conversion
            title: Conversion
            type: avg
            sql: converted
          # Helper base measures (hidden) so AOV + churn rate are exact ratios.
          - name: orders
            type: sum
            sql: converted
            public: false
          - name: gross
            type: sum
            sql: order_total
            public: false
          - name: customers
            type: count_distinct
            sql: customer_id
            public: false
          - name: churned_customers
            type: count_distinct
            sql: "CASE WHEN {CUBE}.is_churned = 1 THEN {CUBE}.customer_id END"
            public: false
          - name: aov
            title: AOV
            type: number
            sql: "{gross} / NULLIF({orders}, 0)"
          - name: churnrate
            title: Churn Rate
            type: number
            sql: "{churned_customers} * 1.0 / NULLIF({customers}, 0)"
        dimensions:
          - name: order_id
            sql: order_id
            type: string
            primary_key: true
          - name: region
            sql: region
            type: string
          - name: product
            sql: product
            type: string
          - name: order_date
            sql: order_date
            type: time
  # Demo cubes REPOINTED at the real Northpeak gold mart (were analytics.* which
  # never existed → 0 rows). Names/measures kept so the Live Cube preview
  # (daily_revenue.*) and the Data-tab parity/sales-agent demos (mart_sales.*) resolve.
  daily_revenue.yml: |
    cubes:
      - name: daily_revenue
        sql_table: sales.gold_northpeak_commerce
        measures:
          - name: total_revenue
            type: sum
            sql: net_amount
          - name: total_orders
            type: sum
            sql: converted
          - name: count
            type: count
        dimensions:
          - name: order_date
            type: time
            sql: order_date
  mart_sales.yml: |
    cubes:
      - name: mart_sales
        sql_table: sales.gold_northpeak_commerce
        measures:
          - name: revenue
            title: Revenue
            type: sum
            sql: net_amount
          - name: orders
            type: count
        dimensions:
          - name: order_date
            type: time
            sql: order_date
          - name: region
            type: string
            sql: region
          - name: product
            type: string
            sql: product
{{- if $c.modelSync.enabled }}
---
{{- /*
  Cube model-sync sidecar script (data-tab T7). A tiny, dependency-free node
  poller (built-in `http`, no new image — runs on the Cube image's node runtime).
  It GETs the cluster-internal os-ui endpoint `/api/cube/models`, which returns the
  cube_dbt model YAML + compiled access policy for every GOVERNED dataset (never a
  private one), and writes each changed model into the SHARED /cube/conf/model dir.
  Cube dev-mode schema-watch then hot-reloads. The static demo seed models
  (northpeakcommerce/daily_revenue/mart_sales .yml) are left untouched — delivered
  files use a distinct `<slug>.cube.yml` suffix, so they never collide.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: cube-model-sync
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "cube") | nindent 4 }}
data:
  sync.js: |
    'use strict';
    var http = require('http');
    var fs = require('fs');
    var path = require('path');

    var URL_STR = process.env.OSUI_MODELS_URL || 'http://os-ui:3000/api/cube/models';
    var MODEL_DIR = process.env.MODEL_DIR || '/cube/conf/model';
    var POLL_MS = (parseInt(process.env.POLL_SECONDS || '30', 10) || 30) * 1000;
    var written = new Map();

    function log(msg) { process.stdout.write('[cube-model-sync] ' + msg + '\n'); }

    function fetchJson(u) {
      return new Promise(function (resolve, reject) {
        var req = http.get(u, { timeout: 8000 }, function (res) {
          if (res.statusCode !== 200) { res.resume(); reject(new Error('HTTP ' + res.statusCode)); return; }
          var body = '';
          res.setEncoding('utf8');
          res.on('data', function (c) { body += c; });
          res.on('end', function () { try { resolve(JSON.parse(body)); } catch (e) { reject(e); } });
        });
        req.on('timeout', function () { req.destroy(new Error('timeout')); });
        req.on('error', reject);
      });
    }

    // Only accept a simple `<slug>.cube.yml` (or metrics/<slug>.cube.yml) file name,
    // written flat into the model dir — never a traversal path.
    function safeName(file) {
      var b = path.basename(String(file || ''));
      return /^[a-z0-9_]+\.cube\.yml$/.test(b) ? b : null;
    }

    function syncOnce() {
      return fetchJson(URL_STR).then(function (payload) {
        var models = (payload && Array.isArray(payload.models)) ? payload.models : [];
        var changed = 0;
        for (var i = 0; i < models.length; i++) {
          var m = models[i];
          var name = safeName(m && m.file);
          if (!name || typeof m.model !== 'string') continue;
          if (written.get(name) === m.model) continue;
          var dest = path.join(MODEL_DIR, name);
          var tmp = dest + '.tmp';
          fs.writeFileSync(tmp, m.model);
          fs.renameSync(tmp, dest);
          written.set(name, m.model);
          changed++;
        }
        if (changed) log('wrote ' + changed + ' model(s) to ' + MODEL_DIR);
      });
    }

    function loop() {
      syncOnce().catch(function (e) { log('sync error: ' + (e && e.message)); }).then(function () {
        setTimeout(loop, POLL_MS);
      });
    }

    try { fs.mkdirSync(MODEL_DIR, { recursive: true }); } catch (e) { /* seeded by init */ }
    log('polling ' + URL_STR + ' every ' + (POLL_MS / 1000) + 's -> ' + MODEL_DIR);
    loop();
{{- end }}
---
{{- if eq .Values.global.profile "local" }}
apiVersion: v1
kind: Secret
metadata:
  name: cube-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "cube") | nindent 4 }}
type: Opaque
stringData:
  CUBEJS_API_SECRET: {{ $c.local.apiSecret | quote }}
---
{{- end }}
{{- if $c.sqlApi.enabled }}
{{- /*
  Cube SQL API credential (Postgres-wire). Power BI authenticates as a per-DOMAIN
  principal `bi_<domain>` with THIS shared password; Cube's checkSqlAuth (cube-config.js)
  resolves the username to that domain's securityContext. Resolution order (no secret in
  git): explicit `sqlApi.password` → the value already in this Secret (preserved across
  `helm upgrade` via lookup) → a fresh 32-char random on first install. GITOPS CAVEAT:
  Argo/Flux/`helm template` return an empty lookup, so set `sqlApi.password` explicitly
  (ExternalSecret ideal) there or every sync mints a NEW password and breaks Power BI.
*/}}
{{- $sqlName := "cube-sql-secrets" }}
{{- $sqlExisting := (lookup "v1" "Secret" .Release.Namespace $sqlName) }}
{{- $sqlCurrent := "" }}
{{- if $sqlExisting }}{{ $sqlCurrent = (index $sqlExisting.data "CUBEJS_SQL_PASSWORD" | b64dec) }}{{- end }}
{{- $sqlPass := $c.sqlApi.password | default $sqlCurrent | default (randAlphaNum 32) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $sqlName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "cube") | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  CUBEJS_SQL_USER: {{ $c.sqlApi.user | quote }}
  CUBEJS_SQL_PASSWORD: {{ $sqlPass | quote }}
---
{{- /*
  Cube config file (cube.js) — Cube auto-loads /cube/conf/cube.js. It implements
  checkSqlAuth: on a Postgres-wire login it verifies the shared CUBEJS_SQL_PASSWORD and
  maps the SQL USERNAME `bi_<domain>` to that domain's securityContext
  { sub, domains, role:'creator', scope:'bi-readonly' } — the SAME structural keys the
  governed HTTP path uses (os-ui lib/infra/governed.ts RLS_STRUCTURAL_KEYS). queryRewrite
  is the safety net that REJECTS any SQL-API query whose connection lacks a domain scope,
  so a raw/unscoped SQL login can never read ungoverned rows. The admin `user` login gets
  no domain (empty scope) → it can introspect meta but sees no domain rows.
  Mirrors os-ui lib/powerbi/principal.ts — keep the two in sync.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: cube-sql-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "cube") | nindent 4 }}
data:
  cube.js: |
    // SPDX-License-Identifier: Apache-2.0
    const BI_PREFIX = 'bi_';
    function normDomain(s) {
      return String(s || '').trim().toLowerCase().replace(/[^a-z0-9_]+/g, '_').replace(/^_+|_+$/g, '');
    }
    function domainFromBiUser(user) {
      const u = String(user || '').trim().toLowerCase();
      if (!u.startsWith(BI_PREFIX)) return null;
      const d = normDomain(u.slice(BI_PREFIX.length));
      return d || null;
    }
    module.exports = {
      // Verify the shared SQL password, then map the SQL username -> domain securityContext.
      checkSqlAuth: (query, user, password) => {
        const expected = process.env.CUBEJS_SQL_PASSWORD;
        if (expected && password !== expected) {
          throw new Error('Invalid Cube SQL API credentials');
        }
        const domain = domainFromBiUser(user);
        if (domain) {
          return {
            password: expected,
            securityContext: { sub: 'bi:' + domain, domains: [domain], role: 'creator', scope: 'bi-readonly' },
          };
        }
        // The admin `user` login: authenticated but NO domain scope (introspection only).
        return { password: expected, securityContext: { sub: user, domains: [], role: 'creator', scope: 'bi-readonly' } };
      },
      // Safety net: a connection with no domain in scope may not read domain rows.
      queryRewrite: (query, { securityContext }) => {
        const domains = (securityContext && securityContext.domains) || [];
        if (securityContext && securityContext.scope === 'bi-readonly' && domains.length === 0) {
          throw new Error('Cube SQL API: no domain scope on this principal');
        }
        return query;
      },
    };
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cube
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- include "soa.syncWaveAnno" (dict "ctx" . "tier" "apps") | nindent 4 }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "cube") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "soa.selectorLabels" (dict "ctx" . "component" "cube") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/model: {{ .Files.Get "templates/cube/cube.yaml" | default "" | sha256sum }}
        {{- if $c.modelSync.enabled }}
        # Roll the pod when the sync template (script/config) changes.
        checksum/model-sync: {{ printf "%s|%s|%v" $c.modelSync.osUiUrl (toString $c.modelSync.pollSeconds) $c.modelSync.enabled | sha256sum }}
        {{- end }}
      labels:
        {{- include "soa.labels" . | nindent 8 }}
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "cube") | nindent 8 }}
    spec:
      {{- include "soa.priorityClassName" (dict "ctx" . "tier" "app") | nindent 6 }}
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        # Seed the writable conf dir with the model (configmap is read-only).
        - name: model-init
          image: "{{ $c.image.repository }}@{{ $c.image.digest }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- if $c.sqlApi.enabled }}
          # Also seed the SQL-API cube.js config into the writable conf dir (Cube auto-loads
          # /cube/conf/cube.js) — checkSqlAuth maps the domain BI login to its securityContext.
          command: ["/bin/sh", "-c", "mkdir -p /conf/model && cp /model/*.yml /conf/model/ && cp /sql-config/cube.js /conf/cube.js"]
          {{- else }}
          command: ["/bin/sh", "-c", "mkdir -p /conf/model && cp /model/*.yml /conf/model/"]
          {{- end }}
          volumeMounts:
            - { name: conf, mountPath: /conf }
            - { name: model, mountPath: /model, readOnly: true }
            {{- if $c.sqlApi.enabled }}
            - { name: sql-config, mountPath: /sql-config, readOnly: true }
            {{- end }}
      containers:
        - name: cube
          image: "{{ $c.image.repository }}@{{ $c.image.digest }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
          env:
            - name: HOME
              value: /tmp
            - name: CUBEJS_DEV_MODE
              value: "true"
            # Read the marts THROUGH central Trino (governed engine), not Postgres.
            - name: CUBEJS_DB_TYPE
              value: trino
            - name: CUBEJS_DB_HOST
              value: {{ $c.trino.host | quote }}
            - name: CUBEJS_DB_PORT
              value: {{ $c.trino.port | quote }}
            - name: CUBEJS_DB_USER
              value: {{ $c.trino.user | quote }}
            # Iceberg catalog (Trino/Presto driver). sql_table stays <schema>.<table>.
            - name: CUBEJS_DB_PRESTO_CATALOG
              value: {{ $c.trino.catalog | quote }}
            - name: CUBEJS_API_SECRET
              valueFrom: { secretKeyRef: { name: cube-secrets, key: CUBEJS_API_SECRET } }
            {{- if $c.sqlApi.enabled }}
            # Postgres-wire SQL API for Power BI. Cube opens a second listener on this port;
            # CUBEJS_SQL_USER/PASSWORD are the shared credential checkSqlAuth verifies before
            # mapping the `bi_<domain>` username to that domain's securityContext.
            - name: CUBEJS_PG_SQL_PORT
              value: {{ $c.sqlApi.port | quote }}
            - name: CUBEJS_SQL_USER
              valueFrom: { secretKeyRef: { name: cube-sql-secrets, key: CUBEJS_SQL_USER } }
            - name: CUBEJS_SQL_PASSWORD
              valueFrom: { secretKeyRef: { name: cube-sql-secrets, key: CUBEJS_SQL_PASSWORD } }
            {{- end }}
          ports:
            - { name: http, containerPort: 4000 }
            {{- if $c.sqlApi.enabled }}
            - { name: pgsql, containerPort: {{ $c.sqlApi.port }} }
            {{- end }}
          startupProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /livez, port: http }
            periodSeconds: 20
          resources:
            {{- toYaml $c.resources | nindent 12 }}
          volumeMounts:
            - { name: conf, mountPath: /cube/conf }
            - { name: tmp, mountPath: /tmp }
        {{- if $c.modelSync.enabled }}
        # Model-sync sidecar: same Cube image (node runtime, NO new image), sharing the
        # `conf` emptyDir so files it writes to /cube/conf/model are seen by Cube's
        # schema-watch. Polls the cluster-internal os-ui models endpoint.
        - name: model-sync
          image: "{{ $c.image.repository }}@{{ $c.image.digest }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
          command: ["node", "/scripts/sync.js"]
          env:
            - name: HOME
              value: /tmp
            - name: OSUI_MODELS_URL
              value: "{{ $c.modelSync.osUiUrl }}/api/cube/models"
            - name: MODEL_DIR
              value: /cube/conf/model
            - name: POLL_SECONDS
              value: {{ $c.modelSync.pollSeconds | quote }}
          resources:
            {{- toYaml $c.modelSync.resources | nindent 12 }}
          volumeMounts:
            - { name: conf, mountPath: /cube/conf }
            - { name: model-sync, mountPath: /scripts, readOnly: true }
            - { name: tmp, mountPath: /tmp }
        {{- end }}
      volumes:
        - name: model
          configMap:
            name: cube-model
        {{- if $c.sqlApi.enabled }}
        - name: sql-config
          configMap:
            name: cube-sql-config
        {{- end }}
        {{- if $c.modelSync.enabled }}
        - name: model-sync
          configMap:
            name: cube-model-sync
        {{- end }}
        - name: conf
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cube
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "cube") | nindent 4 }}
spec:
  selector:
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "cube") | nindent 4 }}
  ports:
    - { name: http, port: 4000, targetPort: http }
    {{- if $c.sqlApi.enabled }}
    - { name: pgsql, port: {{ $c.sqlApi.port }}, targetPort: pgsql }
    {{- end }}
{{- if $c.sqlApi.enabled }}
---
{{- /*
  Dedicated `cube-sql` Service for the Postgres-wire SQL API. Same selector, only the
  pgsql port — this is the stable in-cluster name (`cube-sql:<port>`) the
  /api/powerbi/connection-info route advertises, and the Service an operator publishes
  behind a TCP ingress / LoadBalancer to reach Power BI Desktop / an on-prem gateway.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: cube-sql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "cube") | nindent 4 }}
spec:
  selector:
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "cube") | nindent 4 }}
  ports:
    - { name: pgsql, port: {{ $c.sqlApi.port }}, targetPort: pgsql }
{{- end }}
{{- end }}
