{{- if .Values.dbt.enabled }}
{{- /*
  dbt build Job — builds the seed data into Iceberg marts via the central Trino
  engine (dbt-trino over the Polaris REST catalog). Runs as a post-install/upgrade
  hook once Trino is up. Cube + Superset + the agent query tool read these marts
  THROUGH Trino. dbt-trino is the single governed adapter.
*/}}
{{- $d := .Values.dbt }}
apiVersion: batch/v1
kind: Job
metadata:
  name: dbt-build
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soa.labels" . | nindent 4 }}
    {{- include "soa.selectorLabels" (dict "ctx" . "component" "dbt") | nindent 4 }}
  annotations:
    # post-install,post-upgrade: the warehouse storage (MinIO PVC / node-disk) can be
    # re-provisioned out from under the Polaris catalog, dropping the physical marts
    # while nothing recreates them — which is exactly what broke the Catalog + the
    # default query. `dbt build` is idempotent (models create-or-replace their
    # tables), so re-firing on every upgrade self-heals the warehouse. Sibling of the
    # marts-init hook (weight 20); this one is weight 15 (runs first).
    "helm.sh/hook": post-install       # post-install ONLY: this is an idempotent skip-if-exists DATA SEED; re-applying its Job on every upgrade only risks a flaky-network hang and adds nothing (reseed manually if needed)
    "helm.sh/hook-weight": "15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 8
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "soa.selectorLabels" (dict "ctx" . "component" "dbt") | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "soa.podSecurityContext" . | nindent 8 }}
        runAsUser: 1000
      containers:
        - name: dbt
          image: "{{ $d.image.repository }}:{{ $d.image.tag }}"
          imagePullPolicy: IfNotPresent      # locally-built image, loaded into kind
          securityContext:
            {{- include "soa.containerSecurityContext" . | nindent 12 }}
          env:
            - name: TRINO_HOST
              value: {{ $d.trino.host | quote }}
            - name: TRINO_PORT
              value: {{ $d.trino.port | quote }}
            - name: TRINO_USER
              value: {{ $d.trino.user | quote }}
            - name: TRINO_CATALOG
              value: {{ $d.trino.catalog | quote }}
            - name: TRINO_SCHEMA
              value: {{ $d.trino.schema | quote }}
          # Wait for Trino, then seed + build + test, then emit artifacts for
          # OpenMetadata (lineage/catalog) + cube_dbt (the semantic layer).
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "waiting for central Trino..."
              for i in $(seq 1 60); do
                if dbt debug --profiles-dir /opt/dbt/project >/dev/null 2>&1; then break; fi
                sleep 3
              done
              # First install: seed creates the static CSV table (pure CREATE).
              # Re-runs (every upgrade): the seed's drop+recreate is rejected because
              # the dbt Polaris principal has CREATE but not DROP on an existing table
              # — and the data never changes, so re-seeding is unnecessary. Tolerate
              # that one known case so a static seed can't fail the whole upgrade hook.
              dbt seed --profiles-dir /opt/dbt/project \
                || echo "raw_orders already seeded (static CSV); skipping re-seed."
              # Build the marts (create-or-replace, idempotent) but exclude the seed
              # node so build never re-attempts the disallowed drop.
              #
              # NON-BLOCKING: a demo-data model error must NOT fail the whole platform
              # upgrade. This is a post-upgrade data hook, not a platform gate — the
              # governed marts are seeded independently and the OS is fully usable
              # without a fresh dbt rebuild. Model failures are logged loudly here and
              # fixed as a separate data-pipeline task; they never brick the release.
              dbt build --exclude raw_orders --profiles-dir /opt/dbt/project \
                || echo "WARNING: dbt model build reported errors — marts may be stale; see logs above. NOT failing the platform upgrade (data hook is non-blocking)."
              dbt docs generate --profiles-dir /opt/dbt/project \
                || echo "WARNING: dbt docs generate failed (non-blocking; OpenMetadata lineage may be stale)."
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
{{- end }}
