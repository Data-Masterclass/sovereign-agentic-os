# =============================================================================
# values.gke.yaml — Cloud overlay: Google Kubernetes Engine (GKE).
# =============================================================================
# Clones the shape of values.stackit-managed.yaml, but for GKE:
#   • Object storage  -> GCS (bundled MinIO OFF; consumers use the GCS endpoint).
#   • Postgres        -> BUNDLED CloudNativePG (engine:cnpg) with cloud-durable
#                        defaults (3 instances, zone spread, PDB, WAL->GCS via the
#                        Barman Cloud PLUGIN + ObjectStore CR, durable zonal class).
#   • Lakehouse       -> Apache Polaris REST is the DEFAULT catalog; BigLake managed
#                        Iceberg REST is an opt-in toggle (trino.cloudCatalog).
#   • LLM             -> Vertex AI via LiteLLM, KEYLESS (ADC from Workload Identity).
#   • Identity        -> GKE Workload Identity Federation (direct IAM binding, no
#                        intermediary GSA): KSA annotation `iam.gke.io/gcp-service-account`
#                        on the components that call cloud APIs (trino, litellm, CNPG).
#
# STATIC-VALIDATION ONLY: this overlay renders cleanly (`helm template`/`helm lint`)
# but is NOT live-verified — bring-up on a real GKE cluster is required to confirm
# Workload Identity, Vertex routing, GCS, and the Barman plugin end to end. Fill the
# REPLACE-* tokens from your bootstrap (project/region/bucket/service-account/DNS).
# =============================================================================

global:
  profile: gke
  # Durable zonal PD-SSD for stateful PVCs (MinIO is off, but Polaris/OpenSearch etc.).
  storageClass: premium-rwo
  imagePullPolicy: IfNotPresent
  imagePullSecrets:
    - name: registry-pull-secret

networkPolicies:
  defaultDeny: true

# --- Object storage -> GCS ---------------------------------------------------
# The chart's S3 helpers speak the S3 API; GCS is addressed through its S3-
# interoperable XML endpoint. No bundled MinIO. Access is via Workload Identity on
# the consuming pods (Trino SA below) — no static HMAC keys inlined here.
objectStorage:
  enabled: false
  mode: external
  external:
    endpoint: "https://storage.googleapis.com"
  secretName: object-storage-credentials
  region: "REPLACE-GCP-REGION"          # e.g. europe-west1

# --- Postgres -> BUNDLED CloudNativePG, cloud-durable ------------------------
postgres:
  enabled: true
  engine: cnpg                          # STACKIT's SNA initdb-hang constraint does NOT apply on GKE
  instances: 3                          # HA via streaming replication + failover across zones
  storageSize: 20Gi
  cnpg:
    storageClass: premium-rwo           # durable zonal CSI (replicas-in-other-AZs = the HA)
    highAvailability:
      enabled: true
      topologyKey: topology.kubernetes.io/zone
      minAvailable: 2
    backup:
      enabled: true
      objectStoreName: pg-barman-store
      destinationPath: "gs://REPLACE-GCS-BUCKET/pg"   # WAL + base backups (native GCS)
      retention: "30d"
      schedule: "0 0 3 * * *"
    serviceAccount:
      enabled: true                     # keyless WAL push via Workload Identity
      annotations:
        iam.gke.io/gcp-service-account: "REPLACE-CNPG-GSA@REPLACE-PROJECT.iam.gserviceaccount.com"

# --- OpenSearch stays bundled (no managed swap here) -------------------------
# retrieval.knnDimension MUST match the embedding model's vector dim (Vertex
# gemini-embedding-001 = 3072). Changing it forces an OpenSearch reindex.
retrieval:
  knnDimension: 3072
osUI:
  embedDim: 3072
  image:
    repository: ghcr.io/aborek/sovereign-os/os-ui
    tag: "0.1.0@sha256:5719957f3a78e1f54f28b0a90eaa686a1a244c4b9beab1f903cf1d231996bd36"

# --- LLM -> Vertex AI via LiteLLM (keyless, ADC from Workload Identity) -------
llm:
  mode: external
  provider: vertex_ai
litellm:
  db:
    endpoint: pg-rw                     # bundled CNPG
  # KEYLESS: create the LiteLLM SA and bind it to the Vertex GSA via Workload
  # Identity. LiteLLM's Vertex path uses ADC when no credentials are supplied.
  serviceAccount:
    create: true
    name: litellm-sa
    annotations:
      iam.gke.io/gcp-service-account: "REPLACE-LITELLM-GSA@REPLACE-PROJECT.iam.gserviceaccount.com"
  environmentSecrets:
    - litellm-credentials               # master key only (no provider API key — keyless)
  proxy_config:
    model_list:
      # Reasoning tier -> Gemini 3.1 Pro.
      - model_name: sovereign-reasoning
        litellm_params:
          # FOOTGUN (report §2): some LiteLLM versions require the `vertex_ai/`
          # prefix; a few need the `google/` fallback under Workload Identity if the
          # call 404s. Pin the prefix that resolves on your LiteLLM version.
          model: vertex_ai/gemini-3.1-pro
          vertex_project: "REPLACE-PROJECT"
          vertex_location: "REPLACE-GCP-REGION"
      - model_name: sovereign-reasoning-fast
        litellm_params:
          model: vertex_ai/gemini-2.5-flash
          vertex_project: "REPLACE-PROJECT"
          vertex_location: "REPLACE-GCP-REGION"
      # Default / worker tier -> Gemini 2.5 Flash.
      - model_name: sovereign-default
        litellm_params:
          model: vertex_ai/gemini-2.5-flash
          vertex_project: "REPLACE-PROJECT"
          vertex_location: "REPLACE-GCP-REGION"
      - model_name: sovereign-mock       # back-compat alias -> worker tier
        litellm_params:
          model: vertex_ai/gemini-2.5-flash
          vertex_project: "REPLACE-PROJECT"
          vertex_location: "REPLACE-GCP-REGION"
      # Embeddings -> gemini-embedding-001 (3072-dim; MUST match retrieval.knnDimension).
      - model_name: sovereign-embed
        litellm_params:
          model: vertex_ai/gemini-embedding-001
          vertex_project: "REPLACE-PROJECT"
          vertex_location: "REPLACE-GCP-REGION"
      # Premium escalation -> Gemini 3.1 Pro.
      - model_name: sovereign-premium
        litellm_params:
          model: vertex_ai/gemini-3.1-pro
          vertex_project: "REPLACE-PROJECT"
          vertex_location: "REPLACE-GCP-REGION"
    router_settings:
      routing_strategy: simple-shuffle
      num_retries: 3
      timeout: 120
      allowed_fails: 3
      cooldown_time: 60
      fallbacks:
        - sovereign-default: ["sovereign-premium"]
        - sovereign-mock: ["sovereign-premium"]
        - sovereign-reasoning: ["sovereign-reasoning-fast"]
    litellm_settings:
      success_callback: ["langfuse"]
      drop_params: true
    general_settings:
      master_key: os.environ/PROXY_MASTER_KEY

# No self-hosted inference on cloud — Vertex is the backend.
mockModel:
  enabled: false
stackitPremium:
  enabled: false

# --- Trino: Polaris REST default + KEYLESS BigLake toggle --------------------
trino:
  # KEYLESS federation: the Trino pod's SA carries the Workload Identity binding
  # used for GCS + (if toggled) BigLake.
  serviceAccount:
    create: true
    name: trino-sa
    annotations:
      iam.gke.io/gcp-service-account: "REPLACE-TRINO-GSA@REPLACE-PROJECT.iam.gserviceaccount.com"
  s3:
    region: "REPLACE-GCP-REGION"
    pathStyleAccess: false               # GCS S3-XML uses virtual-host addressing
  catalog:
    iceberg:
      # DEFAULT catalog = Apache Polaris (REST). OAuth2 secret from External Secrets.
      oauth2SecretName: polaris-trino-oauth
      vendedCredentials: true
  # OPT-IN managed catalog. Leave provider:"" to run Polaris-only; set to biglake
  # to ALSO mount the BigLake managed Iceberg REST catalog (keyless, security=GOOGLE).
  cloudCatalog:
    provider: ""                         # set to "biglake" to enable
    name: biglake
    restUri: "https://biglake.googleapis.com/iceberg/v1/restcatalog"
    warehouse: "gs://REPLACE-GCS-BUCKET/wh"

# Bespoke images (pin to your registry digests at go-live).
agentRuntime:
  image:
    repository: ghcr.io/aborek/sovereign-os/agent-runtime
    tag: "0.1.0@sha256:85cb9c3109beebf447422a0dbbbf05435f31cf38a73d705cc1dd185d1cae0eab"

ingress:
  enabled: true
  className: nginx
  tlsIssuer: letsencrypt-prod
  hosts:
    osUI: "os.REPLACE-DNS-NAME"
    litellm: "litellm.REPLACE-DNS-NAME"
    langfuse: "langfuse.REPLACE-DNS-NAME"
    openmetadata: "openmetadata.REPLACE-DNS-NAME"
    superset: "superset.REPLACE-DNS-NAME"
    forgejo: "forgejo.REPLACE-DNS-NAME"
    argocd: "argocd.REPLACE-DNS-NAME"
