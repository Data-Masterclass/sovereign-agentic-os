#
# ClusterSecretStore -> STACKIT Secrets Manager. STACKIT Secrets Manager exposes
# a HashiCorp-Vault-compatible API (KV v2), so we use ESO's `vault` provider.
#   - `server`     : the SM instance API URL (REPLACE-… -> render-values.sh from
#                    terraform output secretsmanager_instance_id).
#   - auth.userPass: the ESO READER user (terraform secretsmanager_eso_*),
#                    bootstrapped into the `stackit-sm-auth` Secret by
#                    deploy/scripts/push-secrets.sh (never committed).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: stackit-secrets-manager
spec:
  provider:
    vault:
      server: "https://REPLACE-sm-instance-id.secrets-manager.eu01.stackit.cloud"
      path: "secrets"
      version: v2
      auth:
        userPass:
          path: userpass
          username: "REPLACE-eso-username"
          secretRef:
            name: stackit-sm-auth
            namespace: external-secrets
            key: password
