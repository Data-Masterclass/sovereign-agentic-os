---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stackit-ai-model-serving-key
  namespace: agentic-os
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: stackit-secrets-manager
    kind: ClusterSecretStore
  target:
    name: stackit-ai-model-serving-key # llm.secretRef
    creationPolicy: Owner
  data:
    - secretKey: api_key
      remoteRef: { key: ai-model-serving, property: token }
    - secretKey: api_base
      remoteRef: { key: ai-model-serving, property: base_url }
---
# Velero S3 credentials (the AWS-plugin `cloud` file format).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: velero-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: stackit-secrets-manager
    kind: ClusterSecretStore
  target:
    name: velero-credentials
    creationPolicy: Owner
    template:
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .access_key }}
          aws_secret_access_key={{ .secret_key }}
  data:
    - secretKey: access_key
      remoteRef: { key: object-storage, property: access_key }
    - secretKey: secret_key
      remoteRef: { key: object-storage, property: secret_key }
---
# Registry pull secret (dockerconfigjson) for the bespoke images.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: registry-pull-secret
  namespace: agentic-os
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: stackit-secrets-manager
    kind: ClusterSecretStore
  target:
    name: registry-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfigjson }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef: { key: container-registry, property: dockerconfigjson }
