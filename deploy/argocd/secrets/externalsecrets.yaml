# ExternalSecrets — materialise the k8s Secrets the OS chart's Mode B overlay
# references by name. Values come from STACKIT Secrets Manager (populated once by
# deploy/scripts/push-secrets.sh from terraform outputs). NOTHING sensitive lives
# in this file — only the SM key references. Namespace = agentic-os (the chart's).
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: object-storage-credentials
  namespace: agentic-os
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: stackit-secrets-manager
    kind: ClusterSecretStore
  target:
    name: object-storage-credentials # objectStorage.external.secretName
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef: { key: object-storage, property: access_key }
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef: { key: object-storage, property: secret_key }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: agentic-os
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: stackit-secrets-manager
    kind: ClusterSecretStore
  target:
    name: postgres-credentials # postgres.external.secretName
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef: { key: postgres, property: username }
    - secretKey: password
      remoteRef: { key: postgres, property: password }
    - secretKey: host
      remoteRef: { key: postgres, property: host }
    - secretKey: port
      remoteRef: { key: postgres, property: port }
---
