# Platform wave 2 — the ClusterSecretStore + ExternalSecrets that materialise
# the k8s Secrets the OS chart's `external.secretName` references. Lives in
# deploy/argocd/secrets/ (raw manifests). Runs AFTER ESO (wave 1) is healthy.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: sovereign-os
  source:
    repoURL: https://github.com/datamasterclass/sovereign-agentic-os.git
    targetRevision: main
    path: deploy/argocd/secrets
    directory:
      recurse: false
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: agentic-os
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
