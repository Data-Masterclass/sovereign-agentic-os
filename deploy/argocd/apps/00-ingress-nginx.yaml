# Platform wave 0 — ingress controller (provisions the STACKIT LB + public IP).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: sovereign-os
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          service:
            type: LoadBalancer
            # Pin the STACKIT managed LB (yawol) to the reserved/static public IP
            # so the OS keeps the SAME ingress IP across Service/cluster recreation
            # (no DNS change, no cert re-issue). The IP is a user-managed STACKIT
            # public IP tracked in Terraform (deploy/terraform/publicip.tf).
            annotations:
              lb.stackit.cloud/external-address: "193.148.171.38"
          ingressClassResource:
            default: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
