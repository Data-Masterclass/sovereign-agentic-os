#
# Campaign-Optimization seed — in-cluster runner. Reaches the os-ui Service over the
# cluster network (governed API), authenticating as the instructor + one participant. It touches only
# os-ui's governed routes — never the Kubernetes API, Helm, or a backend directly.
#
# Prereqs (see README):
#   1. OS_USERS seeded with the cast (merge seed/campaign/os-users.seed.json
#      into osUI.usersSeed) — so the 1 instructor + 36 participants exist.
#   2. ConfigMap `northpeak-campaign-seed` from the script files (client.mjs is
#      REUSED from the e-commerce seed unchanged):
#        kubectl -n agentic-os create configmap northpeak-campaign-seed \
#          --from-file=seed.mjs=seed/campaign/seed.mjs \
#          --from-file=narrative.mjs=seed/campaign/narrative.mjs \
#          --from-file=client.mjs=seed/ecommerce/lib/client.mjs
#   3. Secret `northpeak-campaign-credentials` with the cast passwords:
#        kubectl -n agentic-os create secret generic northpeak-campaign-credentials \
#          --from-file=SEED_CREDENTIALS=seed/campaign/users.secret.json
#
# Run:  kubectl -n agentic-os apply -f seed/campaign/k8s/job.yaml
#       kubectl -n agentic-os logs -f job/northpeak-campaign-seed
apiVersion: batch/v1
kind: Job
metadata:
  name: northpeak-campaign-seed
  namespace: agentic-os
  labels:
    app.kubernetes.io/part-of: sovereign-agentic-os
    app.kubernetes.io/component: campaign-seed
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/component: campaign-seed
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: seed
          image: node:22.13.1-alpine3.21 # same base as the os-ui image
          imagePullPolicy: IfNotPresent
          # workingDir keeps the source layout so seed.mjs's relative imports resolve:
          #   ./narrative.mjs → /work/campaign/narrative.mjs
          #   ../ecommerce/lib/client.mjs → /work/ecommerce/lib/client.mjs
          workingDir: /work/campaign
          command: ["node", "seed.mjs"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          env:
            - name: OS_UI_URL
              value: "http://os-ui:3000"
            - name: SEED_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: northpeak-campaign-credentials
                  key: SEED_CREDENTIALS
          volumeMounts:
            - { name: scripts, mountPath: /work }
          resources:
            requests: { cpu: "50m", memory: "96Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
      volumes:
        - name: scripts
          configMap:
            name: northpeak-campaign-seed
            items:
              - { key: seed.mjs, path: campaign/seed.mjs }
              - { key: narrative.mjs, path: campaign/narrative.mjs }
              - { key: client.mjs, path: ecommerce/lib/client.mjs }
