  # CANONICAL PUBLIC URL — the apex host. OS_PUBLIC_URL derives from this (os-ui.yaml
  # reads `.Values.osUI.publicUrl` first, only falling back to the `os.<zone>` ingress
  # host). Pinning it here makes the apex authoritative so a `helm upgrade` can NEVER
  # revert OS_PUBLIC_URL back to os.<zone> and re-break the MCP endpoint URL / OAuth
  # issuer / email links (resolves the TODO in the ingress block below). The apex is
  # already served by the `osUIApex` Ingress. Matches the live `kubectl set env`.
  publicUrl: "https://agentic.datamasterclass.com"
  # ---- Mailer: the OS sends its OWN mail via the in-cluster maddy MTA. --------
  # os-ui's SMTP transport is pointed at the in-cluster `mail` Service (587,
  # STARTTLS); maddy DKIM-signs and delivers as noreply@sovereign-agentic.com.
  # No AWS SES / no third-party ESP. See the `mail:` block below + the DNS
  # (SPF/DKIM/DMARC) + go-live steps in templates/mail/maddy.yaml.
  #
  # Graph (Microsoft 365) is DISABLED here so the in-cluster relay is the single,
  # unambiguous sender. The Graph transport is retained in the chart for OTHER
  # deployments that prefer M365 — flip graph.enabled and supply creds to use it.
  #
  # Until DNS is published + a test send verified, the first-run bootstrap admin
  # AND the seeded demo cast (values.private.yaml usersSeed) are marked
  # email-verified on ingest, so NO login is blocked and the deploy never depends
  # on outbound mail. With a mailer configured, email verification turns ON
  # automatically (emailVerification left empty = the documented default).
  graph:
    enabled: false
  smtp:
    enabled: true
    host: "mail"      # in-cluster maddy Service (submission on 587)
    port: 587
    secure: false     # 587 = STARTTLS (maddy presents its self-signed cert)
    user: ""          # empty → no SMTP AUTH (maddy submission auth off by default;
                      # the relay is closed by ClusterIP-only + sender-domain lock)
    # Bare address (NOT "Name <addr>") — os-ui uses this verbatim as the SMTP
    # envelope MAIL FROM, so it must be a plain RFC-5321 address; it doubles as
    # the From: header. Aligns with the DKIM d= domain → DMARC passes.
    from: "noreply@sovereign-agentic.com"

# In-cluster transactional MTA (maddy) — see values.yaml `mail:` for all knobs
# and templates/mail/maddy.yaml for the open-relay guards + go-live steps.
mail:
  enabled: true
  # VERIFIED 2026-07-05: STACKIT BLOCKS outbound :25 from this cluster. Tested from
  # in-cluster pods (SNAT egress IP 213.17.17.64): :443 to arbitrary hosts connects
  # instantly, but :25 to 1.1.1.1/8.8.8.8 times out and to real MX
  # (gmail-smtp-in.l.google.com) returns ENETUNREACH ("network unreachable") — the
  # classic OpenStack port-25 null-route. => DIRECT-to-MX WILL NOT DELIVER.
  # Therefore maddy MUST relay through a smarthost (submission on 587/465, which
  # STACKIT does NOT block). Do NOT rely on `outbound: direct` below.
  #
  # TO GO LIVE (smarthost): copy values.mail.private.example.yaml ->
  # values.mail.private.yaml (gitignored), pick your EU-sovereign relay host, and
  # apply it LAST (-f values.mail.private.yaml) so it flips outbound=smarthost.
  # Relay CREDENTIALS never go in any values file — create the mail-smarthost
  # Secret out-of-band (SMARTHOST_USER/SMARTHOST_PASS). DKIM signing is unaffected
  # by the delivery path. `outbound: direct` is kept here only so the base renders;
  # the private overlay is required for actual delivery.
  outbound: direct

