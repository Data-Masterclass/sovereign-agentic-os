# =============================================================================
# values.stackit-selfhosted.yaml — Mode A: self-hosted on STACKIT SKE.
# =============================================================================
# Copyright 2026 Borek Data Ventures UG (haftungsbeschränkt)
# SPDX-License-Identifier: Apache-2.0
#
# Thin overlay LAYERED ON TOP of values.selfcontained.yaml — apply BOTH, in order:
#
#   helm ... -f values.selfcontained.yaml -f values.stackit-selfhosted.yaml
#
# values.selfcontained.yaml keeps EVERY stateful backend bundled in-cluster
# (Postgres via CloudNativePG, OpenSearch, ClickHouse, Valkey, object storage via
# MinIO; LiteLLM -> bundled local mock model). NOTHING managed/external. So the
# whole deployment pauses with the SKE node pool (`stackit off` / `make sleep`) —
# there is NO 24/7 managed-service bill. Terraform for Mode A provisions ONLY the
# SKE cluster + DNS (enable_managed_backends=false).
#
# This overlay only changes what differs between a 14 GB kind box and a real SKE
# node pool:
#   1. global.storageClass -> SKE's CSI StorageClass (kind's "standard" is wrong).
#   2. ingress -> ON, public TLS hosts for the 7 tools (cert-manager + nginx).
#   3. re-enable the heavy Layer-2 components that values.selfcontained.yaml turns
#      off for the small kind node (SKE nodes have the RAM for the full L1–L3 set).
#
# WIRING: `agentic.datamasterclass.com` is filled by deploy/scripts/render-values.sh from
# `terraform output dns_name` (MODE=selfhosted). No secret VALUES land here.
# =============================================================================

global:
  profile: local
  # SKE in-cluster CSI StorageClass for ALL bundled PVCs (Postgres/OpenSearch/
  # ClickHouse/Valkey/MinIO). kind's "standard" (rancher local-path) does not
  # exist on SKE, so it MUST be overridden here.
  #
  # VERIFY before go-live: `kubectl get storageclass` on the SKE cluster and use
  # the actual name (or the one marked `(default)`). Set to "" to fall back to the
  # cluster's default StorageClass if you'd rather not pin a name.
  storageClass: ""
  imagePullPolicy: IfNotPresent
  # Bespoke images are pulled from ghcr.io/aborek (NOT kind-loaded) on a real SKE
  # cluster, so a registry pull secret is required. `registry-pull-secret` is
  # materialised in-cluster (e.g. by External Secrets / `make secrets`); the chart
  # adds it to every bespoke workload's pod spec via this global list.
  imagePullSecrets:
    - name: registry-pull-secret

# Cilium enforces FQDN-aware default-deny egress on SKE (security.md). Bundled
# mode keeps the same secure baseline as kind — just actually enforced here.
networkPolicies:
  defaultDeny: true

# -----------------------------------------------------------------------------
# Heavy Layer-2 components: OFF in values.selfcontained.yaml so the full L1–L3
# slice fits a single ~14 GB kind node. SKE worker nodes have the headroom, so
# re-enable them here for the complete self-hosted experience.
# (Size the node pool for the full set — see deploy/terraform/terraform.tfvars.example.)
# -----------------------------------------------------------------------------
docling:
  enabled: true
osdashboards:
  enabled: true
openmetadata:
  enabled: true

# -----------------------------------------------------------------------------
# Self-hosted SOVEREIGN reasoning tier (Magistral Small 24B) — ON for the box.
# OFF in the chart default (needs the m3i.16 node + the GGUF provided out of band).
# Here on a sized SKE node we run the single RESIDENT, core-capped replica.
#
# BEFORE go-live you MUST provide the GGUF: with persistence.enabled below, the pod
# mounts the `magistral-reasoning-models` PVC at /models — place
# `Magistral-Small-2506-Q4_K_M.gguf` there (e.g. an init job / `kubectl cp` / a
# pre-seeded volume). The pod stays NotReady (and LiteLLM uses the STACKIT fast
# route) until llama-server has loaded the weights. Set `nodeSelector` to the
# m3i.16 node-pool label so it never lands on a small node.
# -----------------------------------------------------------------------------
modelServer:
  reasoning:
    enabled: true
    persistence:
      enabled: true
      size: 20Gi
    # nodeSelector: { topology.kubernetes.io/node-pool: m3i-16 }   # set to the real label

# Layer 4 (Science / ML — MLflow, KServe, ml-agent) stays OFF: heavy + GPU-leaning
# and out of scope for the self-hosted demo. Flip on only on a sized node pool.
ml:
  enabled: false

# =============================================================================
# Bespoke images -> ghcr.io/aborek/sovereign-os (NOT kind-loaded on a real SKE
# cluster). The chart renders bespoke images as `{{ .image.repository }}:{{ .image.tag }}`
# with NO global registry prefix, so the chart default `sovereign-os/<name>` is
# kind-local and unpullable on STACKIT. Override every bespoke component's
# `image.repository` to the published ghcr path at the pushed tag. Tag refs (no
# @sha256) — this self-hosted overlay does not pin by digest. Backends stay
# BUNDLED, so NO managed-service (Postgres Flex / OpenSearch / object-store) wiring
# lands here — images + the global pull secret only.
# (The managed overlay values.stackit-managed.yaml carries the digest-pinned copies.)
# =============================================================================
osUI:
  image:
    repository: ghcr.io/aborek/sovereign-os/os-ui
    tag: "0.1.0"

agentRuntime:
  image:
    repository: ghcr.io/aborek/sovereign-os/agent-runtime
    tag: "0.1.0"

# Bundled local mock model is the LiteLLM backend in self-hosted mode (enabled by
# the chart default + values.selfcontained.yaml) — pull its image from ghcr too.
mockModel:
  image:
    repository: ghcr.io/aborek/sovereign-os/mock-model
    tag: "0.1.1"

sampleAgent:
  image:
    repository: ghcr.io/aborek/sovereign-os/sample-agent
    tag: "0.1.0"

poetAgent:
  image:
    repository: ghcr.io/aborek/sovereign-os/poet-agent
    tag: "0.1.0"

haystack:
  image:
    repository: ghcr.io/aborek/sovereign-os/haystack-retriever
    tag: "0.1.0"

dbt:
  image:
    repository: ghcr.io/aborek/sovereign-os/dbt
    tag: "0.2.0"

egressProxy:
  image:
    repository: ghcr.io/aborek/sovereign-os/egress-proxy
    tag: "0.1.0"

webFetch:
  image:
    repository: ghcr.io/aborek/sovereign-os/web-fetch
    tag: "0.1.0"

queryTool:
  image:
    repository: ghcr.io/aborek/sovereign-os/query-tool
    tag: "0.3.0"

sandbox:
  image:
    repository: ghcr.io/aborek/sovereign-os/sandbox-duckdb
    tag: "0.1.0"

superset:
  image:
    repository: ghcr.io/aborek/sovereign-os/superset
    tag: "6.1.0"

# dagster (chart default enabled:true) stays DISABLED here: the
# sovereign-os/dagster image build failed in the current push run, so there is no
# ghcr tag to pull. Re-enable once the image is rebuilt + pushed.
dagster:
  enabled: false

# Layer 4 (Science / ML) — OFF above (ml.enabled=false). Images pinned so enabling
# an individual component pulls from ghcr immediately.
mlflow:
  image:
    repository: ghcr.io/aborek/sovereign-os/mlflow
    tag: "2.19.0"

mlAgent:
  image:
    repository: ghcr.io/aborek/sovereign-os/ml-agent
    tag: "0.1.0"

# Terminal + Workbench are OFF by default (enabled:false in values.yaml). Images
# pinned here so opt-in brings up the correct, pushed images immediately.
terminal:
  broker:
    image:
      repository: ghcr.io/aborek/sovereign-os/terminal-broker
      tag: "0.1.0"
  sandbox:
    image:
      repository: ghcr.io/aborek/sovereign-os/sandbox-shell
      tag: "0.1.0"

workbench:
  broker:
    image:
      repository: ghcr.io/aborek/sovereign-os/workbench-broker
      tag: "0.1.0"
  workspace:
    image:
      repository: ghcr.io/aborek/sovereign-os/code-server-workbench
      tag: "0.1.0"

# -----------------------------------------------------------------------------
# Ingress + TLS — public consoles for the 7 tools. Hostnames resolve to the
# ingress-nginx LoadBalancer (its public IP is written into the STACKIT DNS zone
# by `make dns`); cert-manager issues Let's Encrypt certs. `agentic.datamasterclass.com` is
# substituted with `terraform output dns_name` by render-values.sh.
# Same 7 keys the chart's templates/ingress.yaml routes to in-cluster Services.
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  tlsIssuer: letsencrypt-prod
  hosts:
    osUI: "os.agentic.datamasterclass.com"
    # Bare zone apex also serves the OS UI so it no longer 404s next to os.<zone>.
    osUIApex: "agentic.datamasterclass.com"
    litellm: "litellm.agentic.datamasterclass.com"
    langfuse: "langfuse.agentic.datamasterclass.com"
    openmetadata: "openmetadata.agentic.datamasterclass.com"
    superset: "superset.agentic.datamasterclass.com"
    forgejo: "forgejo.agentic.datamasterclass.com"
    argocd: "argocd.agentic.datamasterclass.com"

# NOTE: NO objectStorage/postgres/opensearch/llm `external:` blocks here on
# purpose — every backend stays BUNDLED (the values.selfcontained.yaml +
# chart defaults). Adding an `external:` block would re-introduce a managed
# dependency and defeat the pause-with-the-node-pool cost model.
