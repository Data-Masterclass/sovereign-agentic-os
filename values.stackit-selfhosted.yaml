# =============================================================================
# values.stackit-selfhosted.yaml — Mode A: self-hosted on STACKIT SKE.
# =============================================================================
# Copyright 2026 Borek Data Ventures UG (haftungsbeschränkt)
# SPDX-License-Identifier: Apache-2.0
#
# Thin overlay LAYERED ON TOP of values.selfcontained.yaml — apply BOTH, in order:
#
#   helm ... -f values.selfcontained.yaml -f values.stackit-selfhosted.yaml
#
# values.selfcontained.yaml keeps EVERY stateful backend bundled in-cluster
# (Postgres via CloudNativePG, OpenSearch, ClickHouse, Valkey, object storage via
# MinIO; LiteLLM -> bundled local mock model). NOTHING managed/external. So the
# whole deployment pauses with the SKE node pool (`stackit off` / `make sleep`) —
# there is NO 24/7 managed-service bill. Terraform for Mode A provisions ONLY the
# SKE cluster + DNS (enable_managed_backends=false).
#
# This overlay only changes what differs between a 14 GB kind box and a real SKE
# node pool:
#   1. global.storageClass -> SKE's CSI StorageClass (kind's "standard" is wrong).
#   2. ingress -> ON, public TLS hosts for the 7 tools (cert-manager + nginx).
#   3. re-enable the heavy Layer-2 components that values.selfcontained.yaml turns
#      off for the small kind node (SKE nodes have the RAM for the full L1–L3 set).
#
# WIRING: `agentic.datamasterclass.com` is filled by deploy/scripts/render-values.sh from
# `terraform output dns_name` (MODE=selfhosted). No secret VALUES land here.
# =============================================================================

global:
  profile: local
  # SKE in-cluster CSI StorageClass for ALL bundled PVCs (Postgres/OpenSearch/
  # ClickHouse/Valkey/MinIO). kind's "standard" (rancher local-path) does not
  # exist on SKE, so it MUST be overridden here.
  #
  # VERIFY before go-live: `kubectl get storageclass` on the SKE cluster and use
  # the actual name (or the one marked `(default)`). Set to "" to fall back to the
  # cluster's default StorageClass if you'd rather not pin a name.
  storageClass: ""
  imagePullPolicy: IfNotPresent
  # Bespoke images are pulled from ghcr.io/aborek (NOT kind-loaded) on a real SKE
  # cluster, so a registry pull secret is required. `registry-pull-secret` is
  # materialised in-cluster (e.g. by External Secrets / `make secrets`); the chart
  # adds it to every bespoke workload's pod spec via this global list.
  imagePullSecrets:
    - name: registry-pull-secret

# Cilium enforces FQDN-aware default-deny egress on SKE (security.md). Bundled
# mode keeps the same secure baseline as kind — just actually enforced here.
networkPolicies:
  defaultDeny: true

# -----------------------------------------------------------------------------
# Heavy Layer-2 components: OFF in values.selfcontained.yaml so the full L1–L3
# slice fits a single ~14 GB kind node. SKE worker nodes have the headroom, so
# re-enable them here for the complete self-hosted experience.
# (Size the node pool for the full set — see deploy/terraform/terraform.tfvars.example.)
# -----------------------------------------------------------------------------
docling:
  enabled: true
osdashboards:
  enabled: true
openmetadata:
  enabled: true

# OpenSearch is the DURABLE mirror behind the os-ui in-process stores (users,
# artifacts, apps, datasets, domains). The chart default is persistence.enabled:
# false (an ephemeral kind stand-in), which silently wipes those stores on any
# pod/node roll — so a durable deploy MUST turn its PVC on here. storageClass
# falls back to global.storageClass (the SKE CSI class / cluster default).
# NOTE: enabling this on an already-running cluster requires RECREATING the
# opensearch StatefulSet (a PVC cannot be added to a live STS in place).
opensearch:
  persistence:
    enabled: true
    size: 8Gi
  # path.repo is required for fs snapshot repos. The value must match
  # opensearchSnapshots.mountPath below. Adding this key requires a pod
  # restart (rolling update of the StatefulSet) to take effect — plan for
  # one OpenSearch restart when deploying 0.1.73.
  config:
    opensearch.yml: |
      cluster.name: opensearch
      network.host: 0.0.0.0
      path.repo: ["/usr/share/opensearch/snapshots"]
  # Mount the snapshot PVC into the OpenSearch pod. The PVC is created by
  # templates/backup/opensearch-snapshot.yaml (gated on opensearchSnapshots.enabled).
  extraVolumes:
    - name: snapshots
      persistentVolumeClaim:
        claimName: opensearch-snapshots
  extraVolumeMounts:
    - name: snapshots
      mountPath: /usr/share/opensearch/snapshots

# Filesystem snapshot repository for OpenSearch (Backup & Restore feature).
# Enabled here for STACKIT; the register Job runs idempotently on every deploy.
# The PVC is separate from the main opensearch data PVC so a disaster-recovery
# restore doesn't risk the snapshot store.
opensearchSnapshots:
  enabled: true

# ClickHouse Langfuse analytics store. PVC-backed so trace tables survive a pod
# roll or node restart. Without persistence a CH restart wipes all Langfuse data
# and the schema migration must re-run from scratch next web boot. size: 10Gi
# covers a healthy trace volume before Langfuse's own retention cleanup runs.
# NOTE: enabling persistence on a cluster that already has a CH Deployment using
# emptyDir requires a one-time `kubectl delete deployment clickhouse` (the new
# PVC-backed pod will start fresh; trace history before this change is lost).
clickhouse:
  persistence:
    enabled: true
    size: 10Gi

# Embedding vector dimension — single source for the knowledge + files knn_vector
# mappings AND the app's KNOWLEDGE_EMBED_DIM/FILES_EMBED_DIM. Currently 384 (mock).
# STAGED: flip to 4096 (EU-sovereign STACKIT Qwen3-VL-Embedding-8B) TOGETHER with
# repointing sovereign-embed in values.private.yaml AND recreating the OpenSearch
# knowledge/files indices (the existing 384-dim vectors must be re-embedded).
retrieval:
  knnDimension: 4096

# Nightly logical dump of EVERY Postgres database to the lakehouse bucket
# (s3://lakehouse/backups/pg/<stamp>/), 14-day retention — the consistent
# Postgres backup path (Velero fs-backup deliberately skips live PGDATA).
# See docs/backups.md.
backup:
  pgDump:
    enabled: true

# All inference runs on STACKIT managed models (reasoning=Qwen3-VL-235B,
# standard/worker=gpt-oss-20b, embeddings=Qwen3-VL-Embedding-8B). No in-cluster
# self-hosted model server — LiteLLM routes every model_name to STACKIT.

# WireGuard listener — ON for STACKIT so the in-cluster LiteLLM can reach the Mac
# Mini's Ollama (qwen3:14b) over the tunnel. First-class, durable chart component
# (survives redeploys/node-rolls). The Mac dials IN to the UDP LoadBalancer this
# provisions; StackIT assigns a NEW public IP (NOT the old 192.214.171.34 one-off).
#
# OPERATOR PREREQUISITE (out-of-band, ONCE — the key must never be committed):
#   kubectl -n agentic-os create secret generic wireguard-stackit \
#     --from-file=privatekey=<path-to>/wg-stackit.privatekey
# The Secret is NOT part of the Helm release, so `helm upgrade` never wipes it.
wireguard:
  enabled: true
  # The Mac Mini's WireGuard PUBLIC key (the peer that dials in). Non-secret.
  peerPublicKey: "xeK9BKCZ3TYioNmHX1XOY/G9O6h8Hivqoq8ZcOyGqjM="
  # Tunnel: cluster listener 10.10.0.1/24, ListenPort 51820 (pinned); the Mac gets
  # 10.10.0.2/32 and serves Ollama qwen3:14b at 10.10.0.2:11434.
  address: "10.10.0.1/24"
  listenPort: 51820
  peerAllowedIPs: "10.10.0.2/32"
  ollama:
    targetIP: "10.10.0.2"
    port: 11434
  service:
    # yawol opens the Service port on the LB automatically — no extra firewall
    # rule / no terraform change (there is no security-group resource in
    # deploy/terraform; the CCM manages LB ingress). To restrict inbound to the
    # Mac only, set loadBalancerSourceRanges to its egress /32 once known:
    #   loadBalancerSourceRanges: ["<mac-egress-ip>/32"]
    loadBalancerSourceRanges: []   # any-source (approved default for now)
    externalTrafficPolicy: "Local"
    annotations: {}

# Layer 4 (Science / ML) — FULLY ENABLED for the everything-on deploy. `ml.enabled`
# is the master gate; each component additionally needs its own `<component>.enabled`
# (mlflow/kserve/mlAgent/featureform/jupyterhub/dagsterRetrain — all set below). The
# churn model is sklearn served via MLflow (registry/artifacts) + KServe (inference);
# Featureform is the feature store, JupyterHub the notebooks/Workbench notebooks tier,
# dagsterRetrain the monthly churn-retrain definition.
#
# PREREQUISITE for KServe: the KServe controller + CRDs are a cluster-scoped
# bootstrap installed BEFORE this chart (docs/components/kserve.md). DONE on the
# live cluster 2026-06-30: `helm install kserve oci://ghcr.io/kserve/charts/kserve
# -n kserve --create-namespace --set kserve.controller.deploymentMode=RawDeployment`
# (v0.15.0, RawDeployment — no Knative/Istio; cert-manager was already present).
ml:
  enabled: true

# =============================================================================
