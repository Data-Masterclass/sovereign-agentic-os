# gitleaks config — extends the default ruleset with an allowlist for
# DOCUMENTED LOCAL-DEV DEFAULTS and obviously-fake placeholders. None of these
# are production secrets: real secrets live in the gitignored values.private.yaml
# and override these defaults at deploy time. These strings have always been part
# of the public source (docs + chart example values).
title = "Sovereign Agentic OS"

[extend]
useDefault = true

[allowlist]
description = "Fake unit-test creds + documented local-dev defaults / placeholders"
regexes = [
  '''pw-strong-123''',          # unit-test fixture password
  '''gitea_admin''',            # local-dev Forgejo admin default (docs; prod overrides)
  '''forgejo-admin''',
  '''sk-litellm-local-dev''',   # local-dev LiteLLM master-key default (docs)
  '''pk-lf-localdev''',         # Langfuse local-dev PUBLIC key
  '''a1b2c3d4e5f6''',           # placeholder hex in chart example values
  '''0123456789abcdef''',       # placeholder hex in values.yaml default
]
paths = [
  '''.*\.test\.ts$''',   # unit-test fixtures use fake credentials by design
]
