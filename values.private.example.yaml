#
# WHAT THIS IS
#   An instance operator can register EXTRA self-hosted model endpoints and add
#   them to the LiteLLM fallback chain WITHOUT editing any public default. Copy
#   this file to `values.private.yaml` (gitignored — never published), edit it,
#   and apply it LAST so it deep-merges over the public values:
#
#     helm upgrade --install agentic-os charts/sovereign-agentic-os \
#       -n agentic-os --create-namespace \
#       -f values.selfcontained.yaml \
#       -f values.private.yaml          # <-- private, applied last, wins
#
#   The public chart (charts/.../values.yaml) is untouched: you edit ONLY the
#   private file. Nothing instance-specific lands in the repo.
#
# HELM LIST SEMANTICS (important)
#   Helm DEEP-MERGES maps but REPLACES lists. `litellm.proxy_config.model_list`
#   and `router_settings.fallbacks` are LISTS, so this overlay must supply the
#   FULL list = the public defaults + your private additions. Below is the public
#   default set (copy of values.yaml) with two private endpoints appended and the
#   fallback chain extended to prefer them before STACKIT. Keep the public entries
#   verbatim when you copy; only ADD to them.
#
# THE PRIVATE MODEL LIST ITSELF IS NEVER COMMITTED. This example uses placeholder
# hostnames; the real endpoints live only in your gitignored values.private.yaml.
# =============================================================================

litellm:
  proxy_config:
    model_list:
      # ---- PUBLIC DEFAULTS (copy verbatim from charts/.../values.yaml) --------
      - model_name: sovereign-default
        litellm_params:
          model: openai/gemma3n:e4b-it-q4_K_M
          api_base: http://model-server:11434/v1
          api_key: "sk-local-unused"
      - model_name: sovereign-mock
        litellm_params:
          model: openai/gemma3n:e4b-it-q4_K_M
          api_base: http://model-server:11434/v1
          api_key: "sk-local-unused"
      - model_name: sovereign-embed
        litellm_params:
          model: openai/mock-embed
          api_base: http://mock-model:8080/v1
          api_key: "sk-mock-unused"
      - model_name: sovereign-vision
        litellm_params:
          model: openai/Qwen/Qwen3-VL-235B-A22B-Instruct-FP8
          api_base: os.environ/STACKIT_API_BASE
          api_key: os.environ/STACKIT_API_KEY
      - model_name: sovereign-premium
        litellm_params:
          model: openai/Qwen/Qwen3-VL-235B-A22B-Instruct-FP8
          api_base: os.environ/STACKIT_API_BASE
          api_key: os.environ/STACKIT_API_KEY
      # ---- PRIVATE ADDITIONS (instance-specific; placeholders shown) ----------
      # Extra self-hosted endpoints reachable from the cluster. Keep them to
      # permissively-licensed weights. Real hosts live ONLY in values.private.yaml.
      - model_name: private-self-hosted-a
        litellm_params:
          model: openai/REPLACE-private-model-id
          api_base: http://REPLACE-private-host-a:8000/v1
          api_key: os.environ/PRIVATE_A_API_KEY    # via External Secrets
      - model_name: private-self-hosted-b
        litellm_params:
          model: openai/REPLACE-private-model-id
          api_base: http://REPLACE-private-host-b:8000/v1
          api_key: os.environ/PRIVATE_B_API_KEY
    router_settings:
      routing_strategy: simple-shuffle
      num_retries: 3
      timeout: 120
      allowed_fails: 3
      cooldown_time: 60
      # FULL fallback list (replaces the public one). Private self-hosted endpoints
      # are tried BEFORE the STACKIT last-resort, keeping more traffic in-house.
      fallbacks:
        - sovereign-default: ["private-self-hosted-a", "private-self-hosted-b", "sovereign-premium"]
        - sovereign-mock: ["private-self-hosted-a", "private-self-hosted-b", "sovereign-premium"]

# Allow the agent virtual key to call the private models too (deep-merged list is
# also replaced — copy the public set from values.yaml and append).
litellmAgentKey:
  models:
    - sovereign-default
    - sovereign-mock
    - sovereign-embed
    - sovereign-vision
    - sovereign-premium
    - private-self-hosted-a
    - private-self-hosted-b
