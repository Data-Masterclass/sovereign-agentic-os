#
# CLA check — every PR contributor must accept the Contributor License Agreement
# (CLA.md) once. Uses the contributor-assistant CLA bot, which records signatures
# in a separate storage repo/branch and re-checks on each PR.
#
# One-time setup (repo admin):
#   - Create a Personal Access Token with `repo` scope and add it as the secret
#     PERSONAL_ACCESS_TOKEN (used to write the signatures file). GITHUB_TOKEN is
#     used for PR comments.
#   - Adjust `path-to-signatures` / `remote-repository-name` if you want signatures
#     stored outside this repo.
name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-document: 'https://github.com/Data-Masterclass/sovereign-agentic-os/blob/main/CLA.md'
          path-to-signatures: '.github/cla/signatures.json'
          branch: 'cla-signatures'
          allowlist: 'dependabot[bot],bot*'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: 'Thanks for your PR! Before we can merge it, please read our [Contributor License Agreement](CLA.md) and sign it by commenting below with the exact text shown.'
