# =============================================================================
# values.stackit-managed.yaml — Mode B: backends -> STACKIT managed services.
# =============================================================================
# Opt-in overlay: each stateful backend's bundled deployment is disabled and the
# chart points at the managed STACKIT endpoint instead; secrets come from the
# secrets store via External Secrets (never inline). LiteLLM routes to STACKIT AI
# Model Serving. Same chart — mode is only a values choice. (Provision the
# managed services first: deploy/terraform; needs the SA key + cost sign-off.)
#
# WIRING: `REPLACE-…` tokens are filled by deploy/scripts/render-values.sh from
# `terraform output` (endpoints, registry, ingress) and by
# deploy/scripts/publish-images.sh (image @sha256 digests). Secret VALUES never
# land here — only secret *names* the chart references via External Secrets.
# See deploy/README.md "values.stackit-managed.yaml wiring" for the full map.
# =============================================================================

global:
  profile: stackit
  storageClass: "" # SKE CSI default
  imagePullPolicy: IfNotPresent
  # Registry pull secret for the bespoke images (materialised by External
  # Secrets from Secrets Manager — see deploy/argocd/secrets/externalsecrets.yaml).
  imagePullSecrets:
    - name: registry-pull-secret

networkPolicies:
  defaultDeny: true # Cilium enforces FQDN egress on SKE (security.md)

# --- Object storage -> STACKIT Object Storage --------------------------------
objectStorage:
  enabled: false # no bundled MinIO/SeaweedFS
  external:
    endpoint: "https://object.storage.eu01.onstackit.cloud"
    secretName: object-storage-credentials # External Secrets -> Secrets Manager

# --- Postgres -> STACKIT PostgreSQL Flex -------------------------------------
postgres:
  enabled: false # no in-cluster CloudNativePG cluster
  external:
    host: "REPLACE-postgres-flex-host" # render-values.sh <- output postgres_host
    port: "5432"
    secretName: postgres-credentials

# --- OpenSearch -> STACKIT managed OpenSearch --------------------------------
opensearch:
  enabled: false # no in-cluster OpenSearch subchart
  external:
    host: "REPLACE-opensearch-host" # render-values.sh <- output opensearch_host
    port: "9200"
    secretName: opensearch-credentials

# --- LLM -> STACKIT AI Model Serving (LiteLLM routes to it) -------------------
llm:
  mode: external
  provider: stackit
  secretRef: stackit-ai-model-serving-key

# No self-hosted inference in Mode B — STACKIT AI Model Serving is the backend.
mockModel:
  enabled: false
  image:
    repository: ghcr.io/aborek/sovereign-os/mock-model
    tag: "0.1.1@sha256:fee2cf404759e43ee64b3cf4c169475cb5b96136ee848afa852248caad1369eb"

# STACKIT premium ON in Mode B: the key comes from STACKIT Secrets Manager via
# External Secrets (never inline). The dedicated per-model spend cap on the agent
# key (values.yaml litellmAgentKey.modelMaxBudget) still applies.
stackitPremium:
  enabled: true
  externalSecrets:
    enabled: true

# LiteLLM wiring (Mode B): route every model_name at the OpenAI-compatible STACKIT
# endpoint. Confirmed catalog ids (STACKIT docs, available-shared-models). Names
# match the bundled slice so the agents need NO change. `api_key` resolves from
# the External-Secrets-synced `stackit-ai-model-serving-key` Secret (STACKIT_API_KEY).
litellm:
  # Point the gateway's admin/virtual-key DB at managed PostgreSQL (was in-cluster
  # pg-rw). useExisting + the `postgres-litellm-credentials` Secret are unchanged
  # (values.yaml); only the host moves. Same REPLACE token as postgres.external.host.
  db:
    endpoint: "REPLACE-postgres-flex-host"
  environmentSecrets:
    - litellm-credentials          # master key + STACKIT_API_BASE (unchanged)
    - stackit-ai-model-serving-key # External-Secrets-synced STACKIT_API_KEY
  proxy_config:
    model_list:
      # Standard/worker tier -> gpt-oss-20b on STACKIT (lightweight, non-reasoning).
      - model_name: sovereign-default
        litellm_params:
          model: openai/gpt-oss-20b
          api_base: "https://api.openai-compat.model-serving.eu01.onstackit.cloud/v1"
          api_key: os.environ/STACKIT_API_KEY
      - model_name: sovereign-mock # back-compat alias -> worker tier
        litellm_params:
          model: openai/gpt-oss-20b
          api_base: "https://api.openai-compat.model-serving.eu01.onstackit.cloud/v1"
          api_key: os.environ/STACKIT_API_KEY
      - model_name: sovereign-embed # embeddings for RAG (EU-sovereign)
        # NOTE: Qwen3-VL-Embedding-8B is 4096-dim — set opensearch.knnDimension to
        # match (retrieval.knnDimension: 4096) and reindex. Dimension MUST match.
        litellm_params:
          model: openai/Qwen/Qwen3-VL-Embedding-8B
          api_base: "https://api.openai-compat.model-serving.eu01.onstackit.cloud/v1"
          api_key: os.environ/STACKIT_API_KEY
      # Vision + heavy escalation -> Qwen3-VL 235B (the confirmed VLM).
      - model_name: sovereign-vision
        litellm_params:
          model: openai/Qwen/Qwen3-VL-235B-A22B-Instruct-FP8
          api_base: "https://api.openai-compat.model-serving.eu01.onstackit.cloud/v1"
          api_key: os.environ/STACKIT_API_KEY
      - model_name: sovereign-premium
        litellm_params:
          model: openai/Qwen/Qwen3-VL-235B-A22B-Instruct-FP8
          api_base: "https://api.openai-compat.model-serving.eu01.onstackit.cloud/v1"
          api_key: os.environ/STACKIT_API_KEY
      # Reasoning tier (keeps routing.ts' `sovereign-reasoning` default valid).
      # BOTH the sovereign and the fast reasoning names map to STACKIT Qwen3-VL-235B.
      - model_name: sovereign-reasoning
        litellm_params:
          model: openai/Qwen/Qwen3-VL-235B-A22B-Instruct-FP8
          api_base: "https://api.openai-compat.model-serving.eu01.onstackit.cloud/v1"
          api_key: os.environ/STACKIT_API_KEY
      - model_name: sovereign-reasoning-fast
        litellm_params:
          model: openai/Qwen/Qwen3-VL-235B-A22B-Instruct-FP8
          api_base: "https://api.openai-compat.model-serving.eu01.onstackit.cloud/v1"
          api_key: os.environ/STACKIT_API_KEY
    router_settings:
      routing_strategy: simple-shuffle
      num_retries: 3
      timeout: 120
      allowed_fails: 3
      cooldown_time: 60
      fallbacks:
        - sovereign-default: ["sovereign-premium"]
        - sovereign-mock: ["sovereign-premium"]
        - sovereign-reasoning: ["sovereign-reasoning-fast"]
    litellm_settings:
      success_callback: ["langfuse"]
      drop_params: true
    general_settings:
      master_key: os.environ/PROXY_MASTER_KEY

# =============================================================================
# Subchart backend wiring (Mode B). The bespoke templates resolve their backend
# host through the soa.* helpers automatically; the upstream SUBCHARTS take their
# host from values, so we point them at the managed endpoints here (deep-merged
# over values.yaml — only the host/endpoint changes; the per-app credential
# Secret names are identical in both modes, supplied by External Secrets).
# Same REPLACE tokens as postgres.external.host / opensearch.external.host /
# objectStorage.external.endpoint, so render-values.sh fills them in one pass.
# ClickHouse + Valkey stay bundled (no managed STACKIT equivalent) — not overridden.
# =============================================================================
langfuse:
  postgresql:
    host: "REPLACE-postgres-flex-host"   # Langfuse metadata DB -> managed PostgreSQL
  s3:
    endpoint: "https://object.storage.eu01.onstackit.cloud" # blob store -> managed S3

openmetadata:
  openmetadata:
    config:
      database:
        host: "REPLACE-postgres-flex-host"  # catalog DB -> managed PostgreSQL
      elasticsearch:
        host: "REPLACE-opensearch-host"     # search backend -> managed OpenSearch

# =============================================================================
# Bespoke images -> STACKIT Container Registry, referenced by immutable digest.
# kind's local image load does NOT work on a real cluster (build-deploy §4), so
# every custom image is pulled from the registry. The template renders
# `repository:tag`; we set repository to the registry path and tag to
# `<ver>@sha256:<digest>` (a valid OCI ref — the digest is authoritative).
# `REPLACE-REGISTRY` <- render-values.sh (output container_registry_url);
# `REPLACE-*-DIGEST` <- publish-images.sh (the pushed digest).
# =============================================================================
osUI:
  image:
    repository: ghcr.io/aborek/sovereign-os/os-ui
    tag: "0.1.0@sha256:5719957f3a78e1f54f28b0a90eaa686a1a244c4b9beab1f903cf1d231996bd36"
  # Server-side search now hits managed OpenSearch (was in-cluster opensearch:9200).
  opensearchUrl: "https://REPLACE-opensearch-host:9200"
  # Browser-reachable consoles -> the public Ingress hosts (was localhost port-forwards).
  supersetUrl: "https://superset.REPLACE-DNS-NAME"
  langfuseConsoleUrl: "https://langfuse.REPLACE-DNS-NAME"
  forgejoConsoleUrl: "https://forgejo.REPLACE-DNS-NAME"
  argocdUrl: "https://argocd.REPLACE-DNS-NAME"
  openmetadataUrl: "https://openmetadata.REPLACE-DNS-NAME"

agentRuntime:
  image:
    repository: ghcr.io/aborek/sovereign-os/agent-runtime
    tag: "0.1.0@sha256:85cb9c3109beebf447422a0dbbbf05435f31cf38a73d705cc1dd185d1cae0eab"

sampleAgent:
  image:
    repository: ghcr.io/aborek/sovereign-os/sample-agent
    tag: "0.1.0@sha256:b70d3d77c33e9f305d7b72584b01d9109e91cba293dbd440126e31840afeb605"

haystack:
  image:
    repository: ghcr.io/aborek/sovereign-os/haystack-retriever
    tag: "0.1.0@sha256:ccf7485eab8b54e738645b274824181c6f95991e54afc74885238c7ca18b948a"

dbt:
  image:
    repository: ghcr.io/aborek/sovereign-os/dbt
    tag: "0.2.0@sha256:dcec728155d4ff03f7b999753cb5ec00fd84e37d2cf8be3641a0ee426ae915d5"

egressProxy:
  image:
    repository: ghcr.io/aborek/sovereign-os/egress-proxy
    tag: "0.1.0@sha256:8426ee9d0cfe297e6fe961bab6a3a9854e1b97cb6ae713158e826f84f456f9ee"

webFetch:
  image:
    repository: ghcr.io/aborek/sovereign-os/web-fetch
    tag: "0.1.0@sha256:1487d74ff0d7e7327793525701720479df21eecf1ce6bb0b11b228deae08686d"

queryTool:
  image:
    repository: ghcr.io/aborek/sovereign-os/query-tool
    tag: "0.3.0@sha256:310342ad0f383c1f38ad276c5833cb174ac057b5d7790a3cef4dcc80f2527db3"

sandbox:
  image:
    repository: ghcr.io/aborek/sovereign-os/sandbox-duckdb
    tag: "0.1.0@sha256:6dbf74e5811b95dbfbd0bd731f667594cf48ed5b478683424e4ab9d18f5993c9"

# Admin Console is DEPRECATED — its functionality is now native to the OS UI
# (Platform -> Components). Off by default in the chart; no image needed. Set
# adminConsole.enabled=true (and supply the image below) only for the legacy
# standalone service.
adminConsole:
  enabled: false
  image:
    repository: ghcr.io/aborek/sovereign-os/admin-console
    tag: "0.1.0"  # admin-console not in pushed set; image tag only (disabled)

superset:
  image:
    repository: ghcr.io/aborek/sovereign-os/superset
    tag: "6.1.0@sha256:23801ec48b4792ce10893f48a53173f04a4ea320735c3351e35a0052ee95d9b6"
  # Superset metadata DB on managed PostgreSQL (was in-cluster pg-rw). user/name +
  # the superset DB password (External Secrets) are otherwise unchanged. The
  # bespoke superset-bootstrap Job resolves its host via soa.pgHost automatically.
  supersetNode:
    connections:
      db_host: "REPLACE-postgres-flex-host"

# Dagster has three image refs (user-code, webserver, daemon) — all the same
# bespoke image. webserver/daemon are maps (safe to deep-merge). The user-code
# image lives inside the `dagster-user-deployments.deployments` LIST: Helm
# replaces lists wholesale, so we do NOT override it here (that would drop the
# deployment's grpc args/env). Pin it at go-live by editing that single
# `repository`/`tag` in values.yaml, or keep it on the registry tag.
dagster:
  # DISABLED in Mode B: the sovereign-os/dagster:0.2.0 image build failed in
  # the current push run. Re-enable once the image is rebuilt and pushed.
  # When re-enabling, fill REPLACE-DAGSTER-DIGEST via publish-images.sh --push.
  enabled: false
  # Run/event/schedule storage on managed PostgreSQL (was in-cluster pg-rw). The
  # `dagster-postgresql` Secret + username/database are unchanged (values.yaml).
  postgresql:
    postgresqlHost: "REPLACE-postgres-flex-host"
  dagsterWebserver:
    image:
      repository: ghcr.io/aborek/sovereign-os/dagster
      tag: "0.2.0@sha256:REPLACE-DAGSTER-DIGEST"
  dagsterDaemon:
    image:
      repository: ghcr.io/aborek/sovereign-os/dagster
      tag: "0.2.0@sha256:REPLACE-DAGSTER-DIGEST"

# Layer 4 (Science / ML) — OFF by default (ml.enabled=false). Images are pinned
# here so enabling individual components pulls from ghcr.io/aborek immediately.
mlflow:
  image:
    repository: ghcr.io/aborek/sovereign-os/mlflow
    tag: "2.19.0@sha256:78e1f25d1354fc737d0f1625f28bd42d6aa3ec9cdb70871dcbd441de9bc72160"

mlAgent:
  image:
    repository: ghcr.io/aborek/sovereign-os/ml-agent
    tag: "0.1.0@sha256:d2aad748d399b62fd1f91692b851af5901d7e80399baa595bc6f18b1a9974dad"

# Terminal + Workbench are OFF by default (enabled:false in values.yaml). Images
# pinned here so opt-in brings up the correct, pushed images immediately.
terminal:
  broker:
    image:
      repository: ghcr.io/aborek/sovereign-os/terminal-broker
      tag: "0.1.0@sha256:13a14b611179ebdcd8c6896e791b78f1bf03043ed015483b87fff8f812d51fb4"
  sandbox:
    image:
      repository: ghcr.io/aborek/sovereign-os/sandbox-shell
      tag: "0.1.0@sha256:e73ae868850996e2602006fbfdaa4006f70d642332589032b9b559c21f0f07d0"

workbench:
  broker:
    image:
      repository: ghcr.io/aborek/sovereign-os/workbench-broker
      tag: "0.1.0@sha256:1a21b6cff50947fa293bb6acbc6af4a5df02c9b85c485264379c8a3efa99a43c"
  workspace:
    image:
      repository: ghcr.io/aborek/sovereign-os/code-server-workbench
      tag: "0.1.0@sha256:b15791d5d03d84cf08dfac3e160115befd944bea43fbeb244a6ba189ada5bd7f"

# =============================================================================
# Ingress + TLS — hostnames resolve to the ingress LB (DNS zone from terraform);
# cert-manager issues TLS. `REPLACE-DNS-NAME` <- render-values.sh (var dns_name).
# =============================================================================
ingress:
  enabled: true
  className: nginx
  tlsIssuer: letsencrypt-prod
  hosts:
    osUI: "os.REPLACE-DNS-NAME"
    litellm: "litellm.REPLACE-DNS-NAME"
    langfuse: "langfuse.REPLACE-DNS-NAME"
    openmetadata: "openmetadata.REPLACE-DNS-NAME"
    superset: "superset.REPLACE-DNS-NAME"
    forgejo: "forgejo.REPLACE-DNS-NAME"
    argocd: "argocd.REPLACE-DNS-NAME"
    # Terminal + Workbench broker hosts (used when terminal/workbench are enabled).
    # Without these the os-ui gets empty TERMINAL_BROKER_WS / WORKBENCH_BROKER_URL
    # and the consoles cannot reach their brokers from the browser.
    terminal: "terminal.REPLACE-DNS-NAME"
    workbench: "workbench.REPLACE-DNS-NAME"
    # Dagster console ("Open Dagster" target). Empty DAGSTER_CONSOLE_URL otherwise.
    dagster: "dagster.REPLACE-DNS-NAME"
  # Dagster OSS has no auth of its own — its Ingress enforces nginx basic-auth
  # from this htpasswd Secret (key `auth`, release ns; nginx fails closed if absent).
  dagsterBasicAuthSecret: dagster-basic-auth

# Cache/analytics (Valkey/ClickHouse) stay bundled — no managed STACKIT
# equivalent (stackit.md). Flip enabled:false + external here if that changes.

# Trino -> Polaris REST catalog OAuth2 secret (required by the template in
# non-local profile). This secret (key: POLARIS_OAUTH_CREDENTIAL) is populated
# by External Secrets from STACKIT Secrets Manager. vendedCredentials=true when
# STACKIT Object Storage vends S3 creds via Polaris credential vending.
trino:
  catalog:
    iceberg:
      oauth2SecretName: polaris-trino-oauth   # External Secrets -> Secrets Manager
      vendedCredentials: true                 # STACKIT Object Storage vends creds
